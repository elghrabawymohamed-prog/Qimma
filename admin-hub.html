<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وجهة المسؤول - منصة القمة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=El+Messiri:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ink: #0B1330; --navy: #16204a; --gold: #C9992B; --gold-2: #A9761D; }
        body { font-family: 'Almarai', sans-serif; background: #f8fafc; }
        h1, h2, h3 { font-family: 'El Messiri', serif; }
        .sidebar-royal { background: linear-gradient(180deg, var(--navy) 0%, var(--ink) 100%); }
        .sidebar-link { color: rgba(219,234,254,0.75); transition: background-color .2s ease, color .2s ease; }
        .sidebar-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .sidebar-link.active { background: linear-gradient(90deg, var(--gold), var(--gold-2)); color: #fff; }
        @media print {
            body * { visibility: hidden; }
            #printableReport, #printableReport *, #printableGroupReport, #printableGroupReport *, #printableCMStudentReport, #printableCMStudentReport * { visibility: visible; }
            #printableReport, #printableGroupReport, #printableCMStudentReport { position: absolute; top: 0; right: 0; left: 0; width: 100%; box-shadow: none !important; border: none !important; }
            #printableCMStudentReport .cm-stu-detail { display: table-row-group !important; }
            .no-print { display: none !important; }
        }

        /* ============================================================
           [تحسينات UI/UX مضافة] طبقة صقل بصري وإتاحة (Accessibility)
           لا تمسّ أي منطق برمجي — قواعد CSS إضافية فقط
           ============================================================ */

        /* 1) إتاحة: مؤشّر تركيز واضح للوحة المفاتيح (كان غائبًا تمامًا).
           ضروري لمستخدمي لوحة المفاتيح وقارئات الشاشة (WCAG 2.4.7). */
        a:focus-visible, button:focus-visible, input:focus-visible,
        select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 2px;
            border-radius: 6px;
        }

        /* 2) أهداف لمس مناسبة على الجوال: أي زر/رابط لا يقل بُعده عن 44px
           (إرشاد WCAG 2.5.5 وApple HIG) لتفادي الضغطات الخاطئة. */
        @media (max-width: 640px) {
            button, a[role="button"], .sidebar-link, select {
                min-height: 44px;
            }
            /* منع التمرير الأفقي المزعج على الشاشات الصغيرة */
            html, body { overflow-x: hidden; }
        }

        /* 3) جداول متجاوبة: أي جدول عريض يصبح قابلاً للتمرير داخل حاويته
           بدل أن يدفع كامل الصفحة أفقيًا. */
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* 4) تغذية راجعة عند الضغط (Active) لكل الأزرار — إحساس لمسي أوضح. */
        button:active:not(:disabled) { transform: translateY(1px); }
        button { transition: transform .1s ease, background-color .2s ease, box-shadow .2s ease; }

        /* 5) هيكل تحميل (Skeleton) اختياري — أنعم من ومضة النص وحده. */
        .skeleton {
            background: linear-gradient(90deg, #eef2f7 25%, #e2e8f0 37%, #eef2f7 63%);
            background-size: 400% 100%;
            animation: skeletonShimmer 1.4s ease infinite;
            border-radius: 10px;
        }
        @keyframes skeletonShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        /* 6) احترام تفضيل تقليل الحركة (إتاحة — كان غائبًا). */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
</head>
<body class="text-gray-900 antialiased">

    <!-- شاشة الدخول -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 w-full max-w-sm">

    <!-- الوجهة الرئيسية: قائمة جانبية + محتوى -->
    <div id="mainScreen" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="sidebar-royal w-full md:w-72 shrink-0 md:min-h-screen flex flex-col p-5">
            <div class="flex items-center gap-3 mb-1 text-white">
                <div class="w-11 h-11 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20 shrink-0">
                    <i class="fa-solid fa-mountain text-xl text-yellow-400"></i>
                </div>
                <div>
                    <h1 class="font-black text-base leading-tight">منصة القمة</h1>
                    <p class="text-yellow-300 font-bold text-xs">وجهة المسؤول</p>
                </div>
            </div>

            <nav class="mt-8 space-y-2 flex-1">

        <main class="flex-1 min-w-0 px-4 md:px-8 py-8">

    <!-- نافذة معاينة محتوى السؤال -->
    <div id="previewModal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-black text-blue-900"><i class="fa-solid fa-eye text-blue-600"></i> معاينة السؤال</h3>

    <!-- نافذة تعديل بيانات طالب/مدرب (الاسم والمجموعة/التخصص) -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 id="editModalTitle" class="font-black text-blue-900"><i class="fa-solid fa-pen text-blue-600"></i> تعديل البيانات</h3>
                <button type="button" id="editModalCloseBtn" class="text-gray-400 hover:text-gray-700 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="editModalBody"></div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const SUPABASE_URL = 'https://islxgvjvrxebdtihrkbq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__ogPxzJzKKighw363hqGqg_HOIQEn7A';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SPECIALIZATIONS = ['كمي', 'لفظي', 'تحصيلي رياضيات', 'تحصيلي فيزياء', 'تحصيلي كيمياء', 'تحصيلي أحياء'];
        let myRole = null;       // 'admin' | 'super_admin'
        let activeHub = 'overview';
        let instructorsCache = [];
        let studentsCache = [];
        let groupsCache = [];

        // [#4] حالة الترقيم من الخادم (لا تعديل على قاعدة البيانات — نستخدم range/ilike/eq)
        const PROFILES_PAGE_SIZE = 20;
        const GROUPS_PAGE_SIZE = 10;
        let studentsListState = { page: 0, q: '', status: 'all' };
        let joinReqState = { page: 0, q: '' };
        let groupsListState = { page: 0, q: '' };

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        // [#4] أداة تأخير لتقليل الاستعلامات أثناء الكتابة في البحث
        function debounce(fn, ms) { let t; return function (...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }
        // تحويل الأرقام اللاتينية إلى هندية (٠-٩) لعرضها في الإدخال والمحتوى
        function toArabicIndic(s) { return String(s == null ? '' : s).replace(/[0-9]/g, (d) => '٠١٢٣٤٥٦٧٨٩'[d]); }
        // ربط حقل إدخال ليحوّل الأرقام إلى هندية فور الكتابة (طول المحرف ثابت فلا يتأثّر مؤشّر الكتابة)
        function bindArabicIndicInput(el) {
            if (!el || el.dataset.arbound) return;
            el.dataset.arbound = '1';
            el.addEventListener('input', () => { const v = el.value; const nv = toArabicIndic(v); if (nv !== v) el.value = nv; });
            if (el.value) el.value = toArabicIndic(el.value);
        }
        // تقسيم نصّ ملصوق إلى عدّة خيارات (أسطر/جدولة/فواصل) مع إزالة الترقيم البادئ
        function splitPastedChoices(text) {
            let parts = String(text || '').split(/\r?\n|\t/).map((s) => s.trim()).filter(Boolean);
            if (parts.length < 2) parts = String(text || '').split(/\s{2,}|،|\s\/\s|\s\|\s/).map((s) => s.trim()).filter(Boolean);
            parts = parts.map((p) => p.replace(/^\s*[0-9٠-٩أ-يa-dA-D][\.\)\-–:]\s+/, '').trim());
            return parts;
        }
        // [#4] تعقيم مُدخل البحث قبل تمريره لمُرشِّح ILIKE/or في PostgREST:
        // إزالة الرموز البِنيوية (فاصلة/أقواس) التي قد تُغيّر تركيب المُرشِّح،
        // وتهريب محارف البدل (% _ \) لتُعامَل حرفيًّا. (الوصول أصلًا محصور بالمسؤول عبر RLS.)
        function sanitizeSearch(q) {
            return String(q || '').replace(/[,()]/g, ' ').replace(/([\\%_])/g, '\\$1').trim();
        }
        // [#4] شريط ترقيم موحّد (عربي RTL): يعرض النطاق والإجمالي وأزرار التنقّل
        function renderPager(el, page, total, pageSize, onGo) {
            const totalPages = Math.max(1, Math.ceil((total || 0) / pageSize));
            const cur = Math.min(page, totalPages - 1);
            const from = total === 0 ? 0 : cur * pageSize + 1;
            const to = Math.min(total, (cur + 1) * pageSize);
            el.innerHTML = `
                <div class="flex items-center justify-between flex-wrap gap-2 mt-4 pt-3 border-t border-gray-100">
                    <span class="text-xs text-gray-400 font-bold">عرض ${from}–${to} من ${total}</span>
                    <div class="flex items-center gap-1">
                        <button type="button" data-go="first" class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed" ${cur <= 0 ? 'disabled' : ''}>الأولى</button>
                        <button type="button" data-go="prev" class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed" ${cur <= 0 ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i> السابق</button>
                        <span class="px-3 py-1.5 text-xs font-black text-blue-900">${cur + 1} / ${totalPages}</span>
                        <button type="button" data-go="next" class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed" ${cur >= totalPages - 1 ? 'disabled' : ''}>التالي <i class="fa-solid fa-chevron-left"></i></button>
                        <button type="button" data-go="last" class="px-3 py-1.5 rounded-lg border border-gray-200 text-xs font-bold hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed" ${cur >= totalPages - 1 ? 'disabled' : ''}>الأخيرة</button>
                    </div>
                </div>`;
            el.querySelectorAll('[data-go]').forEach((b) => b.addEventListener('click', () => {
                const g = b.dataset.go;
                if (g === 'first') onGo(0);
                else if (g === 'prev') onGo(Math.max(0, cur - 1));
                else if (g === 'next') onGo(Math.min(totalPages - 1, cur + 1));
                else if (g === 'last') onGo(totalPages - 1);
            }));
        }

        // [مراجعة #5] صندوق بحث الطلاب من الخادم (بدل تحميل الآلاف في <select>).
        // opts: { onPick(id,label), activeOnly=true, placeholder }
        function attachServerStudentPicker(mountEl, opts = {}) {
            const { onPick = () => {}, activeOnly = true, placeholder = 'ابحث عن طالب بالاسم أو البريد...' } = opts;
            mountEl.innerHTML = `
                <div class="relative">
                    <input type="text" class="ssp-input w-full border border-gray-200 rounded-lg px-3 py-2" placeholder="${placeholder}" autocomplete="off">
                    <div class="ssp-results hidden absolute z-30 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-56 overflow-y-auto"></div>
                </div>`;
            const input = mountEl.querySelector('.ssp-input');
            const results = mountEl.querySelector('.ssp-results');
            const runSearch = debounce(async () => {
                if (input.value.trim().length < 1) { results.classList.add('hidden'); results.innerHTML = ''; return; }
                let query = db.from('profiles').select('id, full_name, email').eq('role', 'student');
                if (activeOnly) query = query.eq('account_status', 'active');
                const safe = sanitizeSearch(input.value);
                if (safe) query = query.or(`full_name.ilike.%${safe}%,email.ilike.%${safe}%`);
                const { data, error } = await query.order('full_name').range(0, 19);
                if (error) { results.innerHTML = `<p class="px-3 py-2 text-xs text-red-500 font-bold">${escapeHtml(error.message)}</p>`; results.classList.remove('hidden'); return; }
                results.innerHTML = (data && data.length)
                    ? data.map((s) => `<button type="button" data-id="${s.id}" data-label="${escapeHtml(s.full_name || s.email || '')}" class="ssp-item block w-full text-right px-3 py-2 text-sm font-bold text-gray-700 hover:bg-blue-50">${escapeHtml(s.full_name) || escapeHtml(s.email)}<span class="block text-gray-400 font-normal text-[11px]">${escapeHtml(s.email || '')}</span></button>`).join('')
                    : '<p class="px-3 py-2 text-sm text-gray-400 font-bold">لا نتائج مطابقة</p>';
                results.classList.remove('hidden');
                results.querySelectorAll('.ssp-item').forEach((b) => b.addEventListener('click', () => {
                    input.value = b.dataset.label; results.classList.add('hidden');
                    onPick(b.dataset.id, b.dataset.label);
                }));
            }, 300);
            input.addEventListener('input', () => { onPick('', ''); runSearch(); });
            input.addEventListener('focus', () => { if (results.innerHTML) results.classList.remove('hidden'); });
            mountEl.addEventListener('mousedown', (e) => { if (e.target === input) return; }); // إبقاء النتائج حتى الاختيار
            document.addEventListener('click', (e) => { if (mountEl && !mountEl.contains(e.target)) results.classList.add('hidden'); });
            return { clear() { input.value = ''; results.innerHTML = ''; results.classList.add('hidden'); onPick('', ''); } };
        }

        function showStatus(msg, ok) {
            const el = document.getElementById('statusBanner');
            el.textContent = msg;
            el.className = `mb-4 p-4 rounded-xl font-bold text-center ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.round(ms / 1000));
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // =================================================================
        // نافذة تعديل بيانات الطالب/المدرب (اسم + مجموعة/تخصص) — تُستدعى
        // عبر أيقونة القلم الخافتة بجوار الاسم في قوائم الطلاب والمدربين
        // =================================================================
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function openEditModal({ title, fieldsHtml, onSave, onSaved }) {
            const modal = document.getElementById('editModal');
            document.getElementById('editModalTitle').innerHTML = `<i class="fa-solid fa-pen text-blue-600"></i> ${escapeHtml(title)}`;
            document.getElementById('editModalBody').innerHTML = `
                <div id="editModalError" class="hidden mb-3 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
                <form id="editModalForm" class="space-y-3">
                    ${fieldsHtml}
                    <button type="submit" id="editModalSaveBtn" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">حفظ التعديلات</button>
                </form>
            `;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('editModalForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('editModalError');
                const btn = document.getElementById('editModalSaveBtn');
                errEl.classList.add('hidden');
                btn.disabled = true;
                btn.textContent = 'جاري الحفظ...';
                try {
                    await onSave();
                    closeEditModal();
                    showStatus('تم حفظ التعديلات بنجاح.', true);
                    if (onSaved) await onSaved();
                } catch (err) {
                    errEl.textContent = err.message || 'تعذّر حفظ التعديلات.';
                    errEl.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'حفظ التعديلات';
                }
            });
        }

        // تعديل بيانات طالب: الاسم + إعادة تعيين مجموعته (عبر RPC آمنة
        // admin_update_student_profile تتحقق من صلاحية المسؤول في قاعدة البيانات)
        async function openEditStudentModal(student) {
            const [{ data: allGroups }, { data: membership }] = await Promise.all([
                db.from('training_groups').select('id, name, instructor_id, profiles(full_name)').eq('is_archived', false).order('name'),
                db.from('training_group_members').select('group_id').eq('student_id', student.id).limit(1),
            ]);
            const currentGroupId = (membership && membership[0]) ? membership[0].group_id : null;
            const groupOptions = ['<option value="">بلا مجموعة</option>']
                .concat((allGroups || []).map((g) => `<option value="${g.id}" ${currentGroupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)} — ${escapeHtml(g.profiles?.full_name || '')}</option>`))
                .join('');

            openEditModal({
                title: 'تعديل بيانات الطالب',

        // صيغة مدة طويلة (ساعات/دقائق) أنسب للتقارير من mm:ss
        function formatDurationLong(ms) {
            const totalMin = Math.max(0, Math.round((ms || 0) / 60000));
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h > 0) return `${h} س ${m} د`;
            return `${m} دقيقة`;
        }

        async function countRows(build) {
            try { const { count, error } = await build(db.from.bind(db)); if (error) return 0; return count || 0; }
            catch (_e) { return 0; }
        }

        // [مراجعة] جلب كل الصفوف على دفعات لتفادي سقف PostgREST الافتراضي (1000 صف)
        // في التقارير المجمّعة. makeQuery ترجع مُنشئ استعلام جديدًا في كل نداء.
        async function fetchAllRows(makeQuery, pageSize = 1000) {
            const all = [];
            let from = 0;
            // حد أمان: 100 دفعة (100 ألف صف) لمنع أي حلقة لا نهائية
            for (let guard = 0; guard < 100; guard++) {
                const { data, error } = await makeQuery().range(from, from + pageSize - 1);
                if (error) throw error;
                if (!data || !data.length) break;
                all.push(...data);
                if (data.length < pageSize) break;
                from += pageSize;
            }
            return all;
        }

                    c(f => f('training_groups').select('id', { count: 'exact', head: true }).eq('is_archived', false)),
                    c(f => f('training_groups').select('id', { count: 'exact', head: true }).eq('is_archived', true)),
                    c(f => f('exams').select('id', { count: 'exact', head: true })),

                const now = new Date();
                const monthBuckets = [];
                for (let i = 5; i >= 0; i--) {

                // ---- النشاط اليومي: محاولات نماذج الأقسام (آخر ١٤ يومًا) ----

            let result = '';
            let lastIndex = 0;
            let match;
            while ((match = pattern.exec(str)) !== null) {
                result += escapeHtml(str.slice(lastIndex, match.index));
                const [, type, part1, part2] = match;
                if (type === 'frac') {
                    result += `<span class="inline-flex flex-col items-center align-middle mx-1 text-sm leading-tight"><span class="px-1 border-b border-current">${escapeHtml(part1)}</span><span class="px-1">${escapeHtml(part2)}</span></span>`;
                } else if (type === 'sqrt') {
                    const index = part1 ? `<sup class="text-xs relative -left-1">${escapeHtml(part1)}</sup>` : '';
                    result += `<span class="inline-flex items-start mx-0.5">${index}<span>√</span><span class="border-t border-current px-0.5">${escapeHtml(part2)}</span></span>`;
                } else if (type === 'pow') {
                    result += `${escapeHtml(part1)}<sup>${escapeHtml(part2)}</sup>`;
                }
                lastIndex = pattern.lastIndex;
            }
            result += escapeHtml(str.slice(lastIndex));
            return result;
        }

        async function loadNodeOptions() {
            const { data, error } = await db.from('nodes').select('id, key, type, parent_id').order('sort_order');
            if (error) { showStatus('تعذّر تحميل الأقسام: ' + error.message, false); return; }
            const byId = new Map(data.map(n => [n.id, n]));
            function fullPath(node) {
                const parts = [node.key];
                let p = byId.get(node.parent_id);
                while (p) { parts.unshift(p.key); p = byId.get(p.parent_id); }
                return parts.join(' ← ');
            }
            const select = document.getElementById('nodeSelect');
            select.innerHTML = '';
            data.filter(n => n.type === 'testGroup').forEach(n => {
                const opt = document.createElement('option');
                opt.value = n.id;
                opt.textContent = fullPath(n);
                select.appendChild(opt);
            });
            if (select.options.length > 0) {
                currentNodeId = select.value;
                await loadExamOptions();
            }
            select.addEventListener('change', async () => {
                currentNodeId = select.value;
                await loadExamOptions();
            });
        }

        async function loadExamOptions() {
            const examSelect = document.getElementById('examSelect');
            examSelect.innerHTML = '';
            currentExamId = null;
            const { data, error } = await db.from('exams').select('id, exam_number, title, video_url, unsolved_pdf_url, solved_pdf_url').eq('node_id', currentNodeId).order('exam_number');
            if (error) { showStatus('تعذّر تحميل الاختبارات: ' + error.message, false); return; }
            if (data.length === 0) {
                examSelect.innerHTML = '<option value="">لا توجد اختبارات - أنشئ واحدًا</option>';
                document.getElementById('questionsList').innerHTML = '<p class="text-gray-400 text-sm">أنشئ اختبارًا أولاً.</p>';
                document.getElementById('questionForm').classList.add('hidden');
                document.getElementById('examAttachmentsSection').classList.add('hidden');
                return;
            }
            document.getElementById('questionForm').classList.remove('hidden');
            document.getElementById('examAttachmentsSection').classList.remove('hidden');
            contentExamsCache = new Map(data.map(ex => [ex.id, ex]));
            data.forEach(ex => {

        async function loadQuestions() {
            const list = document.getElementById('questionsList');
            const countEl = document.getElementById('questionsCount');
            if (countEl) countEl.textContent = '';

            list.innerHTML = '<p class="text-gray-400 text-sm">جاري التحميل...</p>';
            const { data, error } = await db.from('questions').select('id, question_number, question_type, text_content, image_url').eq('exam_id', currentExamId).order('question_number');
            if (error) { list.innerHTML = `<p class="text-red-600 text-sm">${escapeHtml(error.message)}</p>`; return; }

                row.draggable = !selectMode;
                row.dataset.qid = q.id;
                const info = document.createElement('div');
                info.className = 'flex items-center gap-2 min-w-0';
                if (selectMode) {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'q-select-cb w-4 h-4 shrink-0';
                    cb.checked = isSel;
                    cb.addEventListener('change', () => {
                        if (cb.checked) selectedQuestionIds.add(q.id); else selectedQuestionIds.delete(q.id);
                        row.className = 'question-row flex items-center justify-between border rounded-lg p-3 gap-2 ' + (cb.checked ? 'border-blue-400 bg-blue-50' : 'border-gray-100');
                        updateSelectionCount();
                    });
                    info.appendChild(cb);
                } else {
                    const grip = document.createElement('span');
                    grip.className = 'drag-grip shrink-0 text-gray-300 hover:text-gray-500 cursor-move';
                    grip.title = 'اسحب لإعادة الترتيب';
                    grip.innerHTML = '<i class="fa-solid fa-grip-vertical"></i>';
                    info.appendChild(grip);
                }
                const badge = document.createElement('span');
                badge.className = 'shrink-0 w-7 h-7 rounded-lg bg-blue-50 text-blue-700 font-black text-xs flex items-center justify-center';
                badge.textContent = toArabicIndic(q.question_number);
                const label = document.createElement('span');
                label.className = 'text-sm font-bold text-gray-700 truncate';
                label.innerHTML = q.question_type === 'image'
                    ? '<i class="fa-solid fa-image text-gray-400"></i> صورة'
                    : escapeHtml((q.text_content || '').slice(0, 36) || 'نص');
                info.appendChild(badge); info.appendChild(label);
                const actionsWrap = document.createElement('div');
                actionsWrap.className = 'flex items-center gap-2 shrink-0';
                const previewBtn = document.createElement('button');
                previewBtn.type = 'button';
                previewBtn.className = 'text-blue-700 hover:text-blue-900 text-sm font-bold';
                previewBtn.innerHTML = '<i class="fa-solid fa-eye"></i>';
                previewBtn.title = 'معاينة';
                previewBtn.addEventListener('click', () => previewQuestion(q));
                actionsWrap.appendChild(previewBtn);
                if (!selectMode) {
                    const editBtn = document.createElement('button');
                    editBtn.type = 'button';
                    editBtn.className = 'text-amber-600 hover:text-amber-800 text-sm font-bold';

                    editBtn.addEventListener('click', () => startEditQuestion(q.id));
                    const delBtn = document.createElement('button');
                    delBtn.type = 'button';
                    delBtn.className = 'text-red-600 hover:text-red-800 text-sm';
                    delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';

        // [ميزة 1] تحديث عدّاد التحديد وحالة زرّ «الكل»
        function updateSelectionCount() {
            const cEl = document.getElementById('selectionCount');
            if (cEl) cEl.textContent = toArabicIndic(selectedQuestionIds.size) + ' محدّد';
            const all = document.getElementById('selectAllQuestions');
            if (all) {
                const rows = document.querySelectorAll('#questionsList .q-select-cb');
                all.checked = rows.length > 0 && selectedQuestionIds.size >= rows.length;
            }
        }

        // [ميزة 1] سحب وإفلات لإعادة ترتيب الأسئلة (يُربط مرّة واحدة على الحاوية)
        let questionDragSrc = null;
        function bindQuestionListDrag(list) {
            if (!list || list.dataset.dragBound) return;
            list.dataset.dragBound = '1';
            list.addEventListener('dragstart', (e) => {
                const r = e.target.closest && e.target.closest('.question-row');
                if (!r) return;
                questionDragSrc = r;
                e.dataTransfer.effectAllowed = 'move';
                try { e.dataTransfer.setData('text/plain', r.dataset.qid || ''); } catch (_e) {}
                setTimeout(() => r.classList.add('opacity-40'), 0);
            });
            list.addEventListener('dragover', (e) => {
                if (!questionDragSrc) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const r = e.target.closest && e.target.closest('.question-row');
                if (!r || r === questionDragSrc) return;
                const rect = r.getBoundingClientRect();
                const after = (e.clientY - rect.top) / rect.height > 0.5;
                list.insertBefore(questionDragSrc, after ? r.nextSibling : r);
            });
            list.addEventListener('drop', (e) => { e.preventDefault(); });
            list.addEventListener('dragend', async () => {
                if (!questionDragSrc) return;
                questionDragSrc.classList.remove('opacity-40');
                questionDragSrc = null;
                await persistQuestionOrder();
            });
        }

        async function persistQuestionOrder() {
            const list = document.getElementById('questionsList');
            if (!list) return;
            const ids = Array.from(list.querySelectorAll('.question-row')).map((r) => r.dataset.qid);
            if (ids.length < 2) return;
            showStatus('جاري حفظ الترتيب الجديد...', true);
            try {
                // مرحلتان لتفادي أي تعارض تفرّد على (exam_id, question_number): إزاحة مؤقتة ثم الترقيم النهائي
                for (let i = 0; i < ids.length; i++) {
                    const { error } = await db.from('questions').update({ question_number: 1000 + i, sort_order: 1000 + i }).eq('id', ids[i]);
                    if (error) throw error;
                }
                for (let i = 0; i < ids.length; i++) {
                    const { error } = await db.from('questions').update({ question_number: i + 1, sort_order: i + 1 }).eq('id', ids[i]);
                    if (error) throw error;
                }
                showStatus('تم تحديث ترتيب الأسئلة.', true);
            } catch (err) {
                showStatus('تعذّر حفظ الترتيب: ' + err.message, false);
            }
            await loadQuestions();
        }

        async function previewQuestion(q) {
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('previewModalBody');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            body.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            const { data: choices, error } = await db.from('choices').select('choice_key, text_content, image_url, is_correct').eq('question_id', q.id).order('sort_order');
            if (error) { body.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(error.message)}</p>`; return; }

            // [إصلاح أمني] تعقيم عنوان الصورة قبل حقنه في سمة src لمنع كسر السمة
            // وحقن سمات/سكربت (Attribute-injection XSS). escapeHtml يهرّب علامتَي
            // الاقتباس أيضًا فلا يمكن الخروج من السمة.
            const questionContentHtml = q.question_type === 'image' && q.image_url
                ? `<img src="${escapeHtml(q.image_url)}" class="max-h-64 mx-auto rounded-lg border border-gray-200 mb-4">`
                : `<p class="text-lg font-bold text-blue-900 mb-4">${escapeHtml(q.text_content || '')}</p>`;

            body.innerHTML = `
                <p class="text-xs text-gray-400 font-bold mb-2">السؤال #${toArabicIndic(q.question_number)}</p>
                ${questionContentHtml}
                ${mediaBlock(q.video_url, 'فيديو شرح السؤال')}
                <div class="grid grid-cols-2 gap-3">
                    ${choices.map(c => `
                        <div class="border-2 rounded-lg p-3 text-center ${c.is_correct ? 'border-green-500 bg-green-50' : 'border-gray-200'}">
                            ${c.image_url ? `<img src="${escapeHtml(c.image_url)}" class="max-h-24 mx-auto mb-2 rounded">` : ''}
                            <span class="font-bold ${c.is_correct ? 'text-green-700' : 'text-gray-700'}">${escapeHtml(c.text_content || '')}</span>
                            ${c.is_correct ? '<i class="fa-solid fa-circle-check text-green-600 mr-1"></i>' : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function deleteQuestion(id) {
            if (!confirm('حذف هذا السؤال نهائيًا؟')) return;
            const { error } = await db.from('questions').delete().eq('id', id);
            if (error) showStatus('تعذّر الحذف: ' + error.message, false);
            else { showStatus('تم الحذف.', true); if (editingQuestionId === id) cancelEditQuestion(); await loadQuestions(); }
        }

        // [#2] تعديل سؤال داخل نفس النموذج: نحمّل بياناته ثم يتحوّل الحفظ إلى «تحديث»
        async function startEditQuestion(id) {
            const { data: q, error } = await db.from('questions').select('*').eq('id', id).single();
            if (error || !q) { showStatus('تعذّر تحميل السؤال للتعديل.', false); return; }
            const { data: choices } = await db.from('choices').select('choice_key, text_content, is_correct, sort_order').eq('question_id', id).order('sort_order');
            editingQuestionId = id;
            editingImageUrl = q.image_url || null;
            editingVideoUrl = q.video_url || null;
            // [إصلاح] صفّر حقول فيديو السؤال قبل التعبئة حتى لا يتسرّب رابط/ملف أُدخل
            // لسؤالٍ آخر فيَستبدل فيديو السؤال الجاري تعديله عند الحفظ.
            const qvUpload = document.querySelector('input[name="questionVideoMode"][value="upload"]');
            if (qvUpload) { qvUpload.checked = true; qvUpload.dispatchEvent(new Event('change')); }
            const qvFile = document.getElementById('questionVideoFileInput'); if (qvFile) qvFile.value = '';
            const qvUrl = document.getElementById('questionVideoUrlInput'); if (qvUrl) qvUrl.value = '';
            // النوع
            const typeSel = document.getElementById('questionType');
            typeSel.value = q.question_type;
            typeSel.dispatchEvent(new Event('change'));
            selectedImageFile = null;
            const imgPrev = document.getElementById('imagePreview');
            const fileInput = document.getElementById('imageFileInput');
            if (q.question_type === 'image') {
                if (imgPrev && q.image_url) { imgPrev.src = q.image_url; imgPrev.classList.remove('hidden'); }
                if (fileInput) fileInput.value = '';
                const altEl = document.getElementById('imageAltInput'); if (altEl) altEl.value = q.image_alt || '';
            } else {
                const tc = document.getElementById('textContentInput');
                if (tc) { tc.value = q.text_content || ''; tc.dispatchEvent(new Event('input')); }
            }
            // الخيارات: ثابتة (أ ب ج د) أم نصية
            const texts = (choices || []).map((c) => c.text_content || '');
            const isFixed = texts.length === 4 && ['أ', 'ب', 'ج', 'د'].every((v, i) => texts[i] === v);
            const correctIdx = Math.max(0, (choices || []).findIndex((c) => c.is_correct));
            const modeRadio = document.querySelector(`input[name="choicesMode"][value="${isFixed ? 'fixed' : 'text'}"]`);
            if (modeRadio) { modeRadio.checked = true; modeRadio.dispatchEvent(new Event('change')); }
            if (isFixed) {
                const r = document.querySelector(`input[name="correctChoiceFixed"][value="${correctIdx}"]`); if (r) r.checked = true;
            } else {
                document.querySelectorAll('.choice-text').forEach((inp, i) => { inp.value = texts[i] || ''; inp.dispatchEvent(new Event('input')); });
                const r = document.querySelector(`input[name="correctChoiceText"][value="${correctIdx}"]`); if (r) r.checked = true;
            }
            // زرّ الحفظ + شريط وضع التعديل
            const btn = document.getElementById('submitQuestionBtn');
            if (btn) btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ تعديل السؤال';
            let bar = document.getElementById('editingBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'editingBar';
                bar.className = 'mb-3 p-3 rounded-lg bg-amber-50 border border-amber-200 flex items-center justify-between gap-2';
                const form = document.getElementById('questionForm');
                form.parentNode.insertBefore(bar, form);
            }
            bar.innerHTML = `<span class="text-sm font-bold text-amber-800"><i class="fa-solid fa-pen"></i> تعدّل الآن السؤال رقم ${q.question_number}</span><button type="button" id="cancelEditBtn" class="text-gray-500 hover:text-gray-700 font-bold text-sm"><i class="fa-solid fa-xmark"></i> إلغاء التعديل</button>`;
            document.getElementById('cancelEditBtn').addEventListener('click', cancelEditQuestion);
            await loadQuestions();
            const form = document.getElementById('questionForm');
            if (form && form.scrollIntoView) form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        function cancelEditQuestion() {
            editingQuestionId = null; editingImageUrl = null; editingVideoUrl = null; selectedImageFile = null;
            const form = document.getElementById('questionForm'); if (form) form.reset();
            document.getElementById('questionType').dispatchEvent(new Event('change'));
            const cm = document.querySelector('input[name="choicesMode"]:checked'); if (cm) cm.dispatchEvent(new Event('change'));
            const qvm = document.querySelector('input[name="questionVideoMode"]:checked'); if (qvm) qvm.dispatchEvent(new Event('change'));
            const imgPrev = document.getElementById('imagePreview'); if (imgPrev) imgPrev.classList.add('hidden');
            const btn = document.getElementById('submitQuestionBtn'); if (btn) btn.innerHTML = '<i class="fa-solid fa-plus"></i> إضافة السؤال';
            const bar = document.getElementById('editingBar'); if (bar) bar.remove();
            loadQuestions();
        }

        function initContentHubLogic() {
            loadNodeOptions();

            // [#2] طيّ/فتح قائمة الأسئلة
            const qToggle = document.getElementById('questionsToggle');
            if (qToggle) qToggle.addEventListener('click', () => {
                const l = document.getElementById('questionsList');
                const ch = document.getElementById('questionsChevron');
                const hidden = l.classList.toggle('hidden');
                if (ch) ch.style.transform = hidden ? 'rotate(180deg)' : '';
            });

            document.getElementById('saveAttachmentsBtn').addEventListener('click', async () => {
                if (!currentExamId) { showStatus('اختر اختبارًا أولاً.', false); return; }
                const btn = document.getElementById('saveAttachmentsBtn');
                btn.disabled = true;
                btn.textContent = 'جاري الحفظ...';
                try {
                    const updates = {};
                    const examVideoMode = document.querySelector('input[name="examVideoMode"]:checked').value;
                    if (examVideoMode === 'link') {
                        const videoUrl = document.getElementById('examVideoUrlInput').value.trim();
                        if (videoUrl) updates.video_url = videoUrl;
                    } else {
                        const videoFile = document.getElementById('examVideoFileInput').files[0];
                        if (videoFile) {
                            const videoExt = (videoFile.name.split('.').pop() || 'mp4').toLowerCase();
                            const videoPath = `exam-${currentExamId}-video-${Date.now()}.${videoExt}`;
                            const { error: videoErr } = await db.storage.from('exam-videos').upload(videoPath, videoFile);
                            if (videoErr) throw videoErr;
                            updates.video_url = db.storage.from('exam-videos').getPublicUrl(videoPath).data.publicUrl;
                        }
                    }
                    const unsolvedFile = document.getElementById('unsolvedPdfInput').files[0];
                    if (unsolvedFile) {
                        const unsolvedExt = (unsolvedFile.name.split('.').pop() || 'pdf').toLowerCase();
                        const path = `exam-${currentExamId}-unsolved-${Date.now()}.${unsolvedExt}`;
                        const { error: upErr } = await db.storage.from('exam-pdfs').upload(path, unsolvedFile);
                        if (upErr) throw upErr;
                        updates.unsolved_pdf_url = db.storage.from('exam-pdfs').getPublicUrl(path).data.publicUrl;
                    }
                    const solvedFile = document.getElementById('solvedPdfInput').files[0];
                    if (solvedFile) {
                        const solvedExt = (solvedFile.name.split('.').pop() || 'pdf').toLowerCase();
                        const path = `exam-${currentExamId}-solved-${Date.now()}.${solvedExt}`;
                        const { error: upErr2 } = await db.storage.from('exam-pdfs').upload(path, solvedFile);
                        if (upErr2) throw upErr2;
                        updates.solved_pdf_url = db.storage.from('exam-pdfs').getPublicUrl(path).data.publicUrl;
                    }
                    const { error } = await db.from('exams').update(updates).eq('id', currentExamId);
                    if (error) throw error;
                    showStatus('تم حفظ المرفقات بنجاح.', true);
                    document.getElementById('examVideoFileInput').value = '';
                    document.getElementById('unsolvedPdfInput').value = '';
                    document.getElementById('solvedPdfInput').value = '';
                    await loadExamOptions();
                    document.getElementById('examSelect').value = currentExamId;
                } catch (err) {
                    showStatus('تعذّر الحفظ: ' + err.message, false);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ المرفقات';
                }
            });

            document.getElementById('examSelect').addEventListener('change', async (e) => {
                currentExamId = e.target.value;
                if (currentExamId) { fillAttachmentsFields(currentExamId); await loadQuestions(); }
            });

            document.getElementById('newExamBtn').addEventListener('click', async () => {
                if (!currentNodeId) { showStatus('اختر قسمًا أولاً.', false); return; }
                const { data: existing, error: countErr } = await db.from('exams').select('exam_number').eq('node_id', currentNodeId).order('exam_number', { ascending: false }).limit(1);
                if (countErr) { showStatus('خطأ: ' + countErr.message, false); return; }
                const nextNumber = existing.length ? existing[0].exam_number + 1 : 1;
                const { error } = await db.from('exams').insert({ node_id: currentNodeId, exam_number: nextNumber, title: `اختبار رقم ${nextNumber}`, sort_order: nextNumber });
                if (error) { showStatus('تعذّر إنشاء الاختبار: ' + error.message, false); return; }
                showStatus(`تم إنشاء اختبار رقم ${nextNumber}.`, true);
                await loadExamOptions();
            });

            document.getElementById('deleteExamBtn').addEventListener('click', async () => {
                if (!currentExamId) { showStatus('اختر اختبارًا أولاً.', false); return; }
                const examLabel = document.getElementById('examSelect').selectedOptions[0]?.textContent || 'هذا الاختبار';
                if (!confirm(`حذف "${examLabel}" نهائيًا مع كل أسئلته وخياراته؟ لا يمكن التراجع.`)) return;
                const { error } = await db.from('exams').delete().eq('id', currentExamId);
                if (error) { showStatus('تعذّر الحذف: ' + error.message, false); return; }
                showStatus('تم حذف الاختبار.', true);
                await loadExamOptions();
            });

            function bindPreview(inputEl, previewEl) {
                const update = () => { previewEl.innerHTML = renderMathText(inputEl.value) || '<span class="text-gray-300">—</span>'; };
                inputEl.addEventListener('input', update);
                update();
            }
            // [ميزة 2] أرقام هندية في حقول المحتوى النصّي (قبل ربط المعاينة ليعرضها محوّلة)
            bindArabicIndicInput(document.getElementById('textContentInput'));
            bindArabicIndicInput(document.getElementById('imageAltInput'));
            bindPreview(document.getElementById('textContentInput'), document.getElementById('textContentPreview'));
            document.querySelectorAll('.choice-text').forEach((input) => {
                bindArabicIndicInput(input);
                const preview = input.parentElement.querySelector('.choice-preview');
                if (preview) bindPreview(input, preview);
                // [ميزة 4] لصق أربعة خيارات دفعةً واحدة يوزّعها تلقائيًا على الحقول
                input.addEventListener('paste', (e) => {
                    const clip = (e.clipboardData || window.clipboardData);
                    if (!clip) return;
                    const raw = clip.getData('text');
                    const parts = splitPastedChoices(raw);
                    if (parts.length < 2) return; // لصق عادي لخيار واحد
                    e.preventDefault();
                    const inputs = Array.from(document.querySelectorAll('.choice-text'));
                    const start = inputs.indexOf(input);
                    let filled = 0;
                    parts.slice(0, inputs.length - start).forEach((p, i) => {
                        const el = inputs[start + i];
                        if (el) { el.value = toArabicIndic(p); el.dispatchEvent(new Event('input')); filled++; }
                    });
                    showStatus(`تم توزيع ${filled} خيارات على الحقول.`, true);
                });
            });

            document.getElementById('attachmentsToggle').addEventListener('click', () => {
                document.getElementById('attachmentsBody').classList.toggle('hidden');
                document.getElementById('attachmentsChevron').classList.toggle('fa-chevron-down');
                document.getElementById('attachmentsChevron').classList.toggle('fa-chevron-up');
            });
            document.getElementById('questionVideoToggle').addEventListener('click', () => {
                document.getElementById('questionVideoBody').classList.toggle('hidden');
                document.getElementById('questionVideoChevron').classList.toggle('fa-chevron-down');
                document.getElementById('questionVideoChevron').classList.toggle('fa-chevron-up');
            });
            document.getElementById('questionType').addEventListener('change', (e) => {
                const isImage = e.target.value === 'image';
                document.getElementById('imageFieldWrap').classList.toggle('hidden', !isImage);
                document.getElementById('textFieldWrap').classList.toggle('hidden', isImage);
            });
            document.querySelectorAll('input[name="examVideoMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isUpload = e.target.value === 'upload';
                    document.getElementById('examVideoUploadWrap').classList.toggle('hidden', !isUpload);
                    document.getElementById('examVideoLinkWrap').classList.toggle('hidden', isUpload);
                });
            });
            document.querySelectorAll('input[name="questionVideoMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isUpload = e.target.value === 'upload';
                    document.getElementById('questionVideoFileInput').classList.toggle('hidden', !isUpload);
                    document.getElementById('questionVideoUrlInput').classList.toggle('hidden', isUpload);
                });
            });
            document.querySelectorAll('input[name="choicesMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isFixed = e.target.value === 'fixed';
                    document.getElementById('fixedChoicesWrap').classList.toggle('hidden', !isFixed);
                    document.getElementById('textChoicesWrap').classList.toggle('hidden', isFixed);
                });
            });
            document.getElementById('imageFileInput').addEventListener('change', (e) => {
                selectedImageFile = e.target.files[0] || null;
                const preview = document.getElementById('imagePreview');
                if (selectedImageFile) { preview.src = URL.createObjectURL(selectedImageFile); preview.classList.remove('hidden'); }
                else { preview.classList.add('hidden'); }
            });

            document.getElementById('questionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitQuestionBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'جاري الحفظ...';
                try {
                    if (!currentExamId) throw new Error('اختر اختبارًا أولاً (أنشئ واحدًا لو لم يوجد).');
                    const qType = document.getElementById('questionType').value;
                    const choicesMode = document.querySelector('input[name="choicesMode"]:checked').value;
                    let correctIndex, choiceTexts;
                    if (choicesMode === 'fixed') {
                        correctIndex = Number(document.querySelector('input[name="correctChoiceFixed"]:checked').value);
                        choiceTexts = ['أ', 'ب', 'ج', 'د'];
                    } else {
                        correctIndex = Number(document.querySelector('input[name="correctChoiceText"]:checked').value);
                        choiceTexts = Array.from(document.querySelectorAll('.choice-text')).map(i => i.value.trim());
                        if (choiceTexts.some(t => !t)) throw new Error('يجب تعبئة كل الخيارات الأربعة.');
                    }
                    const { data: existing, error: countErr } = await db.from('questions').select('question_number').eq('exam_id', currentExamId).order('question_number', { ascending: false }).limit(1);
                    if (countErr) throw countErr;
                    const nextNumber = existing.length ? existing[0].question_number + 1 : 1;
                    let imageUrl = null;
                    let textContent = null;
                    if (qType === 'image') {
                        if (selectedImageFile) {
                            const imgExt = (selectedImageFile.name.split('.').pop() || 'png').toLowerCase();
                            const filePath = `q-${currentExamId}-${Date.now()}.${imgExt}`;
                            const { error: uploadErr } = await db.storage.from('question-images').upload(filePath, selectedImageFile);
                            if (uploadErr) throw uploadErr;
                            const { data: publicUrlData } = db.storage.from('question-images').getPublicUrl(filePath);
                            imageUrl = publicUrlData.publicUrl;
                        } else if (editingQuestionId && editingImageUrl) {
                            imageUrl = editingImageUrl; // [#2] الإبقاء على صورة السؤال الحالية عند التعديل
                        } else {
                            throw new Error('اختر صورة السؤال.');
                        }
                    } else {
                        textContent = document.getElementById('textContentInput').value.trim();
                        if (!textContent) throw new Error('اكتب نص السؤال.');
                    }
                    let questionVideoUrl = null;
                    const questionVideoMode = document.querySelector('input[name="questionVideoMode"]:checked').value;
                    if (questionVideoMode === 'link') {
                        const link = document.getElementById('questionVideoUrlInput').value.trim();
                        if (link) questionVideoUrl = link;
                    } else {
                        const questionVideoFile = document.getElementById('questionVideoFileInput').files[0];
                        if (questionVideoFile) {
                            const vExt = (questionVideoFile.name.split('.').pop() || 'mp4').toLowerCase();
                            const vPath = `q-${currentExamId}-${Date.now()}-video.${vExt}`;
                            const { error: vErr } = await db.storage.from('exam-videos').upload(vPath, questionVideoFile);
                            if (vErr) throw vErr;
                            questionVideoUrl = db.storage.from('exam-videos').getPublicUrl(vPath).data.publicUrl;
                        }
                    }
                    // [#2] عند التعديل: أبقِ الفيديو الحالي إن لم يُدخل المسؤول فيديو جديد
                    if (editingQuestionId && !questionVideoUrl) questionVideoUrl = editingVideoUrl;
                    const imageAlt = qType === 'image' ? document.getElementById('imageAltInput').value.trim() : null;
                    const choiceKeys = ['a', 'b', 'c', 'd'];
                    if (editingQuestionId) {
                        // ===== وضع التعديل: تحديث السؤال نفسه مع الإبقاء على رقمه وترتيبه =====
                        const { error: uErr } = await db.from('questions').update({
                            question_type: qType, text_content: textContent, image_url: imageUrl,
                            image_alt: imageAlt, video_url: questionVideoUrl
                        }).eq('id', editingQuestionId);
                        if (uErr) throw uErr;
                        // استبدال الخيارات: حذف القديمة ثم إدراج الجديدة
                        const { error: delErr } = await db.from('choices').delete().eq('question_id', editingQuestionId);
                        if (delErr) throw delErr;
                        const editPayload = choiceTexts.map((label, i) => ({ question_id: editingQuestionId, choice_key: choiceKeys[i], text_content: label, is_correct: i === correctIndex, sort_order: i + 1 }));
                        const { error: ecErr } = await db.from('choices').insert(editPayload);
                        if (ecErr) throw ecErr;
                        showStatus('تم تحديث السؤال بنجاح.', true);
                        cancelEditQuestion(); // يعيد النموذج لوضع الإضافة ويعيد تحميل القائمة
                    } else {
                        // ===== وضع الإضافة =====
                        const { data: newQuestion, error: qErr } = await db.from('questions').insert({
                            exam_id: currentExamId, question_number: nextNumber, question_type: qType,
                            text_content: textContent, image_url: imageUrl,
                            image_alt: imageAlt,
                            video_url: questionVideoUrl, sort_order: nextNumber
                        }).select().single();
                        if (qErr) throw qErr;
                        const choicesPayload = choiceTexts.map((label, i) => ({ question_id: newQuestion.id, choice_key: choiceKeys[i], text_content: label, is_correct: i === correctIndex, sort_order: i + 1 }));
                        const { error: cErr } = await db.from('choices').insert(choicesPayload);
                        if (cErr) throw cErr;
                        showStatus('تمت إضافة السؤال بنجاح.', true);
                        document.getElementById('questionForm').reset();
                        document.getElementById('imagePreview').classList.add('hidden');
                        selectedImageFile = null;
                        // [إصلاح] مزامنة الحقول مع القيم الفعلية بعد reset() — بدل فرض «وضع النص»
                        // الذي كان يتعارض مع الافتراضي «صورة»، فيُظهر مربّع النص رغم اختيار «صورة».
                        document.getElementById('questionType').dispatchEvent(new Event('change'));
                        const cmChecked = document.querySelector('input[name="choicesMode"]:checked');
                        if (cmChecked) cmChecked.dispatchEvent(new Event('change'));
                        const qvmChecked = document.querySelector('input[name="questionVideoMode"]:checked');
                        if (qvmChecked) qvmChecked.dispatchEvent(new Event('change'));
                        await loadQuestions();
                    }
                } catch (err) {
                    showStatus('خطأ: ' + err.message, false);
                } finally {
                    submitBtn.disabled = false;
                    // احترم وضع التعديل: أبقِ زرّ الحفظ إن بقينا في وضع تعديل بعد خطأ
                    submitBtn.innerHTML = editingQuestionId
                        ? '<i class="fa-solid fa-floppy-disk"></i> حفظ تعديل السؤال'
                        : '<i class="fa-solid fa-plus"></i> إضافة السؤال';
                }
            });

            initBulkImport();
            initSelectionAndPreview();
        }

        // =================================================================
        // [ميزة 1] تحديد متعدّد + نسخ/نقل/حذف   [ميزة 3+4] معاينة الاختبار والوسائط
        // =================================================================
        function setSelectMode(on) {
            selectMode = on;
            selectedQuestionIds.clear();
            const tb = document.getElementById('selectionToolbar');
            const btn = document.getElementById('toggleSelectModeBtn');
            if (tb) tb.classList.toggle('hidden', !on);
            if (tb) tb.classList.toggle('flex', on);
            if (btn) btn.innerHTML = on ? '<i class="fa-solid fa-xmark"></i> إنهاء التحديد' : '<i class="fa-solid fa-square-check"></i> تحديد';
            const allCb = document.getElementById('selectAllQuestions'); if (allCb) allCb.checked = false;
            loadQuestions();
        }

        function initSelectionAndPreview() {
            const tgl = document.getElementById('toggleSelectModeBtn');
            if (tgl) tgl.addEventListener('click', () => setSelectMode(!selectMode));
            const allCb = document.getElementById('selectAllQuestions');
            if (allCb) allCb.addEventListener('change', () => {
                document.querySelectorAll('#questionsList .q-select-cb').forEach((cb) => {
                    cb.checked = allCb.checked;
                    cb.dispatchEvent(new Event('change'));
                });
            });
            const delBtn = document.getElementById('bulkDeleteBtn');
            if (delBtn) delBtn.addEventListener('click', bulkDeleteSelected);
            const copyBtn = document.getElementById('bulkCopyBtn');
            if (copyBtn) copyBtn.addEventListener('click', () => openMoveCopyModal('copy'));
            const moveBtn = document.getElementById('bulkMoveBtn');
            if (moveBtn) moveBtn.addEventListener('click', () => openMoveCopyModal('move'));

            // نافذة النسخ/النقل
            document.getElementById('moveCopyCloseBtn').addEventListener('click', closeMoveCopyModal);
            document.getElementById('moveCopyModal').addEventListener('click', (e) => { if (e.target.id === 'moveCopyModal') closeMoveCopyModal(); });
            document.querySelectorAll('.mctarget-btn').forEach((b) => b.addEventListener('click', () => {
                const t = b.dataset.mctarget;
                document.querySelectorAll('.mctarget-btn').forEach((x) => {
                    const on = x === b;
                    x.classList.toggle('bg-white', on); x.classList.toggle('shadow-sm', on);
                    x.classList.toggle('text-blue-900', on); x.classList.toggle('text-gray-500', !on);
                });
                document.getElementById('mcExistingWrap').classList.toggle('hidden', t !== 'existing');
                document.getElementById('mcNewWrap').classList.toggle('hidden', t !== 'new');
            }));
            document.getElementById('moveCopyConfirmBtn').addEventListener('click', performMoveCopy);
            const mcSearch = document.getElementById('mcExamSearch');
            if (mcSearch) mcSearch.addEventListener('input', debounce(() => { if (mcGroupedCache) fillMcExamOptions(mcGroupedCache, mcSearch.value); }, 200));

            // نافذة معاينة الاختبار
            const pvBtn = document.getElementById('previewExamBtn');
            if (pvBtn) pvBtn.addEventListener('click', () => { if (currentExamId) openExamPreview(currentExamId); else showStatus('اختر اختبارًا أولاً.', false); });
            document.getElementById('examPreviewCloseBtn').addEventListener('click', () => {
                const m = document.getElementById('examPreviewModal'); m.classList.add('hidden'); m.classList.remove('flex');
            });
            document.getElementById('examPreviewModal').addEventListener('click', (e) => { if (e.target.id === 'examPreviewModal') { e.currentTarget.classList.add('hidden'); e.currentTarget.classList.remove('flex'); } });
            document.getElementById('examPreviewSelect').addEventListener('change', (e) => { if (e.target.value) renderExamPreview(e.target.value); });
        }

        async function bulkDeleteSelected() {
            if (!selectedQuestionIds.size) { showStatus('لم تحدّد أي سؤال.', false); return; }
            if (!confirm(`حذف ${selectedQuestionIds.size} سؤالًا نهائيًا مع خياراتها؟ لا يمكن التراجع.`)) return;
            const ids = [...selectedQuestionIds];
            const { error } = await db.from('questions').delete().in('id', ids);
            if (error) { showStatus('تعذّر الحذف: ' + error.message, false); return; }
            showStatus(`تم حذف ${ids.length} سؤالًا.`, true);
            setSelectMode(false);
        }

        let moveCopyOp = 'copy';
        // [توسيع] بناء خريطة مسارات الأقسام + كل الاختبارات مجمّعة حسب القسم (لكل الأقسام)
        async function buildAllExamsGrouped() {
            const { data: nodes } = await db.from('nodes').select('id, key, type, parent_id').order('sort_order');
            const byId = new Map((nodes || []).map((n) => [n.id, n]));
            const pathOf = (id) => {
                const parts = [];
                let cur = byId.get(id);
                while (cur) { parts.unshift(cur.key); cur = byId.get(cur.parent_id); }
                return parts.join(' ← ');
            };
            const testGroups = (nodes || []).filter((n) => n.type === 'testGroup');
            const exams = await fetchAllRows(() => db.from('exams').select('id, exam_number, title, node_id').order('exam_number'));
            const byNode = new Map();
            (exams || []).forEach((e) => { if (!byNode.has(e.node_id)) byNode.set(e.node_id, []); byNode.get(e.node_id).push(e); });
            return { testGroups, byNode, pathOf };
        }

        // تعبئة قائمة الاختبارات الهدف عبر كل الأقسام (مع بحث اختياري) مستثنيةً الاختبار الحالي
        function fillMcExamOptions(grouped, filter) {
            const sel = document.getElementById('mcExamSelect');
            const f = (filter || '').trim().toLowerCase();
            let html = '';
            grouped.testGroups.forEach((tg) => {
                const path = grouped.pathOf(tg.id);
                const exams = (grouped.byNode.get(tg.id) || []).filter((e) => e.id !== currentExamId);
                const matched = exams.filter((e) => {
                    if (!f) return true;
                    const label = ((e.title || 'اختبار رقم ' + e.exam_number) + ' ' + path).toLowerCase();
                    return label.includes(f);
                });
                if (!matched.length) return;
                html += `<optgroup label="${escapeHtml(path)}">` +
                    matched.map((e) => `<option value="${e.id}">${escapeHtml(e.title || 'اختبار رقم ' + e.exam_number)}</option>`).join('') +
                    '</optgroup>';
            });
            sel.innerHTML = html || '<option value="">لا توجد اختبارات مطابقة — استخدم «اختبار جديد»</option>';
        }

        let mcGroupedCache = null;
        async function openMoveCopyModal(op) {
            if (!selectedQuestionIds.size) { showStatus('حدّد سؤالًا واحدًا على الأقل.', false); return; }
            moveCopyOp = op;
            document.getElementById('moveCopyTitle').innerHTML = op === 'copy'
                ? '<i class="fa-solid fa-copy text-emerald-600"></i> نسخ الأسئلة'
                : '<i class="fa-solid fa-arrow-right-arrow-left text-amber-600"></i> نقل الأسئلة';
            document.getElementById('moveCopyCount').textContent = `عدد الأسئلة المحدّدة: ${toArabicIndic(selectedQuestionIds.size)}`;
            document.getElementById('moveCopyStatus').classList.add('hidden');
            document.getElementById('mcNewName').value = '';
            const searchEl = document.getElementById('mcExamSearch'); if (searchEl) searchEl.value = '';
            // اختبارات الهدف = كل اختبارات كل الأقسام (عدا الاختبار الحالي)
            mcGroupedCache = await buildAllExamsGrouped();
            fillMcExamOptions(mcGroupedCache, '');
            // قائمة الأقسام لإنشاء اختبار جديد في أي قسم (الافتراضي القسم الحالي)
            const secSel = document.getElementById('mcNewSectionSelect');
            secSel.innerHTML = mcGroupedCache.testGroups.map((tg) => `<option value="${tg.id}" ${tg.id === currentNodeId ? 'selected' : ''}>${escapeHtml(mcGroupedCache.pathOf(tg.id))}</option>`).join('');
            // ابدأ على تبويب «اختبار موجود»
            document.querySelector('.mctarget-btn[data-mctarget="existing"]').click();
            const m = document.getElementById('moveCopyModal'); m.classList.remove('hidden'); m.classList.add('flex');
        }
        function closeMoveCopyModal() { const m = document.getElementById('moveCopyModal'); m.classList.add('hidden'); m.classList.remove('flex'); }

        async function performMoveCopy() {
            const btn = document.getElementById('moveCopyConfirmBtn');
            const statusEl = document.getElementById('moveCopyStatus');
            const setStatus = (msg, ok) => { statusEl.className = `p-3 rounded-lg text-sm font-bold ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`; statusEl.textContent = msg; statusEl.classList.remove('hidden'); };
            const isNew = !document.getElementById('mcNewWrap').classList.contains('hidden');
            btn.disabled = true;
            try {
                let targetExamId;
                if (isNew) {
                    const name = document.getElementById('mcNewName').value.trim();
                    if (!name) { setStatus('اكتب اسم الاختبار الجديد.', false); btn.disabled = false; return; }
                    const targetNodeId = document.getElementById('mcNewSectionSelect').value || currentNodeId;
                    const { data: ex, error: exErr } = await db.from('exams').select('exam_number').eq('node_id', targetNodeId).order('exam_number', { ascending: false }).limit(1);
                    if (exErr) throw exErr;
                    const nextExamNum = ex && ex.length ? ex[0].exam_number + 1 : 1;
                    const { data: created, error: cErr } = await db.from('exams').insert({ node_id: targetNodeId, exam_number: nextExamNum, title: name, sort_order: nextExamNum }).select().single();
                    if (cErr) throw cErr;
                    targetExamId = created.id;
                } else {
                    targetExamId = document.getElementById('mcExamSelect').value;
                    if (!targetExamId) { setStatus('اختر اختبارًا هدفًا أو أنشئ اختبارًا جديدًا.', false); btn.disabled = false; return; }
                }
                const ids = [...selectedQuestionIds];
                // رقم البداية في الاختبار الهدف
                const { data: tExisting } = await db.from('questions').select('question_number').eq('exam_id', targetExamId).order('question_number', { ascending: false }).limit(1);
                let nextNumber = tExisting && tExisting.length ? tExisting[0].question_number + 1 : 1;

                if (moveCopyOp === 'move') {
                    // النقل: نحدّث exam_id ورقم السؤال ليُضاف في نهاية الاختبار الهدف (تُنقل خياراته معه تلقائيًا)
                    for (const qid of ids) {
                        const { error } = await db.from('questions').update({ exam_id: targetExamId, question_number: nextNumber, sort_order: nextNumber }).eq('id', qid);
                        if (error) throw error;
                        nextNumber++;
                    }
                    setStatus(`تم نقل ${toArabicIndic(ids.length)} سؤالًا.`, true);
                } else {
                    // النسخ: نكرّر صفوف الأسئلة وخياراتها
                    for (const qid of ids) {
                        const { data: q, error: qErr } = await db.from('questions').select('question_type, text_content, image_url, image_alt, video_url').eq('id', qid).single();
                        if (qErr) throw qErr;
                        const { data: nq, error: iErr } = await db.from('questions').insert({ exam_id: targetExamId, question_number: nextNumber, question_type: q.question_type, text_content: q.text_content, image_url: q.image_url, image_alt: q.image_alt, video_url: q.video_url, sort_order: nextNumber }).select().single();
                        if (iErr) throw iErr;
                        const { data: chs, error: chErr } = await db.from('choices').select('choice_key, text_content, image_url, is_correct, sort_order').eq('question_id', qid).order('sort_order');
                        if (chErr) throw chErr;
                        if (chs && chs.length) {
                            const payload = chs.map((c) => ({ question_id: nq.id, choice_key: c.choice_key, text_content: c.text_content, image_url: c.image_url, is_correct: c.is_correct, sort_order: c.sort_order }));
                            const { error: ciErr } = await db.from('choices').insert(payload);
                            if (ciErr) throw ciErr;
                        }
                        nextNumber++;
                    }
                    setStatus(`تم نسخ ${toArabicIndic(ids.length)} سؤالًا.`, true);
                }
                setTimeout(() => { closeMoveCopyModal(); setSelectMode(false); if (moveCopyOp === 'move') loadExamOptions(); }, 900);
            } catch (err) {
                setStatus('تعذّر التنفيذ: ' + err.message, false);
            } finally {
                btn.disabled = false;

        // تحويل رابط يوتيوب إلى صيغة تضمين

            if (!url) return null;

            if (yt) return 'https://www.youtube.com/embed/' + yt[1];
            return null;
        }
        function mediaBlock(url, label) {
            if (!url) return '';

            if (embed) return `<div class="mb-3"><p class="text-xs font-bold text-gray-500 mb-1">${label}</p><div class="aspect-video rounded-lg overflow-hidden border border-gray-200"><iframe src="${escapeHtml(embed)}" class="w-full h-full" allowfullscreen loading="lazy"></iframe></div></div>`;
            return `<div class="mb-3"><p class="text-xs font-bold text-gray-500 mb-1">${label}</p><video src="${escapeHtml(url)}" controls class="w-full rounded-lg border border-gray-200 max-h-72"></video></div>`;
        }
