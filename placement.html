<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار تحديد المستوى — منصة القمة التعليمية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=El+Messiri:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body{font-family:'Almarai',sans-serif;background:#f1f5f9}
  h1,h2,h3{font-family:'El Messiri',serif}
  .choice:hover{border-color:#2563eb;background:#eff6ff}
  .branch-card{transition:transform .2s ease, box-shadow .2s ease;cursor:pointer}
  .branch-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 22px 40px -18px rgba(2,6,23,.55)}
  .report-card{position:relative;overflow:hidden}
  .wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;pointer-events:none;z-index:0;opacity:.05}
  .wm svg{width:60%;max-width:420px;color:#1e3a8a}
  .wm b{font-family:'El Messiri',serif;font-size:64px;color:#1e3a8a;margin-top:-10px}
  .report-inner{position:relative;z-index:1}
  @media print{
    @page{margin:14mm}
    body{background:#fff}
    .no-print{display:none !important}
    .report-card{box-shadow:none !important;border:none !important}
    .wm{opacity:.08}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body class="text-gray-900 min-h-screen">
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- ترويسة الهوية -->
  <div id="brandHeader" class="flex items-center gap-3 mb-6 justify-center text-blue-900 no-print">
    <div class="w-12 h-12 rounded-2xl bg-blue-900 flex items-center justify-center shrink-0" id="logoBadge"></div>
    <div><h1 class="font-black text-lg leading-tight">منصة القمة التعليمية</h1><p class="text-yellow-600 font-bold text-xs">اختبار تحديد المستوى</p></div>
  </div>

  <!-- شاشة اختيار الفرع -->
  <div id="introScreen">
    <div class="text-center mb-7">
      <h2 class="text-3xl font-black text-blue-900 mb-2">اكتشف مستواك الحقيقي</h2>
      <p class="text-gray-500 text-sm leading-relaxed max-w-lg mx-auto">اختر الفرع الذي تريد تشخيص مستواك فيه. اختبار ذكي قصير يمرّ على كل أقسام الفرع، ويعطيك تقريرًا مفصّلًا بنقاط قوتك وضعفك — مجانًا وبلا تسجيل.</p>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
      <input type="text" id="nameInput" placeholder="اسمك (اختياري)" class="border border-gray-200 rounded-lg px-3 py-2.5">
      <input type="tel" id="phoneInput" placeholder="جوالك (اختياري)" class="border border-gray-200 rounded-lg px-3 py-2.5">
    </div>
    <div id="introError" class="hidden mb-3 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
    <div id="branchGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <p class="text-center text-blue-800 font-bold py-10 col-span-full"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحميل الفروع...</p>
    </div>
  </div>

  <!-- شاشة الاختبار -->
  <div id="quizScreen" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex items-center justify-between mb-2 text-xs font-bold text-gray-500">
      <span id="branchLabel"></span><span id="progressLabel"></span>
    </div>
    <div class="w-full h-2 bg-gray-100 rounded-full mb-1 overflow-hidden"><div id="progressBar" class="h-full bg-blue-600 rounded-full transition-all" style="width:0%"></div></div>
    <p id="sectionLabel" class="text-[11px] text-blue-600 font-black mb-5"></p>
    <div id="questionArea" class="mb-5 min-h-[60px]"></div>
    <div id="choicesArea" class="space-y-2"></div>
    <p id="quizStatus" class="hidden text-center text-blue-700 font-bold text-sm mt-4"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>
  </div>

  <!-- شاشة التقرير -->
  <div id="reportScreen" class="hidden"></div>
</div>

<script>
(function(){
  'use strict';
  const SUPABASE_URL = 'https://islxgvjvrxebdtihrkbq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable__ogPxzJzKKighw363hqGqg_HOIQEn7A';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const arNum = (s) => String(s==null?'':s).replace(/[0-9]/g,(d)=>'٠١٢٣٤٥٦٧٨٩'[d]);
  let token = null, selectedBranch = null;

  const MOUNTAIN = '<svg viewBox="0 0 100 80"><path d="M2 76 L30 26 L44 48 L62 14 L98 76 Z" fill="currentColor"/><path d="M62 14 L54 26 L70 26 Z" fill="#fde68a"/></svg>';
  $('logoBadge').innerHTML = '<span style="color:#fde047;display:block;width:26px">'+MOUNTAIN+'</span>';

  function show(screen){ ['introScreen','quizScreen','reportScreen'].forEach((s)=>$(s).classList.toggle('hidden', s!==screen)); }

  async function call(fn, body){
    const { data, error } = await db.functions.invoke(fn, { body });
    if (error){ let m=error.message; try{ if(error.context&&typeof error.context.json==='function'){const b=await error.context.json(); if(b&&b.error)m=b.error;} }catch(_e){} throw new Error(m); }
    if (data && data.error) throw new Error(data.error);
    return data;
  }

  // ===== شبكة الفروع =====
  function branchStyle(b){
    const s = String(b);
    if (s.includes('كمي')) return { icon:'fa-calculator', g:['#2563eb','#4338ca'] };
    if (s.includes('لفظي')) return { icon:'fa-book-open', g:['#7c3aed','#a21caf'] };
    if (s.includes('رياضيات')) return { icon:'fa-square-root-variable', g:['#059669','#0d9488'] };
    if (s.includes('فيزياء')) return { icon:'fa-atom', g:['#0891b2','#0369a1'] };
    if (s.includes('كيمياء')) return { icon:'fa-flask', g:['#f59e0b','#ea580c'] };
    if (s.includes('أحياء')||s.includes('احياء')) return { icon:'fa-dna', g:['#e11d48','#db2777'] };
    return { icon:'fa-graduation-cap', g:['#475569','#1e293b'] };
  }
  async function loadBranches(){
    try {
      const d = await call('placement-branches', {});
      const list = d.branches || [];
      if (!list.length){ $('branchGrid').innerHTML = '<p class="text-center text-gray-400 font-bold py-10 col-span-full">لا توجد فروع متاحة بعد.</p>'; return; }
      $('branchGrid').innerHTML = '';
      list.forEach((b)=>{
        const st = branchStyle(b.branch);
        const card = document.createElement('div');
        card.className = 'branch-card rounded-2xl p-5 text-white flex items-center gap-4';
        card.style.background = 'linear-gradient(135deg,'+st.g[0]+','+st.g[1]+')';
        card.innerHTML = `
          <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center shrink-0"><i class="fa-solid ${st.icon} text-2xl"></i></div>
          <div class="flex-1 min-w-0">
            <p class="font-black text-lg truncate">${esc(b.branch)}</p>
            <p class="text-white/80 text-xs font-bold">${arNum(b.sections)} أقسام · ${arNum(b.questions)} سؤالًا</p>
          </div>
          <i class="fa-solid fa-chevron-left text-white/70"></i>`;
        card.addEventListener('click', ()=> startBranch(b.branch));
        $('branchGrid').appendChild(card);
      });
    } catch (err) {
      $('branchGrid').innerHTML = `<p class="text-center text-red-600 font-bold py-10 col-span-full">${esc(err.message)}</p>`;
    }
  }

  async function startBranch(branch){
    selectedBranch = branch;
    $('introError').classList.add('hidden');
    show('quizScreen');
    $('questionArea').innerHTML=''; $('choicesArea').innerHTML='';
    $('quizStatus').classList.remove('hidden'); $('quizStatus').innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحضير اختبار '+esc(branch)+'...';
    try {
      const d = await call('placement-start', { branch, name: $('nameInput').value.trim()||null, phone: $('phoneInput').value.trim()||null });
      token = d.token;
      renderQuestion(d);
    } catch (err) {
      show('introScreen'); $('introError').textContent = err.message; $('introError').classList.remove('hidden');
    }
  }

  // ===== الاختبار =====
  function renderQuestion(d){
    show('quizScreen');
    $('branchLabel').textContent = 'فرع: ' + d.branch;
    $('sectionLabel').textContent = 'القسم: ' + d.section + ' (' + arNum(d.section_index) + '/' + arNum(d.total_sections) + ')';
    $('progressLabel').textContent = arNum(d.answered) + ' من ~' + arNum(d.total_estimate);
    const pct = d.total_estimate ? Math.min(100, Math.round((d.answered/d.total_estimate)*100)) : 0;
    $('progressBar').style.width = pct + '%';
    const q = d.question;
    $('questionArea').innerHTML = (q.question_type==='image' && q.image_url)
      ? `<img src="${esc(q.image_url)}" class="max-h-64 mx-auto rounded-lg border border-gray-200">`
      : `<p class="text-lg font-bold text-blue-900 leading-relaxed">${esc(q.text_content)}</p>`;
    $('choicesArea').innerHTML='';
    q.choices.forEach((c)=>{
      const btn = document.createElement('button');
      btn.type='button';
      btn.className='choice w-full text-right border-2 border-gray-200 rounded-xl p-3 font-bold text-gray-700 transition-colors flex items-center gap-3';
      btn.innerHTML = `<span class="w-7 h-7 shrink-0 rounded-full bg-gray-100 flex items-center justify-center text-blue-800 font-black text-sm">${esc(c.choice_key)}</span>`
        + (c.image_url ? `<img src="${esc(c.image_url)}" class="max-h-16 rounded">` : `<span>${esc(c.text_content)}</span>`);
      btn.addEventListener('click', ()=> answer(q.id, c.choice_key));
      $('choicesArea').appendChild(btn);
    });
    $('quizStatus').classList.add('hidden');
  }
  async function answer(qid, key){
    $('choicesArea').querySelectorAll('button').forEach((b)=>b.disabled=true);
    $('quizStatus').classList.remove('hidden'); $('quizStatus').innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...';
    try {
      const d = await call('placement-answer', { token, question_id: qid, chosen_key: key });
      if (d.finished) renderReport(d.report);
      else renderQuestion(d);
    } catch (err) {
      $('quizStatus').innerHTML = '<span class="text-red-600">تعذّر: '+esc(err.message)+'</span>';
    }
  }

  // ===== التقرير =====
  const col = (pct) => pct>=75 ? {c:'#059669',bg:'#ecfdf5'} : (pct>=50 ? {c:'#d97706',bg:'#fffbeb'} : {c:'#dc2626',bg:'#fef2f2'});
  function renderReport(r, readOnly){
    show('reportScreen');
    const o = col(r.overall.pct);
    const secRows = r.sections.map((s)=>{
      const cc = col(s.pct);
      return `<div class="py-2 border-b border-gray-100 last:border-0">
        <div class="flex items-center justify-between mb-1">
          <span class="font-black text-gray-800 text-sm">${esc(s.section)}</span>
          <span class="text-xs font-black px-2 py-0.5 rounded-full" style="color:${cc.c};background:${cc.bg}">${esc(s.level)} · ${arNum(s.pct)}%</span>
        </div>
        <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${s.pct}%;background:${cc.c}"></div></div>
        <p class="text-[11px] text-gray-400 font-bold mt-1">${arNum(s.correct)} من ${arNum(s.total)} صحيحة</p>
      </div>`;
    }).join('');
    const chip = (arr, kind) => (arr&&arr.length) ? arr.map((s)=>`<span class="inline-block text-xs font-black px-3 py-1 rounded-full ${kind==='s'?'bg-emerald-50 text-emerald-700':'bg-red-50 text-red-700'}">${esc(s)}</span>`).join(' ') : '<span class="text-gray-400 text-xs">—</span>';
    const shareUrl = location.origin + location.pathname + '?r=' + token;
    const actions = readOnly ? '' : `
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-6 no-print">
        <button onclick="window.print()" class="bg-gray-800 text-white font-bold py-2.5 rounded-xl hover:bg-gray-900 text-sm"><i class="fa-solid fa-print"></i> طباعة / PDF</button>
        <a href="quimma-platform-v4.html?placement=${encodeURIComponent(token)}" class="bg-blue-800 text-white text-center font-bold py-2.5 rounded-xl hover:bg-blue-900 text-sm"><i class="fa-solid fa-user-plus"></i> أنشئ حسابي</a>
        <button id="shareBtn" class="bg-white border-2 border-blue-200 text-blue-800 font-bold py-2.5 rounded-xl hover:bg-blue-50 text-sm"><i class="fa-solid fa-share-nodes"></i> مشاركة</button>
        <button onclick="location.href=location.pathname" class="bg-white border-2 border-gray-200 text-gray-600 font-bold py-2.5 rounded-xl hover:bg-gray-50 text-sm"><i class="fa-solid fa-rotate-right"></i> فرع آخر</button>
      </div>`;
    $('reportScreen').innerHTML = `
      <div class="report-card bg-white rounded-2xl shadow-sm border border-gray-100 p-7">
        <div class="wm">${MOUNTAIN}<b>القمة</b></div>
        <div class="report-inner">
          <!-- ترويسة ترويجية -->
          <div class="flex items-center justify-between border-b-2 border-blue-900 pb-4 mb-5 flex-wrap gap-2">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-2xl bg-blue-900 flex items-center justify-center"><span style="color:#fde047;display:block;width:26px">${MOUNTAIN}</span></div>
              <div><p class="font-black text-blue-900 text-lg leading-tight">منصة القمة التعليمية</p><p class="text-yellow-600 font-bold text-[11px]">طريقك إلى القمة في القدرات والتحصيلي</p></div>
            </div>
            <span class="text-[11px] text-gray-400 font-bold">تقرير تحديد المستوى</span>
          </div>

          <div class="text-center mb-6">
            <p class="text-gray-500 font-bold text-sm mb-1">${r.name ? esc(r.name)+' — ' : ''}فرع ${esc(r.branch)}</p>
            <div class="text-5xl font-black" style="color:${o.c}">${arNum(r.overall.pct)}<span class="text-2xl">%</span></div>
            <p class="text-lg font-black mt-1" style="color:${o.c}">المستوى العام: ${esc(r.overall.level)}</p>
            <p class="text-xs text-gray-400 font-bold mt-1">${arNum(r.overall.correct)} إجابة صحيحة من ${arNum(r.overall.total)}</p>
          </div>

          <h3 class="font-black text-gray-700 text-sm mb-1"><i class="fa-solid fa-list-check text-blue-500"></i> مستواك في كل قسم داخل الفرع</h3>
          <div class="bg-gray-50 rounded-xl px-4 py-1 mb-5">${secRows}</div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
            <div><p class="font-black text-emerald-700 text-sm mb-2"><i class="fa-solid fa-thumbs-up"></i> نقاط القوة</p><div class="flex flex-wrap gap-1.5">${chip(r.strengths,'s')}</div></div>
            <div><p class="font-black text-red-700 text-sm mb-2"><i class="fa-solid fa-triangle-exclamation"></i> نقاط تحتاج تحسينًا</p><div class="flex flex-wrap gap-1.5">${chip(r.weaknesses,'w')}</div></div>
          </div>

          ${(r.recommendations&&r.recommendations.length)?`<div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-2"><p class="font-black text-amber-800 text-sm mb-1"><i class="fa-solid fa-bullseye"></i> خطة مقترحة — ابدأ بهذه الأقسام:</p><p class="text-amber-700 font-bold text-sm">${r.recommendations.map(esc).join(' · ')}</p></div>`:''}

          <!-- تذييل ترويجي -->
          <div class="text-center mt-6 pt-4 border-t border-dashed border-gray-200">
            <p class="font-black text-blue-900 text-sm">جاهز ترفع مستواك؟ <span class="text-yellow-600">سجّل الآن في منصة القمة</span> وابدأ خطة على مقاس نتيجتك.</p>
            <p class="text-[11px] text-gray-400 font-bold mt-1">منصة القمة التعليمية · تقرير معتمد صادر تلقائيًّا</p>
          </div>
          ${actions}
        </div>
      </div>`;
    const sb = $('shareBtn');
    if (sb) sb.addEventListener('click', async ()=>{
      try { if (navigator.share) await navigator.share({ title:'نتيجتي في اختبار تحديد المستوى', url: shareUrl }); else { await navigator.clipboard.writeText(shareUrl); sb.innerHTML='<i class="fa-solid fa-check"></i> نُسخ الرابط'; } } catch(_e){}
    });
  }

  // رابط نتيجة مشاركة ?r=token
  const rt = new URLSearchParams(location.search).get('r');
  if (rt){ token = rt; call('placement-get', { token: rt }).then((d)=>{ if (d.status==='completed' && d.report) renderReport(d.report, true); }).catch(()=>{}); }
  else loadBranches();
})();
</script>
</body>
</html>
