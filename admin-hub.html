        // =================================================================
        // [ميزة 3] الاستيراد الجماعي للأسئلة (نص/صور) — بلا تعديل قاعدة البيانات
        // =================================================================
        function parseBulkText(text) {
            const blocks = String(text || '').split(/\n\s*\n/).map((b) => b.trim()).filter(Boolean);
            const questions = [];
            const errors = [];
            blocks.forEach((block, bi) => {
                const lines = block.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
                if (lines.length < 5) { errors.push(`السؤال ${bi + 1}: يحتاج سطر نص + أربعة خيارات.`); return; }
                const qText = lines[0].replace(/^\s*[*\-]\s*/, '').trim();
                const choiceLines = lines.slice(1);
                if (choiceLines.length !== 4) { errors.push(`السؤال ${bi + 1}: عدد الخيارات يجب أن يكون ٤ (وجدت ${toArabicIndic(choiceLines.length)}).`); return; }
                let correctIndex = -1;
                const choiceTexts = choiceLines.map((l, i) => {
                    const isCorrect = /^\s*\*/.test(l);
                    if (isCorrect) { if (correctIndex === -1) correctIndex = i; }
                    return l.replace(/^\s*[*\-]\s*/, '').trim();
                });
                if (choiceTexts.some((t) => !t)) { errors.push(`السؤال ${bi + 1}: يوجد خيار فارغ.`); return; }
                // الإجابة الصحيحة اختيارية في النص: إن لم توضع * تُحدَّد لاحقًا في المعاينة (افتراض أ)
                const hasStar = correctIndex !== -1;
                questions.push({ text: toArabicIndic(qText), choiceTexts: choiceTexts.map(toArabicIndic), correctIndex: hasStar ? correctIndex : 0, hasStar });
            });
            return { questions, errors };
        }

        function initBulkImport() {
            const modal = document.getElementById('bulkImportModal');
            if (!modal) return;
            let bulkMode = 'text';
            let bulkImageFiles = []; // {file, correct}

            const open = () => {
                if (!currentExamId) { showStatus('اختر اختبارًا أولاً قبل الاستيراد.', false); return; }
                modal.classList.remove('hidden'); modal.classList.add('flex');
            };
            const close = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
            document.getElementById('openBulkImportBtn').addEventListener('click', open);
            document.getElementById('closeBulkImportBtn').addEventListener('click', close);
            modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

            document.querySelectorAll('.bulkmode-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    bulkMode = btn.dataset.bulkmode;
                    document.querySelectorAll('.bulkmode-btn').forEach((b) => {
                        const on = b === btn;
                        b.classList.toggle('bg-white', on); b.classList.toggle('shadow-sm', on);
                        b.classList.toggle('text-blue-900', on); b.classList.toggle('text-gray-500', !on);
                    });
                    document.getElementById('bulkTextMode').classList.toggle('hidden', bulkMode !== 'text');
                    document.getElementById('bulkImageMode').classList.toggle('hidden', bulkMode !== 'image');
                });
            });

            // معاينة نص الأسئلة أثناء الكتابة/اللصق — بطاقات لكل سؤال مع اختيار الإجابة الصحيحة
            const textInput = document.getElementById('bulkTextInput');
            const textPrev = document.getElementById('bulkTextPreview');
            const textCards = document.getElementById('bulkTextCards');
            const labelsAr = ['أ', 'ب', 'ج', 'د'];
            const renderTextCards = () => {
                const { questions, errors } = parseBulkText(textInput.value);
                if (!textInput.value.trim()) { textPrev.innerHTML = ''; textCards.innerHTML = ''; return; }
                textPrev.innerHTML = `<span class="text-green-700">${toArabicIndic(questions.length)} سؤالًا جاهزًا</span>` +
                    (errors.length ? ` — <span class="text-red-600">${toArabicIndic(errors.length)} تحذير:</span> <span class="text-red-500 font-normal">${escapeHtml(errors.slice(0, 3).join(' '))}</span>` : '');
                textCards.innerHTML = questions.map((q, qi) => `
                    <div class="border border-gray-100 rounded-xl p-3" data-bulk-card="${qi}">
                        <p class="font-bold text-blue-900 text-sm mb-2"><span class="text-gray-400">${toArabicIndic(qi + 1)}.</span> ${renderMathText(q.text)}</p>
                        <div class="grid grid-cols-2 gap-2">
                            ${q.choiceTexts.map((ct, ci) => `
                                <label class="flex items-center gap-2 border-2 rounded-lg px-2 py-1.5 cursor-pointer text-sm has-[:checked]:border-green-500 has-[:checked]:bg-green-50">
                                    <input type="radio" name="bulktext-${qi}" value="${ci}" ${ci === q.correctIndex ? 'checked' : ''} class="w-4 h-4 accent-green-600">
                                    <span class="font-black text-gray-400 text-xs">${labelsAr[ci]}</span>
                                    <span class="font-bold text-gray-700 truncate">${renderMathText(ct)}</span>
                                </label>`).join('')}
                        </div>
                        <p class="text-[11px] text-gray-400 mt-1"><i class="fa-solid fa-circle-check text-green-500"></i> اختر الإجابة الصحيحة</p>
                    </div>`).join('');
            };
            textInput.addEventListener('input', debounce(renderTextCards, 250));

            // اختيار عدّة صور
            const imgInput = document.getElementById('bulkImageInput');
            const imgList = document.getElementById('bulkImageList');
            imgInput.addEventListener('change', () => {
                bulkImageFiles = Array.from(imgInput.files || []).map((file) => ({ file, correct: 0 }));
                imgList.innerHTML = '';
                bulkImageFiles.forEach((item, idx) => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-3 border border-gray-100 rounded-xl p-3';
                    const img = document.createElement('img');
                    img.className = 'w-24 h-24 object-contain rounded-lg border border-gray-200 shrink-0 bg-gray-50 cursor-zoom-in';
                    img.src = URL.createObjectURL(item.file);
                    img.title = 'اضغط للتكبير';
                    img.addEventListener('click', () => window.open(img.src, '_blank'));
                    const mid = document.createElement('div');
                    mid.className = 'flex-1 min-w-0';
                    const name = document.createElement('p');
                    name.className = 'text-xs text-gray-500 font-bold truncate mb-1';
                    name.textContent = `${toArabicIndic(idx + 1)}. ${item.file.name}`;
                    const hint = document.createElement('p');
                    hint.className = 'text-[11px] text-gray-400 mb-2';
                    hint.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i> اختر الإجابة الصحيحة (داخل الصورة)';
                    const radios = document.createElement('div');
                    radios.className = 'flex items-center gap-1.5';
                    ['أ', 'ب', 'ج', 'د'].forEach((lab, ci) => {
                        const l = document.createElement('label');
                        l.className = 'w-9 h-9 flex items-center justify-center border-2 border-gray-200 rounded-lg cursor-pointer text-sm font-black has-[:checked]:border-green-500 has-[:checked]:bg-green-50 has-[:checked]:text-green-700';
                        l.innerHTML = `<input type="radio" name="bulkimg-${idx}" class="hidden" ${ci === 0 ? 'checked' : ''}>${lab}`;
                        l.querySelector('input').addEventListener('change', () => { item.correct = ci; });
                        radios.appendChild(l);
                    });
                    mid.appendChild(name); mid.appendChild(hint); mid.appendChild(radios);
                    row.appendChild(img); row.appendChild(mid);
                    imgList.appendChild(row);
                });
            });

            document.getElementById('runBulkImportBtn').addEventListener('click', async () => {
                const runBtn = document.getElementById('runBulkImportBtn');
                const statusEl = document.getElementById('bulkImportStatus');
                const progEl = document.getElementById('bulkImportProgress');
                const setStatus = (msg, ok) => { statusEl.className = `mt-3 p-3 rounded-lg text-sm font-bold ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`; statusEl.textContent = msg; statusEl.classList.remove('hidden'); };
                if (!currentExamId) { setStatus('اختر اختبارًا أولاً.', false); return; }
                runBtn.disabled = true;
                try {
                    // رقم البداية = أكبر رقم حالي + 1
                    const { data: existing } = await db.from('questions').select('question_number').eq('exam_id', currentExamId).order('question_number', { ascending: false }).limit(1);
                    let nextNumber = existing && existing.length ? existing[0].question_number + 1 : 1;
                    const choiceKeys = ['a', 'b', 'c', 'd'];
                    let done = 0, failed = 0;

                    if (bulkMode === 'text') {
                        const { questions, errors } = parseBulkText(textInput.value);
                        if (!questions.length) { setStatus('لا توجد أسئلة صالحة للاستيراد.' + (errors[0] ? ' ' + errors[0] : ''), false); runBtn.disabled = false; return; }
                        // الإجابة الصحيحة تُؤخذ من بطاقات المعاينة (اختيار المسؤول يتقدّم على * إن غُيّر)
                        for (let i = 0; i < questions.length; i++) {
                            const q = questions[i];
                            const picked = document.querySelector(`input[name="bulktext-${i}"]:checked`);
                            if (picked) q.correctIndex = Number(picked.value);
                            progEl.textContent = `جاري الاستيراد ${toArabicIndic(i + 1)}/${toArabicIndic(questions.length)}...`;
                            try {
                                const { data: nq, error: qErr } = await db.from('questions').insert({ exam_id: currentExamId, question_number: nextNumber, question_type: 'text', text_content: q.text, sort_order: nextNumber }).select().single();
                                if (qErr) throw qErr;
                                const payload = q.choiceTexts.map((label, ci) => ({ question_id: nq.id, choice_key: choiceKeys[ci], text_content: label, is_correct: ci === q.correctIndex, sort_order: ci + 1 }));
                                const { error: cErr } = await db.from('choices').insert(payload);
                                if (cErr) throw cErr;
                                nextNumber++; done++;
                            } catch (_e) { failed++; }
                        }
                    } else {
                        if (!bulkImageFiles.length) { setStatus('اختر صورًا أولاً.', false); runBtn.disabled = false; return; }
                        for (let i = 0; i < bulkImageFiles.length; i++) {
                            const item = bulkImageFiles[i];
                            progEl.textContent = `جاري الرفع والاستيراد ${toArabicIndic(i + 1)}/${toArabicIndic(bulkImageFiles.length)}...`;
                            try {
                                const ext = (item.file.name.split('.').pop() || 'png').toLowerCase();
                                const path = `q-${currentExamId}-${Date.now()}-${i}.${ext}`;
                                const { error: upErr } = await db.storage.from('question-images').upload(path, item.file);
                                if (upErr) throw upErr;
                                const imageUrl = db.storage.from('question-images').getPublicUrl(path).data.publicUrl;
                                const { data: nq, error: qErr } = await db.from('questions').insert({ exam_id: currentExamId, question_number: nextNumber, question_type: 'image', image_url: imageUrl, sort_order: nextNumber }).select().single();
                                if (qErr) throw qErr;
                                const payload = ['أ', 'ب', 'ج', 'د'].map((label, ci) => ({ question_id: nq.id, choice_key: choiceKeys[ci], text_content: label, is_correct: ci === item.correct, sort_order: ci + 1 }));
                                const { error: cErr } = await db.from('choices').insert(payload);
                                if (cErr) throw cErr;
                                nextNumber++; done++;
                            } catch (_e) { failed++; }
                        }
                    }
                    progEl.textContent = '';
                    setStatus(`تم استيراد ${toArabicIndic(done)} سؤالًا${failed ? ` — تعذّر ${toArabicIndic(failed)}` : ''}.`, failed === 0);
                    if (done) {
                        textInput.value = ''; textPrev.innerHTML = ''; if (textCards) textCards.innerHTML = '';
                        imgInput.value = ''; imgList.innerHTML = ''; bulkImageFiles = [];
                        await loadQuestions();
                    }
                } catch (err) {
                    setStatus('تعذّر الاستيراد: ' + err.message, false);
                } finally {
                    runBtn.disabled = false;
                }
            });
        }

        async function deleteAccount(userId, label, kind) {
            const confirmMsg = kind === 'instructor'
                ? `هل أنت متأكد من حذف حساب المدرب "${label}" نهائيًا؟ سيُحذف مع كل مجموعاته. لا يمكن التراجع عن هذا الإجراء.`
                : `هل أنت متأكد من حذف حساب الطالب "${label}" نهائيًا؟ سيُحذف مع كل بياناته وتقدّمه. لا يمكن التراجع عن هذا الإجراء.`;
            if (!window.confirm(confirmMsg)) return;

            const { data, error } = await db.functions.invoke('admin-delete-account', { body: { user_id: userId } });
            if (error) {
                let detail = error.message;
                try {
                    if (error.context && typeof error.context.json === 'function') {
                        const body = await error.context.json();
                        if (body && body.error) detail = body.error;
                    }
                } catch (_e) {}
                showStatus('تعذّر الحذف: ' + detail, false);
                return;
            }
            if (data && data.error) { showStatus('تعذّر الحذف: ' + data.error, false); return; }

            showStatus('تم حذف الحساب نهائيًا.', true);
            if (kind === 'instructor') {
                await loadInstructors();
                renderInstructorsList();
                document.getElementById('groupsPanel').innerHTML = '';
            } else {
                const activeTab = document.querySelector('.stab-btn.bg-blue-50');
                renderStudentsTab(activeTab ? activeTab.dataset.stab : 'list');
            }
        }

        let cmShowArchivedGroups = false;

        // ---------------------------------------------------------------
        // متصفح المجموعات المؤرشفة عبر كل المدربين - بحث + تصفية تاريخ
        // ---------------------------------------------------------------
        async function renderAllArchivedGroupsPanel() {
            const panel = document.getElementById('groupsPanel');
            panel.innerHTML = '<p class="text-center text-blue-800 font-bold py-6"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحميل المجموعات المؤرشفة...</p>';

            const { data: archived, error } = await db.from('training_groups')
                .select('id, name, archived_at, created_at, profiles(full_name, email)')
                .eq('is_archived', true)
                .order('archived_at', { ascending: false });
            if (error) { panel.innerHTML = `<p class="text-red-600 text-center py-6">${escapeHtml(error.message)}</p>`; return; }

            panel.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-4"><i class="fa-solid fa-boxes-packing text-amber-500"></i> المجموعات المؤرشفة (كل المدربين)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-5">
                        <input type="text" id="archivedSearchInput" placeholder="ابحث باسم المجموعة أو المدرب..." class="border border-gray-200 rounded-lg px-3 py-2 text-sm md:col-span-1">
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">أُرشفت من تاريخ</label><input type="date" id="archivedFromDate" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">إلى تاريخ</label><input type="date" id="archivedToDate" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></div>
                    </div>
                    <div id="archivedGroupsGlobalWrap" class="space-y-2"></div>
                </div>
            `;

            function renderFiltered() {
                const q = document.getElementById('archivedSearchInput').value.trim().toLowerCase();
                const fromDate = document.getElementById('archivedFromDate').value;
                const toDate = document.getElementById('archivedToDate').value;
                const toDateEnd = toDate ? new Date(toDate) : null;
                if (toDateEnd) toDateEnd.setHours(23, 59, 59, 999);

                const filtered = archived.filter((g) => {
                    if (q) {
                        const instName = (g.profiles?.full_name || g.profiles?.email || '').toLowerCase();
                        if (!g.name.toLowerCase().includes(q) && !instName.includes(q)) return false;
                    }
                    if (g.archived_at) {
                        const archivedDate = new Date(g.archived_at);
                        if (fromDate && archivedDate < new Date(fromDate)) return false;
                        if (toDateEnd && archivedDate > toDateEnd) return false;
                    } else if (fromDate || toDate) {
                        return false; // لا تاريخ أرشفة مسجّل (بيانات قديمة) - استبعدها عند التصفية بتاريخ
                    }
                    return true;
                });

                const wrap = document.getElementById('archivedGroupsGlobalWrap');
                if (filtered.length === 0) {
                    wrap.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">لا توجد نتائج مطابقة.</p>';
                    return;
                }
                wrap.innerHTML = filtered.map(g => `
                    <div class="flex items-center justify-between border border-gray-100 rounded-xl p-3 flex-wrap gap-2">
                        <div>
                            <p class="font-bold text-gray-700 text-sm">${escapeHtml(g.name)}</p>
                            <p class="text-xs text-gray-400 font-bold">مدرب: ${escapeHtml(g.profiles?.full_name || g.profiles?.email || '')} — أُرشفت ${g.archived_at ? new Date(g.archived_at).toLocaleDateString('ar-SA') : 'قبل هذا التحديث'}</p>
                        </div>
                        <button type="button" data-restore-global="${g.id}" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-emerald-100">
                            <i class="fa-solid fa-rotate-left"></i> استعادة
                        </button>
                    </div>
                `).join('');
                wrap.querySelectorAll('[data-restore-global]').forEach((btn) => {
                    btn.addEventListener('click', async () => {
                        const { error: rErr } = await db.from('training_groups').update({ is_archived: false, archived_at: null }).eq('id', btn.dataset.restoreGlobal);
                        if (rErr) { showStatus('تعذّر الاستعادة: ' + rErr.message, false); return; }
                        showStatus('تمت استعادة المجموعة.', true);
                        renderAllArchivedGroupsPanel();
                    });
                });
            }

            renderFiltered();
            document.getElementById('archivedSearchInput').addEventListener('input', renderFiltered);
            document.getElementById('archivedFromDate').addEventListener('change', renderFiltered);
            document.getElementById('archivedToDate').addEventListener('change', renderFiltered);
        }

        async function renderGroupsPanel(instructor) {

            // [مراجعة #5] لم نعد نحمّل كل الطلاب هنا؛ إضافة الطالب صارت بحثًا من الخادم،
            // وأسماء الأعضاء تُجلب لكل صفحة مجموعات على حدة (يتحمّل الآلاف).

            groupsListState = { page: 0, q: '' };

            document.getElementById('createGroupBtn').addEventListener('click', async () => {

                if (!name) return;

                if (error) { showStatus('تعذّر إنشاء المجموعة: ' + error.message, false); return; }
                showStatus('تم إنشاء المجموعة.', true);

            document.querySelectorAll('.groupview-btn').forEach((btn) => {

            const gSearch = document.getElementById('groupSearchInput');
            if (gSearch) gSearch.addEventListener('input', debounce((e) => {
                groupsListState.q = e.target.value; groupsListState.page = 0; renderGroupsList(instructor);
            }, 350));

        async function renderGroupsList(instructor) {
            const wrap = document.getElementById('groupsListWrap');
            const pagerEl = document.getElementById('groupsPager');
            wrap.innerHTML = '<p class="text-center text-blue-800 font-bold py-4"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';
            if (pagerEl) pagerEl.innerHTML = '';

            // [#4] ترقيم من الخادم: نجلب صفحة واحدة فقط من المجموعات (range) + العدّ الكلّي
            let gq = db.from('training_groups').select('*', { count: 'exact' }).eq('instructor_id', instructor.id).eq('is_archived', cmShowArchivedGroups);
            const gsafe = sanitizeSearch(groupsListState.q);
            if (gsafe) gq = gq.ilike('name', `%${gsafe}%`);
            const gfrom = groupsListState.page * GROUPS_PAGE_SIZE;
            gq = gq.order('created_at').range(gfrom, gfrom + GROUPS_PAGE_SIZE - 1);
            const { data: groups, error: gErr, count: groupsTotal } = await gq;
            if (gErr) { wrap.innerHTML = `<p class="text-red-600 text-center py-4">${escapeHtml(gErr.message)}</p>`; return; }
            groupsCache = groups;

            const goGroups = (pg) => { groupsListState.page = pg; renderGroupsList(instructor); };
            if (groupsCache.length === 0) {
                wrap.innerHTML = groupsListState.q
                    ? '<p class="text-gray-400 text-sm text-center py-4">لا مجموعات مطابقة للبحث.</p>'
                    : (cmShowArchivedGroups
                        ? '<p class="text-gray-400 text-sm text-center py-4">لا توجد مجموعات مؤرشفة.</p>'
                        : '<p class="text-gray-400 text-sm text-center py-4">لا توجد مجموعات بعد لهذا المدرب.</p>');
                if (pagerEl) renderPager(pagerEl, groupsListState.page, groupsTotal || 0, GROUPS_PAGE_SIZE, goGroups);
                return;
            }

            const groupIds = groupsCache.map(g => g.id);
            const { data: members } = await db.from('training_group_members').select('group_id, student_id').in('group_id', groupIds);
            const membersByGroup = new Map();
            (members || []).forEach(m => {
                if (!membersByGroup.has(m.group_id)) membersByGroup.set(m.group_id, new Set());
                membersByGroup.get(m.group_id).add(m.student_id);
            });
            // [مراجعة #5] حلّ أسماء الأعضاء عبر جلب موجّه بمعرّفاتهم فقط (لا كل الطلاب)،
            // فيظهر الاسم حتى لو تجاوز عددهم الآلاف أو كان الطالب معلّقًا.
            const memberIdsAll = [...new Set((members || []).map(m => m.student_id))];
            const namesById = new Map();
            if (memberIdsAll.length) {
                const rows = await fetchAllRows(() => db.from('profiles').select('id, full_name, email').in('id', memberIdsAll));
                rows.forEach(r => namesById.set(r.id, r.full_name || r.email || 'طالب'));
            }

            wrap.innerHTML = '';
            groupsCache.forEach((group) => {
                const memberIds = membersByGroup.get(group.id) || new Set();
                const box = document.createElement('div');
                box.className = 'border border-gray-100 rounded-xl p-4' + (cmShowArchivedGroups ? ' bg-gray-50 opacity-80' : '');
                const memberChips = [...memberIds].map((sid) => {
                    const nm = namesById.get(sid) || 'طالب';
                    const removeBtn = cmShowArchivedGroups ? '' : `<button type="button" data-remove-member="${sid}" data-group="${group.id}" class="text-blue-400 hover:text-red-600"><i class="fa-solid fa-xmark"></i></button>`;
                    return `<span class="inline-flex items-center gap-1 bg-blue-50 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">
                        ${escapeHtml(nm)}
                        ${removeBtn}
                    </span>`;
                }).join('') || '<span class="text-xs text-gray-400 font-bold">لا يوجد طلاب في هذه المجموعة</span>';

                const archiveControls = cmShowArchivedGroups
                    ? `<button type="button" data-restore-group="${group.id}" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-emerald-100"><i class="fa-solid fa-rotate-left"></i> استعادة</button>`
                    : `<div class="add-picker relative w-52" data-add-picker="${group.id}"></div>
                        <button type="button" data-archive-group="${group.id}" class="bg-amber-50 text-amber-700 border border-amber-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-amber-100"><i class="fa-solid fa-box-archive"></i> أرشفة</button>`;

                box.innerHTML = `
                    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                        <p class="font-bold text-gray-700">${escapeHtml(group.name)}</p>
                        <div class="flex items-center gap-2 flex-wrap">${archiveControls}</div>
                    </div>
                    <div class="flex flex-wrap gap-2">${memberChips}</div>
                `;
                wrap.appendChild(box);
            });

            // [مراجعة #5] صندوق بحث خادمي لإضافة طالب لكل مجموعة (بدل قائمة تحمّل كل الطلاب)
            if (!cmShowArchivedGroups) {
                wrap.querySelectorAll('[data-add-picker]').forEach((mount) => {
                    const groupId = mount.dataset.addPicker;
                    attachServerStudentPicker(mount, {
                        placeholder: 'إضافة طالب...',
                        onPick: async (studentId) => {
                            if (!studentId) return;
                            const { error } = await db.from('training_group_members').insert({ group_id: groupId, student_id: studentId });
                            if (error) { showStatus('تعذّر الإضافة: ' + error.message, false); return; }
                            showStatus('تمت إضافة الطالب للمجموعة.', true);
                            renderGroupsList(instructor);
                        }
                    });
                });
            }
            wrap.querySelectorAll('[data-archive-group]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    if (!confirm('أرشفة هذه المجموعة؟ ستنتقل لقائمة "المجموعات المؤرشفة" مع بقاء كل بياناتها محفوظة، ويمكن استعادتها لاحقًا.')) return;
                    const { error } = await db.from('training_groups').update({ is_archived: true, archived_at: new Date().toISOString() }).eq('id', btn.dataset.archiveGroup);
                    if (error) { showStatus('تعذّر الأرشفة: ' + error.message, false); return; }
                    showStatus('تمت أرشفة المجموعة.', true);
                    renderGroupsList(instructor);
                });
            });
            wrap.querySelectorAll('[data-restore-group]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const { error } = await db.from('training_groups').update({ is_archived: false, archived_at: null }).eq('id', btn.dataset.restoreGroup);
                    if (error) { showStatus('تعذّر الاستعادة: ' + error.message, false); return; }
                    showStatus('تمت استعادة المجموعة.', true);
                    renderGroupsList(instructor);
                });
            });
            wrap.querySelectorAll('[data-remove-member]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const { error } = await db.from('training_group_members')
                        .delete()
                        .eq('group_id', btn.dataset.group)
                        .eq('student_id', btn.dataset.removeMember);
                    if (error) { showStatus('تعذّر الإزالة: ' + error.message, false); return; }
                    renderGroupsList(instructor);
                });
            });

            if (pagerEl) renderPager(pagerEl, groupsListState.page, groupsTotal || 0, GROUPS_PAGE_SIZE, goGroups);
        }

                b.classList.toggle('border-blue-600', b.dataset.stab === name);
                b.classList.toggle('bg-blue-50', b.dataset.stab === name);
                b.classList.toggle('text-blue-900', b.dataset.stab === name);

        async function renderStudentsTab(tab) {

            const wrap = document.getElementById('studentsTabContent');

                joinReqState.page = 0;

            } else if (tab === 'list') {
                studentsListState.page = 0;
                renderActiveStudentsPaged(wrap);

            } else if (tab === 'create') {
                wrap.innerHTML = `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 max-w-md">
                        <p class="text-xs text-gray-400 font-bold mb-4">سيُنشأ الحساب مفعّلاً مباشرة، وسيُطلب من الطالب تغيير كلمة المرور المؤقتة عند أول تسجيل دخول.</p>
                        <div id="createStudentError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
                        <form id="createStudentForm" class="space-y-3">
                            <div><label class="block text-sm font-bold text-gray-600 mb-1">اسم الطالب</label><input type="text" id="createNameInput" required class="w-full border border-gray-200 rounded-lg px-3 py-2"></div>
                            <div><label class="block text-sm font-bold text-gray-600 mb-1">البريد الإلكتروني</label><input type="email" id="createEmailInput" required class="w-full border border-gray-200 rounded-lg px-3 py-2"></div>
                            <div><label class="block text-sm font-bold text-gray-600 mb-1">كلمة مرور مؤقتة</label><input type="text" id="createTempPasswordInput" required minlength="6" class="w-full border border-gray-200 rounded-lg px-3 py-2"></div>
                            <button type="submit" id="createSubmitBtn" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">إنشاء الحساب</button>
                        </form>
                    </div>
                `;
                document.getElementById('createStudentForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('createSubmitBtn');
                    const errEl = document.getElementById('createStudentError');
                    errEl.classList.add('hidden');
                    btn.disabled = true;

        // ---------------- شجرة الأقسام (لحساب اختبارات كل قسم تمامًا كما في المنصة) ----------------
        let nodesById = null;
        let rootNode = null;

        async function ensureNodeTreeLoaded() {
            if (nodesById) return;
            const { data, error } = await db.from('nodes').select('*').order('sort_order');
            if (error) throw error;
            nodesById = new Map();
            rootNode = { id: null, type: 'category', children: {} };
            nodesById.set(null, rootNode);
            data.forEach(row => {
                nodesById.set(row.id, { id: row.id, key: row.key, type: row.type, parentId: row.parent_id, children: {} });
            });
            data.forEach(row => {
                const parent = nodesById.get(row.parent_id);
                const self = nodesById.get(row.id);
                if (parent) parent.children[row.key] = self;
            });
        }
        function collectTestGroupIds(node, out) {
            if (node.type === 'testGroup') { out.push(node.id); return; }
            for (const key in node.children) collectTestGroupIds(node.children[key], out);
        }
        async function getSectionExamIds(sectionKey) {
            await ensureNodeTreeLoaded();
            const sectionNode = rootNode.children[sectionKey];
            if (!sectionNode) return [];
            const testGroupIds = [];
            collectTestGroupIds(sectionNode, testGroupIds);
            if (testGroupIds.length === 0) return [];
            const { data: exams } = await db.from('exams').select('id').in('node_id', testGroupIds);
            return (exams || []).map(e => e.id);
        }

        async function generateStudentReport() {
            const studentId = document.getElementById('reportStudentSelect').value;
            const section = document.getElementById('reportSectionSelect').value;
            const fromDate = document.getElementById('reportFromDate').value;
            const toDate = document.getElementById('reportToDate').value;
            const resultArea = document.getElementById('reportResultArea');
            if (!studentId) { resultArea.innerHTML = '<p class="text-red-600 text-center py-6">اختر طالبًا أولاً.</p>'; return; }
            resultArea.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري إعداد التقرير...</p>';

            const toDateEnd = new Date(toDate);
            toDateEnd.setHours(23, 59, 59, 999);

            try {
                const { data: student } = await db.from('profiles').select('full_name, email').eq('id', studentId).single();
                const { data: groupRows } = await db.from('training_group_members').select('training_groups(name, profiles(full_name))').eq('student_id', studentId);
                const instructorNames = [...new Set((groupRows || []).map(g => g.training_groups?.profiles?.full_name).filter(Boolean))];

                let attempts = [];
                if (section === 'الاختبارات المحاكية') {
                    const { data, error } = await db.from('mock_exam_attempts')
                        .select('*').eq('user_id', studentId).eq('mock_type', 'full_mock')
                        .gte('completed_at', fromDate).lte('completed_at', toDateEnd.toISOString()).order('completed_at');
                    if (error) throw error;
                    attempts = data;
                } else if (section === 'الاختبارات المحاكية المركزية') {
                    const { data, error } = await db.from('centralized_mock_attempts')
                        .select('*, centralized_mock_exams(title)').eq('user_id', studentId)
                        .gte('completed_at', fromDate).lte('completed_at', toDateEnd.toISOString()).order('completed_at');
                    if (error) throw error;
                    attempts = data;
                } else {
                    const examIds = await getSectionExamIds(section);
                    const { data, error } = await db.from('exam_attempts')
                        .select('*, exams(title, exam_number)')
                        .in('exam_id', examIds.length ? examIds : ['00000000-0000-0000-0000-000000000000'])
                        .eq('user_id', studentId)
                        .gte('completed_at', fromDate).lte('completed_at', toDateEnd.toISOString()).order('completed_at');
                    if (error) throw error;
                    attempts = data;
                }
                renderStudentReportResult(resultArea, { student, section, attempts, instructorNames, fromDate, toDate });
            } catch (err) {
                resultArea.innerHTML = `<p class="text-red-600 text-center py-6">تعذّر توليد التقرير: ${escapeHtml(err.message)}</p>`;

        }

        let studentReportChartInstance = null;
        function renderStudentReportResult(container, { student, section, attempts, instructorNames, fromDate, toDate }) {
            // نفس منطق المنصة تمامًا: لا نحتسب نفس النموذج أكثر من مرة عند إعادة الطالب حلّه عدة مرات
            const isMockLike = section === 'الاختبارات المحاكية' || section === 'الاختبارات المحاكية المركزية';
            let uniqueUnitsCount, totalQuestions, totalCorrect, uniqueAttempts;
            if (isMockLike) {
                uniqueAttempts = attempts.slice();
                uniqueUnitsCount = attempts.length;
                totalQuestions = attempts.reduce((s, a) => s + a.total_count, 0);
                totalCorrect = attempts.reduce((s, a) => s + a.correct_count, 0);
            } else {
                const latestByExam = new Map();
                attempts.forEach((a) => {
                    const existing = latestByExam.get(a.exam_id);
                    if (!existing || new Date(a.completed_at) > new Date(existing.completed_at)) latestByExam.set(a.exam_id, a);
                });
                uniqueAttempts = [...latestByExam.values()];
                uniqueUnitsCount = uniqueAttempts.length;
                totalQuestions = uniqueAttempts.reduce((s, a) => s + a.total_count, 0);
                totalCorrect = uniqueAttempts.reduce((s, a) => s + a.correct_count, 0);
            }
            const avgPct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
            const totalTimeMs = attempts.reduce((s, a) => s + (a.time_spent_ms || 0), 0);

            // ---- مقاييس إضافية (كلها من نفس البيانات، بلا تعديل قاعدة) ----
            const pctOf = (a) => a.total_count > 0 ? Math.round((a.correct_count / a.total_count) * 100) : 0;
            const chrono = attempts.slice().sort((a, b) => new Date(a.completed_at) - new Date(b.completed_at));
            const pcts = chrono.map(pctOf);
            const bestPct = pcts.length ? Math.max(...pcts) : 0;
            const worstPct = pcts.length ? Math.min(...pcts) : 0;
            const lastPct = pcts.length ? pcts[pcts.length - 1] : 0;
            const firstPct = pcts.length ? pcts[0] : 0;
            const improvement = pcts.length >= 2 ? lastPct - firstPct : 0;
            const totalAttemptsAll = attempts.length; // يشمل الإعادات
            const passCount = chrono.filter(a => pctOf(a) >= 60).length;
            const passRate = totalAttemptsAll ? Math.round(passCount / totalAttemptsAll * 100) : 0;
            const avgTimePerAttempt = totalAttemptsAll ? totalTimeMs / totalAttemptsAll : 0;
            const impTone = improvement > 0 ? 'text-green-700' : improvement < 0 ? 'text-red-600' : 'text-gray-500';
            const impSign = improvement > 0 ? '▲ +' : improvement < 0 ? '▼ ' : '';

            container.innerHTML = `
                <div id="printableReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                    <div class="flex items-center justify-between mb-6 pb-6 border-b border-gray-100 flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-mountain text-2xl text-amber-500"></i>
                            <div><p class="font-black text-blue-900">منصة القمة التعليمية</p><p class="text-xs text-gray-400">تقرير أداء طالب</p></div>
                        </div>
                        <button type="button" id="printReportBtn" class="no-print bg-blue-800 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-900"><i class="fa-solid fa-print"></i> طباعة (PDF)</button>
                    </div>
                    <div class="mb-6">
                        <p class="text-sm text-gray-500">الطالب: <span class="font-bold text-blue-900">${escapeHtml(student?.full_name || student?.email || '')}</span></p>
                        <p class="text-sm text-gray-500">القسم: <span class="font-bold text-blue-900">${escapeHtml(section)}</span></p>
                        <p class="text-sm text-gray-500">المدرّب(ون): <span class="font-bold text-blue-900">${instructorNames.length ? instructorNames.map(escapeHtml).join('، ') : 'غير مسجّل في أي مجموعة'}</span></p>
                        <p class="text-sm text-gray-500">الفترة: <span class="font-bold text-blue-900">${new Date(fromDate).toLocaleDateString('ar-SA')} — ${new Date(toDate).toLocaleDateString('ar-SA')}</span></p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <div class="rounded-xl p-4 text-center ${avgPct >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${avgPct >= 60 ? 'text-green-700' : 'text-amber-700'}">${avgPct}٪</div><div class="text-xs font-bold text-gray-500 mt-1">متوسط الدقة</div></div>
                        <div class="bg-green-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-green-700">${bestPct}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أفضل نتيجة</div></div>
                        <div class="bg-red-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-red-700">${worstPct}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أضعف نتيجة</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black ${impTone}">${impSign}${Math.abs(improvement)}٪</div><div class="text-xs font-bold text-gray-500 mt-1">التطوّر (أول→آخر)</div></div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${uniqueUnitsCount}</div><div class="text-xs font-bold text-gray-500 mt-1">${isMockLike ? 'المحاولات' : 'النماذج المكتملة'}</div></div>
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${totalAttemptsAll}</div><div class="text-xs font-bold text-gray-500 mt-1">إجمالي المحاولات (بالإعادات)</div></div>
                        <div class="rounded-xl p-4 text-center ${passRate >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${passRate >= 60 ? 'text-green-700' : 'text-amber-700'}">${passRate}٪</div><div class="text-xs font-bold text-gray-500 mt-1">نسبة الاجتياز (≥٦٠٪)</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${formatDurationLong(totalTimeMs)}</div><div class="text-xs font-bold text-gray-500 mt-1">وقت التدريب</div></div>
                    </div>
                    ${chrono.length >= 2 ? `
                    <div class="mb-8">
                        <h4 class="font-bold text-gray-700 mb-2"><i class="fa-solid fa-chart-line text-emerald-500"></i> منحنى تطوّر الدقة عبر الزمن</h4>
                        <div style="height:220px;"><canvas id="studentTrendChart"></canvas></div>
                    </div>` : ''}
                    <h4 class="font-bold text-gray-700 mb-3">تفصيل المحاولات <span class="text-xs text-gray-400 font-bold">(متوسط الزمن للمحاولة: ${formatDuration(avgTimePerAttempt)})</span></h4>
                    <div class="space-y-2">
                        ${chrono.map((a) => {
                            const pct = pctOf(a);
                            const label = a.exams ? (a.exams.title || 'اختبار رقم ' + a.exams.exam_number)
                                : (a.centralized_mock_exams ? (a.centralized_mock_exams.title || 'اختبار محاكي مركزي') : 'اختبار محاكي شامل');
                            const dl = new Date(a.completed_at).toLocaleDateString('ar-SA');
                            return `<div class="flex items-center justify-between text-sm border-b border-gray-50 pb-2 gap-2 flex-wrap">
                                <span class="font-bold text-gray-700">${escapeHtml(label)}</span>
                                <span class="flex items-center gap-3">
                                    <span class="text-xs text-gray-400">${dl} — ${formatDuration(a.time_spent_ms || 0)}</span>
                                    <span class="font-black ${pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${a.correct_count}/${a.total_count} (${pct}٪)</span>
                                </span>
                            </div>`;
                        }).join('') || '<p class="text-center text-gray-400 font-bold py-6">لا توجد محاولات في هذه الفترة لهذا القسم.</p>'}
                    </div>
                </div>
            `;
            document.getElementById('printReportBtn').addEventListener('click', () => window.print());

            if (chrono.length >= 2 && window.Chart) {
                setTimeout(() => {
                    if (studentReportChartInstance) { studentReportChartInstance.destroy(); studentReportChartInstance = null; }
                    const ctx = document.getElementById('studentTrendChart');
                    if (!ctx) return;
                    studentReportChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chrono.map((a) => new Date(a.completed_at).toLocaleDateString('ar-SA', { month: 'numeric', day: 'numeric' })),
                            datasets: [{ label: 'الدقة %', data: pcts, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.10)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: pcts.map(p => p >= 60 ? '#16a34a' : '#f59e0b') }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } }
                    });
                }, 0);
            }
        }

        // ---------------- تقرير شامل تحليلي لمستوى المجموعة كاملة ----------------
        let groupReportChartInstance = null;
        let instructorReportChartInstance = null;
        async function renderGroupReport(groupId, groupName, container) {
            container.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحليل بيانات المجموعة...</p>';

            const { data: members, error: mErr } = await db.from('training_group_members').select('student_id, profiles(full_name, email)').eq('group_id', groupId);
            if (mErr) { container.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(mErr.message)}</p>`; return; }
            const studentIds = (members || []).map(m => m.student_id);
            if (!studentIds.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10 font-bold">لا يوجد طلاب في هذه المجموعة.</p>'; return; }

            let attempts;
            try {
                attempts = await fetchAllRows(() => db.from('exam_attempts').select('user_id, correct_count, total_count, time_spent_ms').in('user_id', studentIds));
            } catch (aErr) { container.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(aErr.message)}</p>`; return; }

            const perStudent = studentIds.map((sid) => {
                const info = members.find(m => m.student_id === sid)?.profiles;
                const own = (attempts || []).filter(a => a.user_id === sid);
                const q = own.reduce((s, a) => s + a.total_count, 0);
                const c = own.reduce((s, a) => s + a.correct_count, 0);
                const t = own.reduce((s, a) => s + (a.time_spent_ms || 0), 0);
                return {
                    name: info?.full_name || info?.email || 'طالب',
                    examsCount: own.length,
                    pct: q > 0 ? Math.round((c / q) * 100) : null,
                    timeMs: t,
                };
            }).sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1));

            const scored = perStudent.filter(s => s.pct !== null);
            const highest = scored.length ? Math.max(...scored.map(s => s.pct)) : 0;
            const lowest = scored.length ? Math.min(...scored.map(s => s.pct)) : 0;
            const average = scored.length ? Math.round(scored.reduce((sum, s) => sum + s.pct, 0) / scored.length) : 0;
            const totalTime = perStudent.reduce((s, p) => s + p.timeMs, 0);
            // ---- مقاييس إضافية ----
            const engagement = perStudent.length ? Math.round(scored.length / perStudent.length * 100) : 0;
            const sortedPcts = scored.map(s => s.pct).sort((a, b) => a - b);
            const median = sortedPcts.length ? (sortedPcts.length % 2 ? sortedPcts[(sortedPcts.length - 1) / 2] : Math.round((sortedPcts[sortedPcts.length / 2 - 1] + sortedPcts[sortedPcts.length / 2]) / 2)) : 0;
            const passRate = scored.length ? Math.round(scored.filter(s => s.pct >= 60).length / scored.length * 100) : 0;
            const struggling = scored.filter(s => s.pct < 50);
            const inactive = perStudent.filter(s => s.pct === null);
            const totalExamsSum = perStudent.reduce((s, p) => s + p.examsCount, 0);

            container.innerHTML = `
                <div id="printableGroupReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-7">
                    <div class="flex items-center justify-between mb-1 flex-wrap gap-3">
                        <h3 class="font-black text-blue-900 text-lg"><i class="fa-solid fa-chart-simple text-purple-600"></i> تقرير شامل: ${escapeHtml(groupName)}</h3>
                        <button type="button" id="printGroupReportBtn" class="no-print bg-blue-800 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-900"><i class="fa-solid fa-print"></i> طباعة</button>
                    </div>
                    <p class="text-xs text-gray-400 font-bold mb-6">${perStudent.length} طالب — ${scored.length} منهم له محاولات مُسجّلة — إجمالي ${totalExamsSum} محاولة</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${average}٪</div><div class="text-xs font-bold text-gray-500 mt-1">المتوسط العام</div></div>
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${median}٪</div><div class="text-xs font-bold text-gray-500 mt-1">الوسيط</div></div>
                        <div class="bg-green-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-green-700">${highest}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أعلى درجة</div></div>
                        <div class="bg-red-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-red-700">${lowest}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أقل درجة</div></div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                        <div class="rounded-xl p-4 text-center ${engagement >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${engagement >= 60 ? 'text-green-700' : 'text-amber-700'}">${engagement}٪</div><div class="text-xs font-bold text-gray-500 mt-1">نسبة التفاعل (لهم محاولات)</div></div>
                        <div class="rounded-xl p-4 text-center ${passRate >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${passRate >= 60 ? 'text-green-700' : 'text-amber-700'}">${passRate}٪</div><div class="text-xs font-bold text-gray-500 mt-1">نسبة الاجتياز (≥٦٠٪)</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${inactive.length}</div><div class="text-xs font-bold text-gray-500 mt-1">طلاب بلا نشاط</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${formatDurationLong(totalTime)}</div><div class="text-xs font-bold text-gray-500 mt-1">إجمالي وقت التدريب</div></div>
                    </div>
                    ${struggling.length ? `
                    <div class="mb-8 bg-red-50 border border-red-100 rounded-xl p-4">
                        <h4 class="font-bold text-red-700 mb-2"><i class="fa-solid fa-triangle-exclamation"></i> طلاب بحاجة لمتابعة (أقل من ٥٠٪): ${struggling.length}</h4>
                        <div class="flex flex-wrap gap-2">
                            ${struggling.map(s => `<span class="inline-flex items-center gap-1 bg-white text-red-700 border border-red-200 text-xs font-bold px-3 py-1 rounded-full">${escapeHtml(s.name)} — ${s.pct}٪</span>`).join('')}
                        </div>
                    </div>` : ''}
                    <div class="mb-8" style="height:260px;"><canvas id="groupReportChart"></canvas></div>
                    <h4 class="font-bold text-gray-700 mb-3">ترتيب الطلاب حسب الأداء</h4>
                    <div class="space-y-2">
                        ${perStudent.map((s, i) => `
                            <div class="flex items-center justify-between text-sm border-b border-gray-50 pb-2">
                                <span class="font-bold text-gray-700">${i + 1}. ${escapeHtml(s.name)}</span>
                                <span class="text-gray-400 text-xs">${formatDuration(s.timeMs)} — ${s.examsCount} نموذج</span>
                                <span class="font-black ${s.pct === null ? 'text-gray-400' : s.pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${s.pct === null ? 'لا محاولات' : s.pct + '٪'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('printGroupReportBtn').addEventListener('click', () => window.print());

            setTimeout(() => {
                if (!window.Chart) return;
                if (groupReportChartInstance) { groupReportChartInstance.destroy(); groupReportChartInstance = null; }
                const ctx = document.getElementById('groupReportChart');
                if (!ctx) return;
                groupReportChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: perStudent.map(s => s.name),
                        datasets: [{
                            label: 'الدقة %',
                            data: perStudent.map(s => s.pct ?? 0),
                            backgroundColor: perStudent.map(s => s.pct === null ? '#d1d5db' : s.pct >= average ? '#16a34a' : '#f59e0b'),
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } }
                });
            }, 0);
        }

        async function generateInstructorReport() {
            const instructorId = document.getElementById('reportInstructorSelect').value;
            const resultArea = document.getElementById('reportResultArea');
            if (!instructorId) { resultArea.innerHTML = '<p class="text-red-600 text-center py-6">اختر مدربًا أولاً.</p>'; return; }

            try {
                const { data: instructor } = await db.from('profiles').select('full_name, email, specialization').eq('id', instructorId).single();

                    const { data } = await db.from('training_group_members').select('group_id, student_id, profiles(full_name, email)').in('group_id', groupIds);

                let attempts = [];

                    const data = await fetchAllRows(() => db.from('exam_attempts')
                        .select('user_id, correct_count, total_count, time_spent_ms')
                        .in('user_id', studentIds)
                        .gte('completed_at', fromDate)
                        .lte('completed_at', toDateEnd.toISOString()));
                    attempts = data || [];
                }
                const totalQuestions = attempts.reduce((s, a) => s + a.total_count, 0);
                const totalCorrect = attempts.reduce((s, a) => s + a.correct_count, 0);
                const avgPct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
                const totalTrainingMs = attempts.reduce((s, a) => s + (a.time_spent_ms || 0), 0);

                const perStudent = studentIds.map((sid) => {
                    const info = members.find(m => m.student_id === sid)?.profiles;
                    const own = attempts.filter(a => a.user_id === sid);
                    const q = own.reduce((s, a) => s + a.total_count, 0);

                }).sort((a, b) => b.pct - a.pct);

                const activeCount = perStudent.filter(s => s.active).length;
                const engagement = studentIds.length ? Math.round(activeCount / studentIds.length * 100) : 0;
                // تفصيل حسب المجموعة
                const perGroup = (groups || []).map((g) => {

                });

                resultArea.innerHTML = `
                    <div id="printableReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                        <div class="flex items-center justify-between mb-6 pb-6 border-b border-gray-100 flex-wrap gap-3">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-mountain text-2xl text-amber-500"></i>
                                <div><p class="font-black text-blue-900">منصة القمة التعليمية</p><p class="text-xs text-gray-400">تقرير أداء مدرّب</p></div>
                            </div>
                            <button type="button" id="printReportBtn" class="no-print bg-blue-800 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-900"><i class="fa-solid fa-print"></i> طباعة (PDF)</button>
                        </div>
                        <div class="mb-6">
                            <p class="text-sm text-gray-500">المدرّب: <span class="font-bold text-blue-900">${escapeHtml(instructor?.full_name || instructor?.email || '')}</span> — <span class="font-bold text-blue-900">${escapeHtml(instructor?.specialization || '')}</span></p>
                            <p class="text-sm text-gray-500">الفترة: <span class="font-bold text-blue-900">${new Date(fromDate).toLocaleDateString('ar-SA')} — ${new Date(toDate).toLocaleDateString('ar-SA')}</span></p>
                        </div>

        function getAllTestGroupsFlat() {
            const result = [];
            function walk(node, pathParts) {
                if (node.type === 'testGroup') { result.push({ id: node.id, label: pathParts.join(' ← ') }); return; }
                for (const key in node.children) walk(node.children[key], [...pathParts, key]);
            }
            for (const key in rootNode.children) walk(rootNode.children[key], [key]);
            return result;
        }

                    <input type="checkbox" class="${checkboxClass} w-4 h-4 shrink-0" value="${item.id}">
                    <span class="font-bold text-gray-700">${item.label}</span>
                </label>
            `).join('');

            const { data: exams } = await db.from('exams').select('id, node_id').in('node_id', selectedTgIds);
            const examIds = (exams || []).map(e => e.id);
            if (!examIds.length) { qwrap.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">لا توجد اختبارات في الأقسام المختارة.</p>'; return; }
            const { data: questions } = await db.from('questions').select('id, question_number, question_type, text_content, image_url, exam_id').in('exam_id', examIds).order('question_number');

            qwrap.innerHTML = '';

                if (!qs.length) return;
                const box = document.createElement('div');
                box.className = 'mb-5';
                box.innerHTML = `<h4 class="font-bold text-blue-900 text-sm mb-2">${escapeHtml(tg ? tg.label : '')}</h4>`;
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 md:grid-cols-3 gap-3';
                qs.forEach((q) => {
                    const card = document.createElement('label');
                    card.className = 'border-2 border-gray-200 rounded-lg p-2 cursor-pointer has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50 flex flex-col items-center gap-1 text-center';

        // توليد معرّف فريد (UUID v4) من الجهاز مباشرة - يعمل في كل البيئات
        // بما فيها فتح الملف مباشرة (file://)، بخلاف crypto.randomUUID التي تتطلب
        // سياقًا آمنًا وقد تفشل بصمت في بعض المتصفحات عند فتح الملف محليًا
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        async function getQuestionIdsForTestGroups(testGroupIds) {
            if (!testGroupIds.length) return [];
            const { data: exams } = await db.from('exams').select('id').in('node_id', testGroupIds);
            const examIds = (exams || []).map(e => e.id);
            if (!examIds.length) return [];
            const { data: questions } = await db.from('questions').select('id').in('exam_id', examIds);
            return (questions || []).map(q => q.id);
        }

        async function autoGenerateQuestions(sectionSelection, totalCount) {
            let branches = [];
            if (sectionSelection.includes('auto_qudurat')) {
                const namathijNode = rootNode.children['النماذج'];
                if (namathijNode) {
                    for (const key in namathijNode.children) {
                        const tgIds = [];
                        collectTestGroupIds(namathijNode.children[key], tgIds);
                        const qids = await getQuestionIdsForTestGroups(tgIds);
                        if (qids.length) branches.push(qids);
                    }
                }
            } else if (sectionSelection.includes('auto_comprehensive')) {
                const taasisNode = rootNode.children['التأسيس'];
                if (taasisNode) {
                    for (const key in taasisNode.children) {
                        const tgIds = [];
                        collectTestGroupIds(taasisNode.children[key], tgIds);
                        const qids = await getQuestionIdsForTestGroups(tgIds);
                        if (qids.length) branches.push(qids);
                    }
                }
            } else {
                for (const tgId of sectionSelection) {
                    const qids = await getQuestionIdsForTestGroups([tgId]);
                    if (qids.length) branches.push(qids);
                }
            }
            if (branches.length === 0) return [];
            const perBranch = Math.max(1, Math.ceil(totalCount / branches.length));
            let picked = [];
            branches.forEach((qids) => { picked.push(...shuffleArray(qids).slice(0, perBranch)); });
            return shuffleArray(picked).slice(0, totalCount);
        }

        let cmCreating = false; // [إصلاح تكرار] حارس يمنع إنشاء اختبار مرتين عند نقر مزدوج/سريع
        async function handleCreateCentralMock() {
            if (cmCreating) return; // منع الدخول المتزامن (كان يسبّب إدراج الاختبار مرتين)
            const btn = document.getElementById('cmCreateBtn');
            const setBusy = () => { cmCreating = true; if (btn) { btn.disabled = true; btn.textContent = 'جاري الإنشاء...'; } };
            try {
                const title = document.getElementById('cmTitleInput').value.trim();
                if (!title) { showStatus('اكتب عنوان الاختبار.', false); return; }

                const targetType = document.querySelector('input[name="cmTargetType"]:checked').value;
                let studentIds = [], groupIds = [];
                if (targetType === 'students') {
                    studentIds = Array.from(document.querySelectorAll('.cm-student-cb:checked')).map(cb => cb.value);
                    if (!studentIds.length) { showStatus('اختر طالبًا واحدًا على الأقل.', false); return; }
                } else {
                    groupIds = Array.from(document.querySelectorAll('.cm-group-cb:checked')).map(cb => cb.value);
                    if (!groupIds.length) { showStatus('اختر مجموعة تدريب واحدة على الأقل.', false); return; }
                }

                let questionIds = [];
                const inputMode = document.querySelector('input[name="cmInputMode"]:checked').value;
                if (inputMode === 'manual') {
                    questionIds = [...cmSelectedQuestions];
                    if (!questionIds.length) { showStatus('اختر سؤالاً واحدًا على الأقل.', false); return; }
                } else {
                    const sectionSelection = Array.from(document.querySelectorAll('.auto-section-cb:checked')).map(cb => cb.value);
                    const numQuestions = parseInt(document.getElementById('cmNumQuestionsInput').value, 10) || 20;
                    if (!sectionSelection.length) { showStatus('اختر قسمًا واحدًا على الأقل.', false); return; }
                    // [إصلاح تكرار] نفعّل الحارس قبل أول عملية غير متزامنة (توليد الأسئلة)
                    setBusy();
                    questionIds = await autoGenerateQuestions(sectionSelection, numQuestions);
                    if (!questionIds.length) { showStatus('تعذّر توليد أسئلة من الأقسام المختارة - تأكد من وجود أسئلة فيها.', false); return; }
                }

                setBusy(); // يضمن تفعيل الحارس في المسار اليدوي أيضًا

                // [ميزة المؤقّت] قراءة مدة الاختبار المختارة (null = بلا وقت محدّد)
                const timeMode = (document.querySelector('input[name="cmTimeMode"]:checked') || {}).value;
                const durationMinutes = timeMode === 'timed'
                    ? Math.min(600, Math.max(1, parseInt(document.getElementById('cmDurationInput').value, 10) || 75))
                    : null;

                const { data: { session } } = await db.auth.getSession();
                const examId = generateUUID();
                const { error: examErr } = await db.from('centralized_mock_exams').insert({
                    id: examId, created_by: session.user.id, title, num_questions: questionIds.length, duration_minutes: durationMinutes
                });
                if (examErr) throw new Error('تعذّر إنشاء الاختبار نفسه: ' + examErr.message);

                const questionsPayload = questionIds.map((qid, i) => ({ mock_exam_id: examId, question_id: qid, sort_order: i + 1 }));
                const { error: qErr } = await db.from('centralized_mock_exam_questions').insert(questionsPayload);
                if (qErr) throw new Error('تعذّر ربط الأسئلة بالاختبار: ' + qErr.message);

                const targetsPayload = targetType === 'students'
                    ? studentIds.map(sid => ({ mock_exam_id: examId, student_id: sid }))
                    : groupIds.map(gid => ({ mock_exam_id: examId, group_id: gid }));
                const { error: tErr } = await db.from('centralized_mock_exam_targets').insert(targetsPayload);
                if (tErr) throw new Error('تعذّر إسناد الاختبار للطلاب/المجموعات: ' + tErr.message);

                showStatus('تم إنشاء الاختبار المحاكي المركزي بنجاح.', true);
                cmSelectedQuestions.clear();
                renderCMCreateForm();
            } catch (err) {
                showStatus('تعذّر إنشاء الاختبار: ' + err.message, false);
            } finally {
                cmCreating = false;
                const b = document.getElementById('cmCreateBtn');
                if (b) { b.disabled = false; b.innerHTML = '<i class="fa-solid fa-plus"></i> إنشاء اختبار'; }
            }
        }

                                    <thead>
                                        <tr class="bg-gray-50 text-xs text-gray-500 font-black">
                                            <th class="py-2 px-3 text-right">الاختبار</th>
                                            <th class="py-2 px-3 text-center">النسبة</th>
                                            <th class="py-2 px-3 text-center">صحيح/كلي</th>
                                            <th class="py-2 px-3 text-center">الزمن</th>
                                            <th class="py-2 px-3 text-center">التاريخ</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rowsHtml}</tbody>
                                </table>
                            </div>
                        </div>`;
                }).join('');

                area.innerHTML = `
                    <div id="printableCMStudentReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
                            <h3 class="font-black text-blue-900"><i class="fa-solid fa-users text-emerald-600"></i> تقرير الاختبارات المحاكية المركزية — حسب الطالب</h3>
                            <button type="button" id="cmPrintStudentBtn" class="no-print bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700"><i class="fa-solid fa-print"></i> طباعة</button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                            <div class="bg-emerald-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-emerald-700">${withData.length}</p><p class="text-xs text-gray-500 font-bold">طالب له محاولات</p></div>
                            <div class="bg-blue-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-blue-700">${overallAvg}٪</p><p class="text-xs text-gray-500 font-bold">المتوسط العام</p></div>
                            <div class="bg-purple-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-purple-700">${totalAttempts}</p><p class="text-xs text-gray-500 font-bold">إجمالي المحاولات</p></div>
                            <div class="bg-amber-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-amber-700">${noAttempt}</p><p class="text-xs text-gray-500 font-bold">بلا محاولات</p></div>
                        </div>
                        ${studentCards}
                    </div>`;

                area.querySelectorAll('.cm-stu-head').forEach((head) => {
                    head.addEventListener('click', () => {
                        const detail = head.nextElementSibling;
                        const caret = head.querySelector('.cm-stu-caret');
                        const open = detail.style.display !== 'none';
                        detail.style.display = open ? 'none' : '';
                        if (caret) caret.style.transform = open ? '' : 'rotate(180deg)';
                    });
                });
                const printBtn = document.getElementById('cmPrintStudentBtn');
                if (printBtn) printBtn.addEventListener('click', () => window.print());
                area.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderCMComparison(selectedExams, statsByExam) {
            const detail = document.getElementById('cmDetailArea');
            detail.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-4"><i class="fa-solid fa-scale-balanced text-purple-600"></i> مقارنة الاختبارات المحددة</h3>
                    <div style="height:300px;"><canvas id="cmCompareChart"></canvas></div>
                </div>
            `;
            if (cmChartInstance) { cmChartInstance.destroy(); cmChartInstance = null; }
            const ctx = document.getElementById('cmCompareChart');
            cmChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: selectedExams.map(e => e.title),
                    datasets: [
                        { label: 'متوسط الدقة %', data: selectedExams.map(e => statsByExam.get(e.id).avgPct), backgroundColor: '#2563eb' },
                        { label: 'عدد المحاولات', data: selectedExams.map(e => statsByExam.get(e.id).attemptsCount), backgroundColor: '#f59e0b' },
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function renderCMExamDetail(exam, stats) {
            const detail = document.getElementById('cmDetailArea');
            detail.innerHTML = '<p class="text-center text-blue-800 font-bold py-6"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            let attempts;
            try {
                attempts = await fetchAllRows(() => db.from('centralized_mock_attempts')
                    .select('user_id, correct_count, total_count, time_spent_ms, completed_at, profiles(full_name, email)')
                    .eq('mock_exam_id', exam.id)
                    .order('completed_at', { ascending: false }));
            } catch (error) { detail.innerHTML = `<p class="text-red-600 text-center py-6">${escapeHtml(error.message)}</p>`; return; }

            detail.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-2">${escapeHtml(exam.title)}</h3>
                    <p class="text-xs text-gray-400 font-bold mb-4">${exam.num_questions} سؤال</p>
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${stats.attemptsCount}</div><div class="text-xs font-bold text-gray-500 mt-1">عدد المحاولات</div></div>
                        <div class="rounded-xl p-4 text-center ${stats.avgPct >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${stats.avgPct >= 60 ? 'text-green-700' : 'text-amber-700'}">${stats.avgPct}٪</div><div class="text-xs font-bold text-gray-500 mt-1">متوسط الدقة</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${formatDuration(stats.totalTimeMs)}</div><div class="text-xs font-bold text-gray-500 mt-1">إجمالي وقت الحل</div></div>
                    </div>
                    <h4 class="font-bold text-gray-700 mb-3">تفصيل حسب الطالب (يشمل وقت كل محاولة)</h4>
                    <div class="space-y-2">
                        ${attempts.map((a) => {
                            const pct = a.total_count > 0 ? Math.round((a.correct_count / a.total_count) * 100) : 0;
                            return `<div class="flex items-center justify-between text-sm border-b border-gray-50 pb-2">
                                <span class="font-bold text-gray-700">${escapeHtml(a.profiles?.full_name || a.profiles?.email || 'طالب')}</span>
                                <span class="text-gray-400 text-xs">${formatDuration(a.time_spent_ms)}</span>
                                <span class="font-black ${pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${a.correct_count}/${a.total_count} (${pct}٪)</span>
                            </div>`;
                        }).join('') || '<p class="text-center text-gray-400 font-bold py-6">لا توجد محاولات بعد.</p>'}
                    </div>
                </div>
            `;
        }
    })();
    </script>
</body>
</html>
