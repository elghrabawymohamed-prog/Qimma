                    // [إصلاح تكرار] نفعّل الحارس قبل أول عملية غير متزامنة (توليد الأسئلة)
                    setBusy();
                    questionIds = await autoGenerateQuestions(sectionSelection, numQuestions);
                    if (!questionIds.length) { showStatus('تعذّر توليد أسئلة من الأقسام المختارة - تأكد من وجود أسئلة فيها.', false); return; }
                }

                setBusy(); // يضمن تفعيل الحارس في المسار اليدوي أيضًا

                // [ميزة المؤقّت] قراءة مدة الاختبار المختارة (null = بلا وقت محدّد)
                const timeMode = (document.querySelector('input[name="cmTimeMode"]:checked') || {}).value;
                const durationMinutes = timeMode === 'timed'
                    ? Math.min(600, Math.max(1, parseInt(document.getElementById('cmDurationInput').value, 10) || 75))
                    : null;

                const { data: { session } } = await db.auth.getSession();
                const examId = generateUUID();
                const { error: examErr } = await db.from('centralized_mock_exams').insert({
                    id: examId, created_by: session.user.id, title, num_questions: questionIds.length, duration_minutes: durationMinutes
                });
                if (examErr) throw new Error('تعذّر إنشاء الاختبار نفسه: ' + examErr.message);

                const questionsPayload = questionIds.map((qid, i) => ({ mock_exam_id: examId, question_id: qid, sort_order: i + 1 }));
                const { error: qErr } = await db.from('centralized_mock_exam_questions').insert(questionsPayload);
                if (qErr) throw new Error('تعذّر ربط الأسئلة بالاختبار: ' + qErr.message);

                const targetsPayload = targetType === 'students'
                    ? studentIds.map(sid => ({ mock_exam_id: examId, student_id: sid }))
                    : groupIds.map(gid => ({ mock_exam_id: examId, group_id: gid }));
                const { error: tErr } = await db.from('centralized_mock_exam_targets').insert(targetsPayload);
                if (tErr) throw new Error('تعذّر إسناد الاختبار للطلاب/المجموعات: ' + tErr.message);

                showStatus('تم إنشاء الاختبار المحاكي المركزي بنجاح.', true);
                cmSelectedQuestions.clear();
                renderCMCreateForm();
            } catch (err) {
                showStatus('تعذّر إنشاء الاختبار: ' + err.message, false);
            } finally {
                cmCreating = false;
                const b = document.getElementById('cmCreateBtn');
                if (b) { b.disabled = false; b.innerHTML = '<i class="fa-solid fa-plus"></i> إنشاء اختبار'; }
            }
        }

        // ---------------- تقارير الاختبارات المحاكية المركزية ----------------
        async function renderCMReports() {
            const wrap = document.getElementById('cmTabContent');
            wrap.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحميل التقارير...</p>';

            const { data: exams, error } = await db.from('centralized_mock_exams').select('id, title, num_questions, duration_minutes, created_at').order('created_at', { ascending: false });
            if (error) { wrap.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(error.message)}</p>`; return; }

            const examIds = exams.map(e => e.id);
            let attempts = [];
            if (examIds.length) {
                const { data } = await db.from('centralized_mock_attempts').select('mock_exam_id, correct_count, total_count, time_spent_ms').in('mock_exam_id', examIds);
                attempts = data || [];
            }
            const statsByExam = new Map();
            exams.forEach((e) => {
                const own = attempts.filter(a => a.mock_exam_id === e.id);
                const totalQ = own.reduce((s, a) => s + a.total_count, 0);
                const totalC = own.reduce((s, a) => s + a.correct_count, 0);
                const totalTime = own.reduce((s, a) => s + (a.time_spent_ms || 0), 0);
                statsByExam.set(e.id, { attemptsCount: own.length, avgPct: totalQ > 0 ? Math.round((totalC / totalQ) * 100) : 0, totalTimeMs: totalTime });
            });

            // [طلب] تحميل المجموعات والطلاب لفلترة التقرير حسب طالب/مجموعة
            const [{ data: groups }, { data: students }, { data: memberships }] = await Promise.all([
                db.from('training_groups').select('id, name').eq('is_archived', false).order('name'),
                db.from('profiles').select('id, full_name, email').eq('role', 'student').order('full_name'),
                db.from('training_group_members').select('group_id, student_id')
            ]);
            const groupMembers = new Map();       // group_id -> [student_id]
            const studentGroupNames = new Map();  // student_id -> [group name]
            const groupNameById = new Map((groups || []).map(g => [g.id, g.name]));
            (memberships || []).forEach((m) => {
                if (!groupMembers.has(m.group_id)) groupMembers.set(m.group_id, []);
                groupMembers.get(m.group_id).push(m.student_id);
                if (!studentGroupNames.has(m.student_id)) studentGroupNames.set(m.student_id, []);
                const gn = groupNameById.get(m.group_id);
                if (gn) studentGroupNames.get(m.student_id).push(gn);
            });

            wrap.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
                    <h3 class="font-black text-blue-900 mb-3"><i class="fa-solid fa-filter text-purple-600"></i> تقرير حسب الطلاب / المجموعات</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">اختر مجموعة أو أكثر</label>
                            <div id="cmGroupChips" class="flex flex-wrap gap-2">
                                ${(groups || []).length ? (groups || []).map(g => `<button type="button" class="cm-group-chip px-3 py-1.5 rounded-full border-2 border-gray-200 text-gray-600 font-bold text-xs" data-group-id="${g.id}" data-on="0">${escapeHtml(g.name)}</button>`).join('') : '<span class="text-gray-400 text-xs font-bold">لا توجد مجموعات.</span>'}
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">أو اختر طلابًا محددين</label>
                            <input type="text" id="cmStudentSearch" placeholder="ابحث باسم الطالب..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-2">
                            <div id="cmStudentList" class="max-h-44 overflow-y-auto border border-gray-200 rounded-lg p-2 space-y-1">
                                ${(students || []).map(s => `<label class="flex items-center gap-2 text-sm py-1 cm-student-row"><input type="checkbox" class="cm-student-cb w-4 h-4" value="${s.id}"><span>${escapeHtml(s.full_name || s.email || 'طالب')}</span></label>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mt-4 flex-wrap">
                        <button type="button" id="cmApplyFilterBtn" class="bg-emerald-600 text-white px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-emerald-700"><i class="fa-solid fa-chart-simple"></i> عرض تقرير الطلاب</button>
                        <button type="button" id="cmClearFilterBtn" class="bg-gray-100 text-gray-600 px-4 py-2.5 rounded-lg font-bold text-sm hover:bg-gray-200"><i class="fa-solid fa-xmark"></i> مسح الفلترة</button>
                    </div>
                </div>

                <div id="cmStudentReportArea" class="mb-6"></div>

                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
                    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
                        <h3 class="font-black text-blue-900"><i class="fa-solid fa-list-ol text-blue-600"></i> التقارير حسب الاختبار</h3>
                        <button type="button" id="cmCompareBtn" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-purple-700 disabled:opacity-40" disabled>
                            <i class="fa-solid fa-scale-balanced"></i> مقارنة المحدد
                        </button>
                    </div>
                    <input type="text" id="cmFilterSearch" placeholder="ابحث بعنوان الاختبار..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm mb-4">
                    <div id="cmExamsListWrap" class="space-y-2"></div>
                </div>
                <div id="cmDetailArea"></div>
            `;

            // ---- فلترة الطلاب/المجموعات ----
            document.querySelectorAll('#cmGroupChips .cm-group-chip').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const on = btn.dataset.on === '1';
                    btn.dataset.on = on ? '0' : '1';
                    btn.classList.toggle('bg-purple-600', !on);
                    btn.classList.toggle('text-white', !on);
                    btn.classList.toggle('border-purple-600', !on);
                });
            });
            const cmStudentSearch = document.getElementById('cmStudentSearch');
            if (cmStudentSearch) {
                cmStudentSearch.addEventListener('input', () => {
                    const q = cmStudentSearch.value.trim();
                    document.querySelectorAll('#cmStudentList .cm-student-row').forEach((row) => {
                        row.style.display = (!q || row.textContent.includes(q)) ? '' : 'none';
                    });
                });
            }
            function getFilteredStudentIds() {
                const ids = new Set();
                document.querySelectorAll('#cmStudentList .cm-student-cb:checked').forEach((cb) => ids.add(cb.value));
                document.querySelectorAll('#cmGroupChips .cm-group-chip[data-on="1"]').forEach((btn) => {
                    (groupMembers.get(btn.dataset.groupId) || []).forEach((sid) => ids.add(sid));
                });
                return [...ids];
            }
            document.getElementById('cmApplyFilterBtn').addEventListener('click', () => {
                const ids = getFilteredStudentIds();
                if (!ids.length) { document.getElementById('cmStudentReportArea').innerHTML = '<p class="text-center text-amber-600 font-bold py-4">اختر مجموعة أو طالبًا واحدًا على الأقل.</p>'; return; }
                renderCMStudentReport(ids, studentGroupNames);
            });
            document.getElementById('cmClearFilterBtn').addEventListener('click', () => {
                document.querySelectorAll('#cmStudentList .cm-student-cb').forEach((cb) => cb.checked = false);
                document.querySelectorAll('#cmGroupChips .cm-group-chip').forEach((btn) => {
                    btn.dataset.on = '0';
                    btn.classList.remove('bg-purple-600', 'text-white', 'border-purple-600');
                });
                document.getElementById('cmStudentReportArea').innerHTML = '';
            });

            function renderList(filterText) {
                const listWrap = document.getElementById('cmExamsListWrap');
                const filtered = exams.filter(e => !filterText || e.title.includes(filterText));
                if (!filtered.length) { listWrap.innerHTML = '<p class="text-gray-400 text-center py-6 text-sm">لا توجد اختبارات مطابقة.</p>'; return; }
                listWrap.innerHTML = '';
                filtered.forEach((e) => {
                    const stats = statsByExam.get(e.id);
                    const row = document.createElement('div');
                    row.className = 'border border-gray-100 rounded-xl p-4 flex items-center justify-between flex-wrap gap-3';
                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="cm-compare-checkbox w-4 h-4" value="${e.id}">
                            <div class="cursor-pointer" data-view-exam="${e.id}">
                                <p class="font-bold text-blue-900">${escapeHtml(e.title)}</p>
                                <p class="text-xs text-gray-400 font-bold">${e.num_questions} سؤال ${e.duration_minutes ? '— ⏱ ' + e.duration_minutes + ' دقيقة ' : '— بلا وقت '}— ${new Date(e.created_at).toLocaleDateString('ar-SA')}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 text-sm">
                            <span title="عدد المحاولات"><span class="font-black text-blue-900">${stats.attemptsCount}</span> محاولة</span>
                            <span class="font-black ${stats.avgPct >= 60 ? 'text-green-600' : 'text-amber-600'}">${stats.avgPct}٪</span>
                            <span class="font-black text-gray-600">${formatDuration(stats.totalTimeMs)}</span>
                        </div>
                    `;
                    row.querySelector('[data-view-exam]').addEventListener('click', () => renderCMExamDetail(e, stats));
                    listWrap.appendChild(row);
                });
                listWrap.querySelectorAll('.cm-compare-checkbox').forEach((cb) => cb.addEventListener('change', updateCompareBtnState));
            }
            renderList('');
            document.getElementById('cmFilterSearch').addEventListener('input', (e) => renderList(e.target.value.trim()));

            function updateCompareBtnState() {
                const checked = document.querySelectorAll('.cm-compare-checkbox:checked');
                document.getElementById('cmCompareBtn').disabled = checked.length < 2;
            }
            document.getElementById('cmCompareBtn').addEventListener('click', () => {
                const checkedIds = [...document.querySelectorAll('.cm-compare-checkbox:checked')].map(cb => cb.value);
                renderCMComparison(checkedIds.map(id => exams.find(e => e.id === id)), statsByExam);
            });

            // ---- [طلب] تقرير مفصّل لكل طالب (جدول لكل طالب) ----
            async function renderCMStudentReport(studentIds, groupNamesMap) {
                const area = document.getElementById('cmStudentReportArea');
                area.innerHTML = '<p class="text-center text-blue-800 font-bold py-6"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تجهيز تقرير الطلاب...</p>';
                const { data: rows, error: aErr } = await db.from('centralized_mock_attempts')
                    .select('user_id, mock_exam_id, correct_count, total_count, time_spent_ms, completed_at, profiles(full_name, email), centralized_mock_exams(title)')
                    .in('user_id', studentIds)
                    .order('completed_at', { ascending: false });
                if (aErr) { area.innerHTML = `<p class="text-red-600 text-center py-6">${escapeHtml(aErr.message)}</p>`; return; }

                // تجميع حسب الطالب
                const byStudent = new Map();
                (rows || []).forEach((r) => {
                    if (!byStudent.has(r.user_id)) {
                        byStudent.set(r.user_id, {
                            name: (r.profiles && (r.profiles.full_name || r.profiles.email)) || 'طالب',
                            groups: (groupNamesMap.get(r.user_id) || []),
                            attempts: [], sumC: 0, sumQ: 0, sumTime: 0
                        });
                    }
                    const s = byStudent.get(r.user_id);
                    const pct = r.total_count > 0 ? Math.round((r.correct_count / r.total_count) * 100) : 0;
                    s.attempts.push({
                        examTitle: (r.centralized_mock_exams && r.centralized_mock_exams.title) || 'اختبار محاكي',
                        pct, correct: r.correct_count, total: r.total_count,
                        timeMs: r.time_spent_ms || 0, date: r.completed_at
                    });
                    s.sumC += r.correct_count; s.sumQ += r.total_count; s.sumTime += (r.time_spent_ms || 0);
                });

                // طلاب بلا محاولات (محددون لكن لم يؤدّوا اختبارًا)
                const withData = [...byStudent.entries()].map(([id, s]) => ({
                    id, ...s, avgPct: s.sumQ > 0 ? Math.round((s.sumC / s.sumQ) * 100) : 0
                }));
                withData.sort((a, b) => b.avgPct - a.avgPct);

                const totalAttempts = withData.reduce((n, s) => n + s.attempts.length, 0);
                const overallAvg = withData.length
                    ? Math.round(withData.reduce((n, s) => n + s.avgPct, 0) / withData.length) : 0;
                const noAttempt = studentIds.length - withData.length;

                if (!withData.length) {
                    area.innerHTML = `
                        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 text-center">
                            <i class="fa-solid fa-inbox text-3xl text-gray-300 mb-3"></i>
                            <p class="font-bold text-gray-500">لا توجد محاولات للاختبارات المحاكية المركزية لدى الطلاب المحددين (${studentIds.length} طالب).</p>
                        </div>`;
                    return;
                }

                const studentCards = withData.map((s) => {
                    const grp = s.groups.length ? s.groups.map(escapeHtml).join('، ') : '—';
                    const rowsHtml = s.attempts.map((at) => `
                        <tr class="border-b border-gray-50">
                            <td class="py-2 px-3 text-sm text-blue-900 font-bold">${escapeHtml(at.examTitle)}</td>
                            <td class="py-2 px-3 text-center"><span class="font-black ${at.pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${at.pct}٪</span></td>
                            <td class="py-2 px-3 text-center text-sm text-gray-600 font-bold">${at.correct}/${at.total}</td>
                            <td class="py-2 px-3 text-center text-sm text-gray-500 font-bold">${formatDuration(at.timeMs)}</td>
                            <td class="py-2 px-3 text-center text-xs text-gray-400 font-bold">${at.date ? new Date(at.date).toLocaleDateString('ar-SA') : '—'}</td>
                        </tr>`).join('');
                    return `
                        <div class="border border-gray-100 rounded-xl overflow-hidden mb-4">
                            <div class="cm-stu-head flex items-center justify-between flex-wrap gap-3 bg-blue-50/60 px-4 py-3 cursor-pointer">
                                <div>
                                    <p class="font-black text-blue-900"><i class="fa-solid fa-user-graduate text-blue-500"></i> ${escapeHtml(s.name)}</p>
                                    <p class="text-xs text-gray-400 font-bold">المجموعة: ${grp}</p>
                                </div>
                                <div class="flex items-center gap-4 text-sm">
                                    <span title="عدد المحاولات"><span class="font-black text-blue-900">${s.attempts.length}</span> محاولة</span>
                                    <span class="font-black ${s.avgPct >= 60 ? 'text-green-600' : 'text-amber-600'}">متوسط ${s.avgPct}٪</span>
                                    <span class="font-black text-gray-500">${formatDuration(s.sumTime)}</span>
                                    <i class="fa-solid fa-chevron-down text-gray-400 cm-stu-caret transition-transform"></i>
                                </div>
                            </div>
                            <div class="cm-stu-detail overflow-x-auto" style="display:none;">
                                <table class="w-full min-w-[520px]">
                                    <thead>
                                        <tr class="bg-gray-50 text-xs text-gray-500 font-black">
                                            <th class="py-2 px-3 text-right">الاختبار</th>
                                            <th class="py-2 px-3 text-center">النسبة</th>
                                            <th class="py-2 px-3 text-center">صحيح/كلي</th>
                                            <th class="py-2 px-3 text-center">الزمن</th>
                                            <th class="py-2 px-3 text-center">التاريخ</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rowsHtml}</tbody>
                                </table>
                            </div>
                        </div>`;
                }).join('');

                area.innerHTML = `
                    <div id="printableCMStudentReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
                            <h3 class="font-black text-blue-900"><i class="fa-solid fa-users text-emerald-600"></i> تقرير الاختبارات المحاكية المركزية — حسب الطالب</h3>
                            <button type="button" id="cmPrintStudentBtn" class="no-print bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700"><i class="fa-solid fa-print"></i> طباعة</button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                            <div class="bg-emerald-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-emerald-700">${withData.length}</p><p class="text-xs text-gray-500 font-bold">طالب له محاولات</p></div>
                            <div class="bg-blue-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-blue-700">${overallAvg}٪</p><p class="text-xs text-gray-500 font-bold">المتوسط العام</p></div>
                            <div class="bg-purple-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-purple-700">${totalAttempts}</p><p class="text-xs text-gray-500 font-bold">إجمالي المحاولات</p></div>
                            <div class="bg-amber-50 rounded-xl p-3 text-center"><p class="text-2xl font-black text-amber-700">${noAttempt}</p><p class="text-xs text-gray-500 font-bold">بلا محاولات</p></div>
                        </div>
                        ${studentCards}
                    </div>`;

                area.querySelectorAll('.cm-stu-head').forEach((head) => {
                    head.addEventListener('click', () => {
                        const detail = head.nextElementSibling;
                        const caret = head.querySelector('.cm-stu-caret');
                        const open = detail.style.display !== 'none';
                        detail.style.display = open ? 'none' : '';
                        if (caret) caret.style.transform = open ? '' : 'rotate(180deg)';
                    });
                });
                const printBtn = document.getElementById('cmPrintStudentBtn');
                if (printBtn) printBtn.addEventListener('click', () => window.print());
                area.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderCMComparison(selectedExams, statsByExam) {
            const detail = document.getElementById('cmDetailArea');
            detail.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-4"><i class="fa-solid fa-scale-balanced text-purple-600"></i> مقارنة الاختبارات المحددة</h3>
                    <div style="height:300px;"><canvas id="cmCompareChart"></canvas></div>
                </div>
            `;
            if (cmChartInstance) { cmChartInstance.destroy(); cmChartInstance = null; }
            const ctx = document.getElementById('cmCompareChart');
            cmChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: selectedExams.map(e => e.title),
                    datasets: [
                        { label: 'متوسط الدقة %', data: selectedExams.map(e => statsByExam.get(e.id).avgPct), backgroundColor: '#2563eb' },
                        { label: 'عدد المحاولات', data: selectedExams.map(e => statsByExam.get(e.id).attemptsCount), backgroundColor: '#f59e0b' },
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function renderCMExamDetail(exam, stats) {
            const detail = document.getElementById('cmDetailArea');
            detail.innerHTML = '<p class="text-center text-blue-800 font-bold py-6"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            const { data: attempts, error } = await db.from('centralized_mock_attempts')
                .select('user_id, correct_count, total_count, time_spent_ms, completed_at, profiles(full_name, email)')
                .eq('mock_exam_id', exam.id)
                .order('completed_at', { ascending: false });
            if (error) { detail.innerHTML = `<p class="text-red-600 text-center py-6">${escapeHtml(error.message)}</p>`; return; }

            detail.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-2">${escapeHtml(exam.title)}</h3>
                    <p class="text-xs text-gray-400 font-bold mb-4">${exam.num_questions} سؤال</p>
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${stats.attemptsCount}</div><div class="text-xs font-bold text-gray-500 mt-1">عدد المحاولات</div></div>
                        <div class="rounded-xl p-4 text-center ${stats.avgPct >= 60 ? 'bg-green-50' : 'bg-amber-50'}"><div class="text-2xl font-black ${stats.avgPct >= 60 ? 'text-green-700' : 'text-amber-700'}">${stats.avgPct}٪</div><div class="text-xs font-bold text-gray-500 mt-1">متوسط الدقة</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${formatDuration(stats.totalTimeMs)}</div><div class="text-xs font-bold text-gray-500 mt-1">إجمالي وقت الحل</div></div>
                    </div>
                    <h4 class="font-bold text-gray-700 mb-3">تفصيل حسب الطالب (يشمل وقت كل محاولة)</h4>
                    <div class="space-y-2">
                        ${attempts.map((a) => {
                            const pct = a.total_count > 0 ? Math.round((a.correct_count / a.total_count) * 100) : 0;
                            return `<div class="flex items-center justify-between text-sm border-b border-gray-50 pb-2">
                                <span class="font-bold text-gray-700">${escapeHtml(a.profiles?.full_name || a.profiles?.email || 'طالب')}</span>
                                <span class="text-gray-400 text-xs">${formatDuration(a.time_spent_ms)}</span>
                                <span class="font-black ${pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${a.correct_count}/${a.total_count} (${pct}٪)</span>
                            </div>`;
                        }).join('') || '<p class="text-center text-gray-400 font-bold py-6">لا توجد محاولات بعد.</p>'}
                    </div>
                </div>
            `;
        }
    })();
    </script>
</body>
</html>
