<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وجهة المسؤول - منصة القمة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=El+Messiri:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ink: #0B1330; --navy: #16204a; --gold: #C9992B; --gold-2: #A9761D; }
        body { font-family: 'Almarai', sans-serif; background: #f8fafc; }
        h1, h2, h3 { font-family: 'El Messiri', serif; }
        .sidebar-royal { background: linear-gradient(180deg, var(--navy) 0%, var(--ink) 100%); }
        .sidebar-link { color: rgba(219,234,254,0.75); transition: background-color .2s ease, color .2s ease; }
        .sidebar-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .sidebar-link.active { background: linear-gradient(90deg, var(--gold), var(--gold-2)); color: #fff; }
        @media print {
            body * { visibility: hidden; }
            #printableReport, #printableReport *, #printableGroupReport, #printableGroupReport *, #printableCMStudentReport, #printableCMStudentReport * { visibility: visible; }
            #printableReport, #printableGroupReport, #printableCMStudentReport { position: absolute; top: 0; right: 0; left: 0; width: 100%; box-shadow: none !important; border: none !important; }
            #printableCMStudentReport .cm-stu-detail { display: table-row-group !important; }
            .no-print { display: none !important; }
        }

        /* ============================================================
           [تحسينات UI/UX مضافة] طبقة صقل بصري وإتاحة (Accessibility)
           لا تمسّ أي منطق برمجي — قواعد CSS إضافية فقط
           ============================================================ */

        /* 1) إتاحة: مؤشّر تركيز واضح للوحة المفاتيح (كان غائبًا تمامًا).
           ضروري لمستخدمي لوحة المفاتيح وقارئات الشاشة (WCAG 2.4.7). */
        a:focus-visible, button:focus-visible, input:focus-visible,
        select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 2px;
            border-radius: 6px;
        }

        /* 2) أهداف لمس مناسبة على الجوال: أي زر/رابط لا يقل بُعده عن 44px
           (إرشاد WCAG 2.5.5 وApple HIG) لتفادي الضغطات الخاطئة. */
        @media (max-width: 640px) {
            button, a[role="button"], .sidebar-link, select {
                min-height: 44px;
            }
            /* منع التمرير الأفقي المزعج على الشاشات الصغيرة */
            html, body { overflow-x: hidden; }
        }

        /* 3) جداول متجاوبة: أي جدول عريض يصبح قابلاً للتمرير داخل حاويته
           بدل أن يدفع كامل الصفحة أفقيًا. */
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* 4) تغذية راجعة عند الضغط (Active) لكل الأزرار — إحساس لمسي أوضح. */
        button:active:not(:disabled) { transform: translateY(1px); }
        button { transition: transform .1s ease, background-color .2s ease, box-shadow .2s ease; }

        /* 5) هيكل تحميل (Skeleton) اختياري — أنعم من ومضة النص وحده. */
        .skeleton {
            background: linear-gradient(90deg, #eef2f7 25%, #e2e8f0 37%, #eef2f7 63%);
            background-size: 400% 100%;
            animation: skeletonShimmer 1.4s ease infinite;
            border-radius: 10px;
        }
        @keyframes skeletonShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        /* 6) احترام تفضيل تقليل الحركة (إتاحة — كان غائبًا). */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
</head>
<body class="text-gray-900 antialiased">

    <!-- شاشة الدخول -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 w-full max-w-sm">
            <h1 class="text-2xl font-black text-blue-900 text-center mb-1"><i class="fa-solid fa-mountain text-amber-500"></i> وجهة المسؤول</h1>
            <p class="text-sm text-gray-500 text-center mb-6">للمسؤولين فقط</p>
            <div id="authError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
            <form id="authForm" class="space-y-3">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">البريد الإلكتروني</label>
                    <input type="email" id="emailInput" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">كلمة المرور</label>
                    <input type="password" id="passwordInput" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
                </div>
                <button type="submit" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <!-- الوجهة الرئيسية: قائمة جانبية + محتوى -->
    <div id="mainScreen" class="hidden flex flex-col md:flex-row min-h-screen">
        <aside class="sidebar-royal w-full md:w-72 shrink-0 md:min-h-screen flex flex-col p-5">
            <div class="flex items-center gap-3 mb-1 text-white">
                <div class="w-11 h-11 rounded-2xl bg-white/10 flex items-center justify-center border border-white/20 shrink-0">
                    <i class="fa-solid fa-mountain text-xl text-yellow-400"></i>
                </div>
                <div>
                    <h1 class="font-black text-base leading-tight">منصة القمة</h1>
                    <p class="text-yellow-300 font-bold text-xs">وجهة المسؤول</p>
                </div>
            </div>

            <nav class="mt-8 space-y-2 flex-1">
                <button type="button" data-hub="content" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-book w-5"></i> لوحة تحكم المحتوى
                </button>
                <button type="button" data-hub="instructors" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-chalkboard-user w-5"></i> لوحة تحكم المدربين
                </button>
                <button type="button" data-hub="students" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-user-graduate w-5"></i> لوحة تحكم المتدربين
                </button>
                <button type="button" data-hub="reports" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-file-lines w-5"></i> لوحة تقارير احترافية
                </button>
                <button type="button" data-hub="centralmock" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-shuffle w-5"></i> إنشاء اختبار محاكي
                </button>
            </nav>

            <div id="superAdminNav" class="hidden border-t border-white/10 pt-4 mt-4">
                <button type="button" data-hub="admins" class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl font-bold text-sm">
                    <i class="fa-solid fa-user-shield w-5"></i> إدارة المسؤولين
                </button>
            </div>
            <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2.5 mt-2 rounded-xl font-bold text-sm text-blue-100/70 hover:bg-white/10 hover:text-white transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> تسجيل الخروج
            </button>
        </aside>

        <main class="flex-1 min-w-0 px-4 md:px-8 py-8">
            <div id="notAdminBanner" class="hidden bg-red-50 border border-red-200 text-red-700 font-bold p-6 rounded-xl text-center">
                هذا الحساب ليس لديه صلاحية مسؤول.
            </div>
            <div id="statusBanner" class="hidden mb-4 p-4 rounded-xl font-bold text-center"></div>
            <div id="hubContent"></div>
        </main>
    </div>

    <!-- نافذة معاينة محتوى السؤال -->
    <div id="previewModal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-black text-blue-900"><i class="fa-solid fa-eye text-blue-600"></i> معاينة السؤال</h3>
                <button type="button" id="previewModalCloseBtn" class="text-gray-400 hover:text-gray-700 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="previewModalBody"></div>
        </div>
    </div>

    <!-- نافذة تعديل بيانات طالب/مدرب (الاسم والمجموعة/التخصص) -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 id="editModalTitle" class="font-black text-blue-900"><i class="fa-solid fa-pen text-blue-600"></i> تعديل البيانات</h3>
                <button type="button" id="editModalCloseBtn" class="text-gray-400 hover:text-gray-700 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="editModalBody"></div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const SUPABASE_URL = 'https://islxgvjvrxebdtihrkbq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__ogPxzJzKKighw363hqGqg_HOIQEn7A';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SPECIALIZATIONS = ['كمي', 'لفظي', 'تحصيلي رياضيات', 'تحصيلي فيزياء', 'تحصيلي كيمياء', 'تحصيلي أحياء'];
        let myRole = null;       // 'admin' | 'super_admin'
        let activeHub = 'content';
        let instructorsCache = [];
        let studentsCache = [];
        let groupsCache = [];

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function showStatus(msg, ok) {
            const el = document.getElementById('statusBanner');
            el.textContent = msg;
            el.className = `mb-4 p-4 rounded-xl font-bold text-center ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.round(ms / 1000));
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // =================================================================
        // نافذة تعديل بيانات الطالب/المدرب (اسم + مجموعة/تخصص) — تُستدعى
        // عبر أيقونة القلم الخافتة بجوار الاسم في قوائم الطلاب والمدربين
        // =================================================================
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function openEditModal({ title, fieldsHtml, onSave, onSaved }) {
            const modal = document.getElementById('editModal');
            document.getElementById('editModalTitle').innerHTML = `<i class="fa-solid fa-pen text-blue-600"></i> ${escapeHtml(title)}`;
            document.getElementById('editModalBody').innerHTML = `
                <div id="editModalError" class="hidden mb-3 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
                <form id="editModalForm" class="space-y-3">
                    ${fieldsHtml}
                    <button type="submit" id="editModalSaveBtn" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">حفظ التعديلات</button>
                </form>
            `;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('editModalForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('editModalError');
                const btn = document.getElementById('editModalSaveBtn');
                errEl.classList.add('hidden');
                btn.disabled = true;
                btn.textContent = 'جاري الحفظ...';
                try {
                    await onSave();
                    closeEditModal();
                    showStatus('تم حفظ التعديلات بنجاح.', true);
                    if (onSaved) await onSaved();
                } catch (err) {
                    errEl.textContent = err.message || 'تعذّر حفظ التعديلات.';
                    errEl.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'حفظ التعديلات';
                }
            });
        }

        // تعديل بيانات طالب: الاسم + إعادة تعيين مجموعته (عبر RPC آمنة
        // admin_update_student_profile تتحقق من صلاحية المسؤول في قاعدة البيانات)
        async function openEditStudentModal(student) {
            const [{ data: allGroups }, { data: membership }] = await Promise.all([
                db.from('training_groups').select('id, name, instructor_id, profiles(full_name)').eq('is_archived', false).order('name'),
                db.from('training_group_members').select('group_id').eq('student_id', student.id).limit(1),
            ]);
            const currentGroupId = (membership && membership[0]) ? membership[0].group_id : null;
            const groupOptions = ['<option value="">بلا مجموعة</option>']
                .concat((allGroups || []).map((g) => `<option value="${g.id}" ${currentGroupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)} — ${escapeHtml(g.profiles?.full_name || '')}</option>`))
                .join('');

            openEditModal({
                title: 'تعديل بيانات الطالب',
                fieldsHtml: `
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">اسم الطالب</label>
                        <input type="text" id="editNameInput" value="${escapeHtml(student.full_name || '')}" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">المجموعة</label>
                        <select id="editGroupSelect" class="w-full border border-gray-200 rounded-lg px-3 py-2">${groupOptions}</select>
                    </div>
                `,
                onSave: async () => {
                    const fullName = document.getElementById('editNameInput').value.trim();
                    const groupId = document.getElementById('editGroupSelect').value || null;
                    const { error } = await db.rpc('admin_update_student_profile', {
                        p_student_id: student.id, p_full_name: fullName, p_group_id: groupId,
                    });
                    if (error) throw new Error(error.message);
                },
                onSaved: () => {
                    const activeTab = document.querySelector('.stab-btn.bg-blue-50');
                    renderStudentsTab(activeTab ? activeTab.dataset.stab : 'list');
                },
            });
        }

        // تعديل بيانات مدرب: الاسم + التخصص (عبر RPC آمنة admin_update_instructor_profile)
        function openEditInstructorModal(inst) {
            openEditModal({
                title: 'تعديل بيانات المدرب',
                fieldsHtml: `
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">اسم المدرب</label>
                        <input type="text" id="editNameInput" value="${escapeHtml(inst.full_name || '')}" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">التخصص</label>
                        <select id="editSpecSelect" required class="w-full border border-gray-200 rounded-lg px-3 py-2">
                            ${SPECIALIZATIONS.map((s) => `<option value="${s}" ${inst.specialization === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </div>
                `,
                onSave: async () => {
                    const fullName = document.getElementById('editNameInput').value.trim();
                    const specialization = document.getElementById('editSpecSelect').value;
                    const { error } = await db.rpc('admin_update_instructor_profile', {
                        p_instructor_id: inst.id, p_full_name: fullName, p_specialization: specialization,
                    });
                    if (error) throw new Error(error.message);
                },
                onSaved: async () => {
                    await loadInstructors();
                    renderInstructorsList();
                },
            });
        }

        // ---------------- المصادقة ----------------
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errEl = document.getElementById('authError');
            errEl.classList.add('hidden');
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) { errEl.textContent = 'بيانات الدخول غير صحيحة.'; errEl.classList.remove('hidden'); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => db.auth.signOut());

        document.getElementById('previewModalCloseBtn').addEventListener('click', () => {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewModal').classList.remove('flex');
        });
        document.getElementById('editModalCloseBtn').addEventListener('click', closeEditModal);
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') closeEditModal();
        });

        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') {
                e.currentTarget.classList.add('hidden');
                e.currentTarget.classList.remove('flex');
            }
        });

        db.auth.onAuthStateChange((_e, session) => renderGate(session));
        db.auth.getSession().then(({ data }) => renderGate(data.session));

        async function renderGate(session) {
            const authScreen = document.getElementById('authScreen');
            const mainScreen = document.getElementById('mainScreen');
            if (!session) {
                authScreen.classList.remove('hidden');
                mainScreen.classList.add('hidden');
                return;
            }
            authScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');

            const { data: profile, error } = await db.from('profiles').select('role, is_admin').eq('id', session.user.id).single();
            const isAdmin = !error && profile && profile.is_admin;
            myRole = profile ? profile.role : null;
            document.getElementById('notAdminBanner').classList.toggle('hidden', isAdmin);
            document.getElementById('superAdminNav').classList.toggle('hidden', myRole !== 'super_admin');
            if (isAdmin) switchHub(activeHub);
        }

        // ---------------- التنقّل بين الأقسام ----------------
        document.querySelectorAll('[data-hub]').forEach((btn) => {
            btn.addEventListener('click', () => switchHub(btn.dataset.hub));
        });

        function switchHub(hub) {
            activeHub = hub;
            document.querySelectorAll('[data-hub]').forEach((b) => b.classList.toggle('active', b.dataset.hub === hub));
            const content = document.getElementById('hubContent');
            content.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            if (hub === 'content') renderContentHub(content);
            else if (hub === 'instructors') renderInstructorsHub(content);
            else if (hub === 'students') renderStudentsHub(content);
            else if (hub === 'reports') renderReportsHub(content);
            else if (hub === 'admins') renderAdminsHub(content);
            else if (hub === 'centralmock') renderCentralMockHub(content);
        }

        // =================================================================
        // ١) لوحة تحكم المحتوى - رابط مباشر للوحة الموجودة أصلاً
        // =================================================================
        let currentNodeId = null;
        let currentExamId = null;
        let contentExamsCache = new Map();
        let selectedImageFile = null;

        function renderContentHub(content) {
            content.innerHTML = `
                <h2 class="text-2xl font-black text-blue-900 mb-4"><i class="fa-solid fa-book text-amber-500"></i> لوحة تحكم المحتوى</h2>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block font-bold text-gray-700 mb-2 text-sm"><i class="fa-solid fa-folder-tree text-blue-500"></i> القسم</label>
                            <select id="nodeSelect" class="w-full border border-gray-200 rounded-lg px-3 py-2"></select>
                        </div>
                        <div>
                            <label class="block font-bold text-gray-700 mb-2 text-sm"><i class="fa-solid fa-file-lines text-blue-500"></i> الاختبار</label>
                            <div class="flex items-center gap-2">
                                <select id="examSelect" class="flex-1 border border-gray-200 rounded-lg px-3 py-2"></select>
                                <button type="button" id="newExamBtn" title="اختبار جديد" class="bg-emerald-600 text-white w-10 h-10 shrink-0 rounded-lg font-bold hover:bg-emerald-700"><i class="fa-solid fa-plus"></i></button>
                                <button type="button" id="deleteExamBtn" title="حذف الاختبار" class="bg-red-50 text-red-600 border border-red-200 w-10 h-10 shrink-0 rounded-lg font-bold hover:bg-red-100"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400 mt-3"><i class="fa-solid fa-circle-info"></i> كل اختبار يحتوي عدة أسئلة يجاوبها الطالب دفعة واحدة ثم يرى نتيجته</p>
                </div>

                <div id="examAttachmentsSection" class="bg-white rounded-2xl shadow-sm border border-gray-100 mb-5 hidden overflow-hidden">
                    <button type="button" id="attachmentsToggle" class="w-full flex items-center justify-between p-5 text-right">
                        <span class="font-black text-blue-900"><i class="fa-solid fa-paperclip"></i> مرفقات هذا النموذج (فيديو وملفات PDF)</span>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-sm" id="attachmentsChevron"></i>
                    </button>
                    <div id="attachmentsBody" class="hidden px-5 pb-5 border-t border-gray-100 pt-4">
                        <div class="mb-4">
                            <label class="block font-bold text-gray-700 mb-2">فيديو الشرح</label>

        function renderMathText(str) {
            if (!str) return '';
            const pattern = /\{\{(frac|sqrt|pow):([^|}]*)\|([^}]*)\}\}/g;
            let result = '';
            let lastIndex = 0;
            let match;
            while ((match = pattern.exec(str)) !== null) {
                result += escapeHtml(str.slice(lastIndex, match.index));
                const [, type, part1, part2] = match;
                if (type === 'frac') {
                    result += `<span class="inline-flex flex-col items-center align-middle mx-1 text-sm leading-tight"><span class="px-1 border-b border-current">${escapeHtml(part1)}</span><span class="px-1">${escapeHtml(part2)}</span></span>`;
                } else if (type === 'sqrt') {
                    const index = part1 ? `<sup class="text-xs relative -left-1">${escapeHtml(part1)}</sup>` : '';
                    result += `<span class="inline-flex items-start mx-0.5">${index}<span>√</span><span class="border-t border-current px-0.5">${escapeHtml(part2)}</span></span>`;
                } else if (type === 'pow') {
                    result += `${escapeHtml(part1)}<sup>${escapeHtml(part2)}</sup>`;
                }
                lastIndex = pattern.lastIndex;
            }
            result += escapeHtml(str.slice(lastIndex));
            return result;
        }

        async function loadNodeOptions() {
            const { data, error } = await db.from('nodes').select('id, key, type, parent_id').order('sort_order');
            if (error) { showStatus('تعذّر تحميل الأقسام: ' + error.message, false); return; }
            const byId = new Map(data.map(n => [n.id, n]));
            function fullPath(node) {
                const parts = [node.key];
                let p = byId.get(node.parent_id);
                while (p) { parts.unshift(p.key); p = byId.get(p.parent_id); }
                return parts.join(' ← ');
            }
            const select = document.getElementById('nodeSelect');
            select.innerHTML = '';
            data.filter(n => n.type === 'testGroup').forEach(n => {
                const opt = document.createElement('option');
                opt.value = n.id;
                opt.textContent = fullPath(n);
                select.appendChild(opt);
            });
            if (select.options.length > 0) {
                currentNodeId = select.value;
                await loadExamOptions();
            }
            select.addEventListener('change', async () => {
                currentNodeId = select.value;
                await loadExamOptions();
            });
        }

        async function loadExamOptions() {
            const examSelect = document.getElementById('examSelect');
            examSelect.innerHTML = '';
            currentExamId = null;
            const { data, error } = await db.from('exams').select('id, exam_number, title, video_url, unsolved_pdf_url, solved_pdf_url').eq('node_id', currentNodeId).order('exam_number');
            if (error) { showStatus('تعذّر تحميل الاختبارات: ' + error.message, false); return; }
            if (data.length === 0) {
                examSelect.innerHTML = '<option value="">لا توجد اختبارات - أنشئ واحدًا</option>';
                document.getElementById('questionsList').innerHTML = '<p class="text-gray-400 text-sm">أنشئ اختبارًا أولاً.</p>';
                document.getElementById('questionForm').classList.add('hidden');
                document.getElementById('examAttachmentsSection').classList.add('hidden');
                return;
            }
            document.getElementById('questionForm').classList.remove('hidden');
            document.getElementById('examAttachmentsSection').classList.remove('hidden');
            contentExamsCache = new Map(data.map(ex => [ex.id, ex]));
            data.forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex.id;
                opt.textContent = ex.title || `اختبار رقم ${ex.exam_number}`;
                examSelect.appendChild(opt);
            });
            currentExamId = examSelect.value;
            fillAttachmentsFields(currentExamId);
            await loadQuestions();
        }

        function fillAttachmentsFields(examId) {
            const ex = contentExamsCache.get(examId);
            document.getElementById('examVideoStatus').textContent = ex && ex.video_url ? 'يوجد فيديو مرفوع حاليًا - رفع ملف جديد سيستبدله' : 'لا يوجد فيديو بعد';
            document.getElementById('examVideoUrlInput').value = (ex && ex.video_url) || '';
            document.getElementById('unsolvedPdfStatus').textContent = ex && ex.unsolved_pdf_url ? 'يوجد ملف مرفوع حاليًا - رفع ملف جديد سيستبدله' : 'لا يوجد ملف بعد';
            document.getElementById('solvedPdfStatus').textContent = ex && ex.solved_pdf_url ? 'يوجد ملف مرفوع حاليًا - رفع ملف جديد سيستبدله' : 'لا يوجد ملف بعد';

            const unsolvedBtn = document.getElementById('previewUnsolvedPdfBtn');
            unsolvedBtn.disabled = !(ex && ex.unsolved_pdf_url);
            unsolvedBtn.onclick = () => { if (ex && ex.unsolved_pdf_url) window.open(ex.unsolved_pdf_url, '_blank'); };

            const solvedBtn = document.getElementById('previewSolvedPdfBtn');
            solvedBtn.disabled = !(ex && ex.solved_pdf_url);
            solvedBtn.onclick = () => { if (ex && ex.solved_pdf_url) window.open(ex.solved_pdf_url, '_blank'); };
        }

        async function loadQuestions() {
            const list = document.getElementById('questionsList');
            if (!currentExamId) { list.innerHTML = '<p class="text-gray-400 text-sm">اختر اختبارًا أولاً.</p>'; return; }
            list.innerHTML = '<p class="text-gray-400 text-sm">جاري التحميل...</p>';
            const { data, error } = await db.from('questions').select('id, question_number, question_type, text_content, image_url').eq('exam_id', currentExamId).order('question_number');
            if (error) { list.innerHTML = `<p class="text-red-600 text-sm">${escapeHtml(error.message)}</p>`; return; }
            if (data.length === 0) { list.innerHTML = '<p class="text-gray-400 text-sm">لا توجد أسئلة في هذا الاختبار بعد.</p>'; return; }
            list.innerHTML = '';
            data.forEach(q => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between border border-gray-100 rounded-lg p-3';
                const label = document.createElement('span');
                label.className = 'text-sm font-bold text-gray-700';
                label.textContent = `#${q.question_number} - ${q.question_type === 'image' ? 'صورة' : (q.text_content || '').slice(0, 40)}`;
                const actionsWrap = document.createElement('div');
                actionsWrap.className = 'flex items-center gap-3 shrink-0';
                const previewBtn = document.createElement('button');
                previewBtn.className = 'text-blue-700 hover:text-blue-900 text-sm font-bold';
                previewBtn.innerHTML = '<i class="fa-solid fa-eye"></i> معاينة';
                previewBtn.addEventListener('click', () => previewQuestion(q));
                const delBtn = document.createElement('button');
                delBtn.className = 'text-red-600 hover:text-red-800 text-sm';
                delBtn.innerHTML = '<i class="fa-solid fa-trash"></i> حذف';
                delBtn.addEventListener('click', () => deleteQuestion(q.id));
                actionsWrap.appendChild(previewBtn);
                actionsWrap.appendChild(delBtn);
                row.appendChild(label);
                row.appendChild(actionsWrap);
                list.appendChild(row);
            });
        }

        async function previewQuestion(q) {
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('previewModalBody');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            body.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            const { data: choices, error } = await db.from('choices').select('choice_key, text_content, image_url, is_correct').eq('question_id', q.id).order('sort_order');
            if (error) { body.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(error.message)}</p>`; return; }

            // [إصلاح أمني] تعقيم عنوان الصورة قبل حقنه في سمة src لمنع كسر السمة
            // وحقن سمات/سكربت (Attribute-injection XSS). escapeHtml يهرّب علامتَي
            // الاقتباس أيضًا فلا يمكن الخروج من السمة.
            const questionContentHtml = q.question_type === 'image' && q.image_url
                ? `<img src="${escapeHtml(q.image_url)}" class="max-h-64 mx-auto rounded-lg border border-gray-200 mb-4">`
                : `<p class="text-lg font-bold text-blue-900 mb-4">${escapeHtml(q.text_content || '')}</p>`;

            body.innerHTML = `
                <p class="text-xs text-gray-400 font-bold mb-2">السؤال #${q.question_number}</p>
                ${questionContentHtml}
                <div class="grid grid-cols-2 gap-3">
                    ${choices.map(c => `
                        <div class="border-2 rounded-lg p-3 text-center ${c.is_correct ? 'border-green-500 bg-green-50' : 'border-gray-200'}">
                            ${c.image_url ? `<img src="${escapeHtml(c.image_url)}" class="max-h-24 mx-auto mb-2 rounded">` : ''}
                            <span class="font-bold ${c.is_correct ? 'text-green-700' : 'text-gray-700'}">${escapeHtml(c.text_content || '')}</span>
                            ${c.is_correct ? '<i class="fa-solid fa-circle-check text-green-600 mr-1"></i>' : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function deleteQuestion(id) {
            if (!confirm('حذف هذا السؤال نهائيًا؟')) return;
            const { error } = await db.from('questions').delete().eq('id', id);
            if (error) showStatus('تعذّر الحذف: ' + error.message, false);
            else { showStatus('تم الحذف.', true); await loadQuestions(); }
        }

        function initContentHubLogic() {
            loadNodeOptions();

            document.getElementById('saveAttachmentsBtn').addEventListener('click', async () => {
                if (!currentExamId) { showStatus('اختر اختبارًا أولاً.', false); return; }
                const btn = document.getElementById('saveAttachmentsBtn');
                btn.disabled = true;
                btn.textContent = 'جاري الحفظ...';
                try {
                    const updates = {};
                    const examVideoMode = document.querySelector('input[name="examVideoMode"]:checked').value;
                    if (examVideoMode === 'link') {
                        const videoUrl = document.getElementById('examVideoUrlInput').value.trim();
                        if (videoUrl) updates.video_url = videoUrl;
                    } else {
                        const videoFile = document.getElementById('examVideoFileInput').files[0];
                        if (videoFile) {
                            const videoExt = (videoFile.name.split('.').pop() || 'mp4').toLowerCase();
                            const videoPath = `exam-${currentExamId}-video-${Date.now()}.${videoExt}`;
                            const { error: videoErr } = await db.storage.from('exam-videos').upload(videoPath, videoFile);
                            if (videoErr) throw videoErr;
                            updates.video_url = db.storage.from('exam-videos').getPublicUrl(videoPath).data.publicUrl;
                        }
                    }
                    const unsolvedFile = document.getElementById('unsolvedPdfInput').files[0];
                    if (unsolvedFile) {
                        const unsolvedExt = (unsolvedFile.name.split('.').pop() || 'pdf').toLowerCase();
                        const path = `exam-${currentExamId}-unsolved-${Date.now()}.${unsolvedExt}`;
                        const { error: upErr } = await db.storage.from('exam-pdfs').upload(path, unsolvedFile);
                        if (upErr) throw upErr;
                        updates.unsolved_pdf_url = db.storage.from('exam-pdfs').getPublicUrl(path).data.publicUrl;
                    }
                    const solvedFile = document.getElementById('solvedPdfInput').files[0];
                    if (solvedFile) {
                        const solvedExt = (solvedFile.name.split('.').pop() || 'pdf').toLowerCase();
                        const path = `exam-${currentExamId}-solved-${Date.now()}.${solvedExt}`;
                        const { error: upErr2 } = await db.storage.from('exam-pdfs').upload(path, solvedFile);
                        if (upErr2) throw upErr2;
                        updates.solved_pdf_url = db.storage.from('exam-pdfs').getPublicUrl(path).data.publicUrl;
                    }
                    const { error } = await db.from('exams').update(updates).eq('id', currentExamId);
                    if (error) throw error;
                    showStatus('تم حفظ المرفقات بنجاح.', true);
                    document.getElementById('examVideoFileInput').value = '';
                    document.getElementById('unsolvedPdfInput').value = '';
                    document.getElementById('solvedPdfInput').value = '';
                    await loadExamOptions();
                    document.getElementById('examSelect').value = currentExamId;
                } catch (err) {
                    showStatus('تعذّر الحفظ: ' + err.message, false);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ المرفقات';
                }
            });

            document.getElementById('examSelect').addEventListener('change', async (e) => {
                currentExamId = e.target.value;
                if (currentExamId) { fillAttachmentsFields(currentExamId); await loadQuestions(); }
            });

            document.getElementById('newExamBtn').addEventListener('click', async () => {
                if (!currentNodeId) { showStatus('اختر قسمًا أولاً.', false); return; }
                const { data: existing, error: countErr } = await db.from('exams').select('exam_number').eq('node_id', currentNodeId).order('exam_number', { ascending: false }).limit(1);
                if (countErr) { showStatus('خطأ: ' + countErr.message, false); return; }
                const nextNumber = existing.length ? existing[0].exam_number + 1 : 1;
                const { error } = await db.from('exams').insert({ node_id: currentNodeId, exam_number: nextNumber, title: `اختبار رقم ${nextNumber}`, sort_order: nextNumber });
                if (error) { showStatus('تعذّر إنشاء الاختبار: ' + error.message, false); return; }
                showStatus(`تم إنشاء اختبار رقم ${nextNumber}.`, true);
                await loadExamOptions();
            });

            document.getElementById('deleteExamBtn').addEventListener('click', async () => {
                if (!currentExamId) { showStatus('اختر اختبارًا أولاً.', false); return; }
                const examLabel = document.getElementById('examSelect').selectedOptions[0]?.textContent || 'هذا الاختبار';
                if (!confirm(`حذف "${examLabel}" نهائيًا مع كل أسئلته وخياراته؟ لا يمكن التراجع.`)) return;
                const { error } = await db.from('exams').delete().eq('id', currentExamId);
                if (error) { showStatus('تعذّر الحذف: ' + error.message, false); return; }
                showStatus('تم حذف الاختبار.', true);
                await loadExamOptions();
            });

            function bindPreview(inputEl, previewEl) {
                const update = () => { previewEl.innerHTML = renderMathText(inputEl.value) || '<span class="text-gray-300">—</span>'; };
                inputEl.addEventListener('input', update);
                update();
            }
            bindPreview(document.getElementById('textContentInput'), document.getElementById('textContentPreview'));
            document.querySelectorAll('.choice-text').forEach((input) => {
                const preview = input.parentElement.querySelector('.choice-preview');
                if (preview) bindPreview(input, preview);
            });

            document.getElementById('attachmentsToggle').addEventListener('click', () => {
                document.getElementById('attachmentsBody').classList.toggle('hidden');
                document.getElementById('attachmentsChevron').classList.toggle('fa-chevron-down');
                document.getElementById('attachmentsChevron').classList.toggle('fa-chevron-up');
            });
            document.getElementById('questionVideoToggle').addEventListener('click', () => {
                document.getElementById('questionVideoBody').classList.toggle('hidden');
                document.getElementById('questionVideoChevron').classList.toggle('fa-chevron-down');
                document.getElementById('questionVideoChevron').classList.toggle('fa-chevron-up');
            });
            document.getElementById('questionType').addEventListener('change', (e) => {
                const isImage = e.target.value === 'image';
                document.getElementById('imageFieldWrap').classList.toggle('hidden', !isImage);
                document.getElementById('textFieldWrap').classList.toggle('hidden', isImage);
            });
            document.querySelectorAll('input[name="examVideoMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isUpload = e.target.value === 'upload';
                    document.getElementById('examVideoUploadWrap').classList.toggle('hidden', !isUpload);
                    document.getElementById('examVideoLinkWrap').classList.toggle('hidden', isUpload);
                });
            });
            document.querySelectorAll('input[name="questionVideoMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isUpload = e.target.value === 'upload';
                    document.getElementById('questionVideoFileInput').classList.toggle('hidden', !isUpload);
                    document.getElementById('questionVideoUrlInput').classList.toggle('hidden', isUpload);
                });
            });
            document.querySelectorAll('input[name="choicesMode"]').forEach((radio) => {
                radio.addEventListener('change', (e) => {
                    const isFixed = e.target.value === 'fixed';
                    document.getElementById('fixedChoicesWrap').classList.toggle('hidden', !isFixed);
                    document.getElementById('textChoicesWrap').classList.toggle('hidden', isFixed);
                });
            });
            document.getElementById('imageFileInput').addEventListener('change', (e) => {
                selectedImageFile = e.target.files[0] || null;
                const preview = document.getElementById('imagePreview');
                if (selectedImageFile) { preview.src = URL.createObjectURL(selectedImageFile); preview.classList.remove('hidden'); }
                else { preview.classList.add('hidden'); }
            });

            document.getElementById('questionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitQuestionBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'جاري الحفظ...';
                try {
                    if (!currentExamId) throw new Error('اختر اختبارًا أولاً (أنشئ واحدًا لو لم يوجد).');
                    const qType = document.getElementById('questionType').value;
                    const choicesMode = document.querySelector('input[name="choicesMode"]:checked').value;
                    let correctIndex, choiceTexts;
                    if (choicesMode === 'fixed') {
                        correctIndex = Number(document.querySelector('input[name="correctChoiceFixed"]:checked').value);
                        choiceTexts = ['أ', 'ب', 'ج', 'د'];
                    } else {
                        correctIndex = Number(document.querySelector('input[name="correctChoiceText"]:checked').value);
                        choiceTexts = Array.from(document.querySelectorAll('.choice-text')).map(i => i.value.trim());
                        if (choiceTexts.some(t => !t)) throw new Error('يجب تعبئة كل الخيارات الأربعة.');
                    }
                    const { data: existing, error: countErr } = await db.from('questions').select('question_number').eq('exam_id', currentExamId).order('question_number', { ascending: false }).limit(1);
                    if (countErr) throw countErr;
                    const nextNumber = existing.length ? existing[0].question_number + 1 : 1;
                    let imageUrl = null;
                    let textContent = null;
                    if (qType === 'image') {
                        if (!selectedImageFile) throw new Error('اختر صورة السؤال.');
                        const imgExt = (selectedImageFile.name.split('.').pop() || 'png').toLowerCase();
                        const filePath = `q-${currentExamId}-${Date.now()}.${imgExt}`;
                        const { error: uploadErr } = await db.storage.from('question-images').upload(filePath, selectedImageFile);
                        if (uploadErr) throw uploadErr;
                        const { data: publicUrlData } = db.storage.from('question-images').getPublicUrl(filePath);
                        imageUrl = publicUrlData.publicUrl;
                    } else {
                        textContent = document.getElementById('textContentInput').value.trim();
                        if (!textContent) throw new Error('اكتب نص السؤال.');
                    }
                    let questionVideoUrl = null;
                    const questionVideoMode = document.querySelector('input[name="questionVideoMode"]:checked').value;
                    if (questionVideoMode === 'link') {
                        const link = document.getElementById('questionVideoUrlInput').value.trim();
                        if (link) questionVideoUrl = link;
                    } else {
                        const questionVideoFile = document.getElementById('questionVideoFileInput').files[0];
                        if (questionVideoFile) {
                            const vExt = (questionVideoFile.name.split('.').pop() || 'mp4').toLowerCase();
                            const vPath = `q-${currentExamId}-${Date.now()}-video.${vExt}`;
                            const { error: vErr } = await db.storage.from('exam-videos').upload(vPath, questionVideoFile);
                            if (vErr) throw vErr;
                            questionVideoUrl = db.storage.from('exam-videos').getPublicUrl(vPath).data.publicUrl;
                        }
                    }
                    const { data: newQuestion, error: qErr } = await db.from('questions').insert({
                        exam_id: currentExamId, question_number: nextNumber, question_type: qType,
                        text_content: textContent, image_url: imageUrl,
                        image_alt: qType === 'image' ? document.getElementById('imageAltInput').value.trim() : null,
                        video_url: questionVideoUrl, sort_order: nextNumber
                    }).select().single();
                    if (qErr) throw qErr;
                    const choiceKeys = ['a', 'b', 'c', 'd'];
                    const choicesPayload = choiceTexts.map((label, i) => ({ question_id: newQuestion.id, choice_key: choiceKeys[i], text_content: label, is_correct: i === correctIndex, sort_order: i + 1 }));
                    const { error: cErr } = await db.from('choices').insert(choicesPayload);
                    if (cErr) throw cErr;
                    showStatus('تمت إضافة السؤال بنجاح.', true);
                    document.getElementById('questionForm').reset();
                    document.getElementById('imagePreview').classList.add('hidden');
                    selectedImageFile = null;
                    document.getElementById('imageFieldWrap').classList.add('hidden');
                    document.getElementById('textFieldWrap').classList.remove('hidden');
                    document.getElementById('fixedChoicesWrap').classList.remove('hidden');
                    document.getElementById('textChoicesWrap').classList.add('hidden');
                    await loadQuestions();
                } catch (err) {
                    showStatus('خطأ: ' + err.message, false);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> إضافة السؤال';
                }
            });
        }

        async function deleteAccount(userId, label, kind) {
            const confirmMsg = kind === 'instructor'
                ? `هل أنت متأكد من حذف حساب المدرب "${label}" نهائيًا؟ سيُحذف مع كل مجموعاته. لا يمكن التراجع عن هذا الإجراء.`
                : `هل أنت متأكد من حذف حساب الطالب "${label}" نهائيًا؟ سيُحذف مع كل بياناته وتقدّمه. لا يمكن التراجع عن هذا الإجراء.`;
            if (!window.confirm(confirmMsg)) return;

            const { data, error } = await db.functions.invoke('admin-delete-account', { body: { user_id: userId } });
            if (error) {
                let detail = error.message;
                try {
                    if (error.context && typeof error.context.json === 'function') {
                        const body = await error.context.json();
                        if (body && body.error) detail = body.error;
                    }
                } catch (_e) {}
                showStatus('تعذّر الحذف: ' + detail, false);
                return;
            }
            if (data && data.error) { showStatus('تعذّر الحذف: ' + data.error, false); return; }

            showStatus('تم حذف الحساب نهائيًا.', true);
            if (kind === 'instructor') {
                await loadInstructors();
                renderInstructorsList();
                document.getElementById('groupsPanel').innerHTML = '';
            } else {
                const activeTab = document.querySelector('.stab-btn.bg-blue-50');
                renderStudentsTab(activeTab ? activeTab.dataset.stab : 'list');
            }
        }

        let cmShowArchivedGroups = false;

        // ---------------------------------------------------------------
        // متصفح المجموعات المؤرشفة عبر كل المدربين - بحث + تصفية تاريخ
        // ---------------------------------------------------------------
        async function renderAllArchivedGroupsPanel() {
            const panel = document.getElementById('groupsPanel');
            panel.innerHTML = '<p class="text-center text-blue-800 font-bold py-6"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحميل المجموعات المؤرشفة...</p>';

            const { data: archived, error } = await db.from('training_groups')
                .select('id, name, archived_at, created_at, profiles(full_name, email)')
                .eq('is_archived', true)
                .order('archived_at', { ascending: false });
            if (error) { panel.innerHTML = `<p class="text-red-600 text-center py-6">${escapeHtml(error.message)}</p>`; return; }

            panel.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <h3 class="font-black text-blue-900 mb-4"><i class="fa-solid fa-boxes-packing text-amber-500"></i> المجموعات المؤرشفة (كل المدربين)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-5">
                        <input type="text" id="archivedSearchInput" placeholder="ابحث باسم المجموعة أو المدرب..." class="border border-gray-200 rounded-lg px-3 py-2 text-sm md:col-span-1">
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">أُرشفت من تاريخ</label><input type="date" id="archivedFromDate" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">إلى تاريخ</label><input type="date" id="archivedToDate" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"></div>
                    </div>
                    <div id="archivedGroupsGlobalWrap" class="space-y-2"></div>
                </div>
            `;

            function renderFiltered() {
                const q = document.getElementById('archivedSearchInput').value.trim().toLowerCase();
                const fromDate = document.getElementById('archivedFromDate').value;
                const toDate = document.getElementById('archivedToDate').value;
                const toDateEnd = toDate ? new Date(toDate) : null;
                if (toDateEnd) toDateEnd.setHours(23, 59, 59, 999);

                const filtered = archived.filter((g) => {
                    if (q) {
                        const instName = (g.profiles?.full_name || g.profiles?.email || '').toLowerCase();
                        if (!g.name.toLowerCase().includes(q) && !instName.includes(q)) return false;
                    }
                    if (g.archived_at) {
                        const archivedDate = new Date(g.archived_at);
                        if (fromDate && archivedDate < new Date(fromDate)) return false;
                        if (toDateEnd && archivedDate > toDateEnd) return false;
                    } else if (fromDate || toDate) {
                        return false; // لا تاريخ أرشفة مسجّل (بيانات قديمة) - استبعدها عند التصفية بتاريخ
                    }
                    return true;
                });

                const wrap = document.getElementById('archivedGroupsGlobalWrap');
                if (filtered.length === 0) {
                    wrap.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">لا توجد نتائج مطابقة.</p>';
                    return;
                }
                wrap.innerHTML = filtered.map(g => `
                    <div class="flex items-center justify-between border border-gray-100 rounded-xl p-3 flex-wrap gap-2">
                        <div>
                            <p class="font-bold text-gray-700 text-sm">${escapeHtml(g.name)}</p>
                            <p class="text-xs text-gray-400 font-bold">مدرب: ${escapeHtml(g.profiles?.full_name || g.profiles?.email || '')} — أُرشفت ${g.archived_at ? new Date(g.archived_at).toLocaleDateString('ar-SA') : 'قبل هذا التحديث'}</p>
                        </div>
                        <button type="button" data-restore-global="${g.id}" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-emerald-100">
                            <i class="fa-solid fa-rotate-left"></i> استعادة
                        </button>
                    </div>
                `).join('');
                wrap.querySelectorAll('[data-restore-global]').forEach((btn) => {
                    btn.addEventListener('click', async () => {
                        const { error: rErr } = await db.from('training_groups').update({ is_archived: false, archived_at: null }).eq('id', btn.dataset.restoreGlobal);
                        if (rErr) { showStatus('تعذّر الاستعادة: ' + rErr.message, false); return; }
                        showStatus('تمت استعادة المجموعة.', true);
                        renderAllArchivedGroupsPanel();
                    });
                });
            }

            renderFiltered();
            document.getElementById('archivedSearchInput').addEventListener('input', renderFiltered);
            document.getElementById('archivedFromDate').addEventListener('change', renderFiltered);
            document.getElementById('archivedToDate').addEventListener('change', renderFiltered);
        }

            document.getElementById('createGroupBtn').addEventListener('click', async () => {

        async function renderGroupsList(instructor) {
            const wrap = document.getElementById('groupsListWrap');
            wrap.innerHTML = '<p class="text-center text-blue-800 font-bold py-4"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';

            const { data: groups, error: gErr } = await db.from('training_groups').select('*').eq('instructor_id', instructor.id).eq('is_archived', cmShowArchivedGroups).order('created_at');
            if (gErr) { wrap.innerHTML = `<p class="text-red-600 text-center py-4">${escapeHtml(gErr.message)}</p>`; return; }
            groupsCache = groups;

            if (groupsCache.length === 0) {
                wrap.innerHTML = cmShowArchivedGroups
                    ? '<p class="text-gray-400 text-sm text-center py-4">لا توجد مجموعات مؤرشفة.</p>'
                    : '<p class="text-gray-400 text-sm text-center py-4">لا توجد مجموعات بعد لهذا المدرب.</p>';
                return;
            }

            const groupIds = groupsCache.map(g => g.id);
            const { data: members } = await db.from('training_group_members').select('group_id, student_id').in('group_id', groupIds);
            const membersByGroup = new Map();
            (members || []).forEach(m => {
                if (!membersByGroup.has(m.group_id)) membersByGroup.set(m.group_id, new Set());
                membersByGroup.get(m.group_id).add(m.student_id);
            });

            wrap.innerHTML = '';
            groupsCache.forEach((group) => {
                const memberIds = membersByGroup.get(group.id) || new Set();
                const box = document.createElement('div');
                box.className = 'border border-gray-100 rounded-xl p-4' + (cmShowArchivedGroups ? ' bg-gray-50 opacity-80' : '');
                const options = studentsCache.map(s =>
                    `<option value="${s.id}">${escapeHtml(s.full_name) || s.email}</option>`
                ).join('');
                const memberChips = [...memberIds].map((sid) => {
                    const st = studentsCache.find(s => s.id === sid);
                    const removeBtn = cmShowArchivedGroups ? '' : `<button type="button" data-remove-member="${sid}" data-group="${group.id}" class="text-blue-400 hover:text-red-600"><i class="fa-solid fa-xmark"></i></button>`;
                    return `<span class="inline-flex items-center gap-1 bg-blue-50 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">
                        ${st ? escapeHtml(st.full_name) || escapeHtml(st.email) : 'طالب'}
                        ${removeBtn}
                    </span>`;
                }).join('') || '<span class="text-xs text-gray-400 font-bold">لا يوجد طلاب في هذه المجموعة</span>';

                const archiveControls = cmShowArchivedGroups
                    ? `<button type="button" data-restore-group="${group.id}" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-emerald-100"><i class="fa-solid fa-rotate-left"></i> استعادة</button>`
                    : `<select data-add-select="${group.id}" class="border border-gray-200 rounded-lg px-2 py-1.5 text-xs">
                            <option value="">إضافة طالب...</option>
                            ${options}
                        </select>
                        <button type="button" data-add-btn="${group.id}" class="bg-blue-800 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-900">إضافة</button>
                        <button type="button" data-archive-group="${group.id}" class="bg-amber-50 text-amber-700 border border-amber-200 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-amber-100"><i class="fa-solid fa-box-archive"></i> أرشفة</button>`;

                box.innerHTML = `
                    <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                        <p class="font-bold text-gray-700">${escapeHtml(group.name)}</p>
                        <div class="flex items-center gap-2">${archiveControls}</div>
                    </div>
                    <div class="flex flex-wrap gap-2">${memberChips}</div>
                `;
                wrap.appendChild(box);
            });

            wrap.querySelectorAll('[data-add-btn]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const groupId = btn.dataset.addBtn;
                    const select = wrap.querySelector(`[data-add-select="${groupId}"]`);
                    const studentId = select.value;
                    if (!studentId) return;
                    const { error } = await db.from('training_group_members').insert({ group_id: groupId, student_id: studentId });
                    if (error) { showStatus('تعذّر الإضافة: ' + error.message, false); return; }
                    renderGroupsList(instructor);
                });
            });
            wrap.querySelectorAll('[data-archive-group]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    if (!confirm('أرشفة هذه المجموعة؟ ستنتقل لقائمة "المجموعات المؤرشفة" مع بقاء كل بياناتها محفوظة، ويمكن استعادتها لاحقًا.')) return;
                    const { error } = await db.from('training_groups').update({ is_archived: true, archived_at: new Date().toISOString() }).eq('id', btn.dataset.archiveGroup);
                    if (error) { showStatus('تعذّر الأرشفة: ' + error.message, false); return; }
                    showStatus('تمت أرشفة المجموعة.', true);
                    renderGroupsList(instructor);
                });
            });
            wrap.querySelectorAll('[data-restore-group]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const { error } = await db.from('training_groups').update({ is_archived: false, archived_at: null }).eq('id', btn.dataset.restoreGroup);
                    if (error) { showStatus('تعذّر الاستعادة: ' + error.message, false); return; }
                    showStatus('تمت استعادة المجموعة.', true);
                    renderGroupsList(instructor);
                });
            });
            wrap.querySelectorAll('[data-remove-member]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const { error } = await db.from('training_group_members')
                        .delete()
                        .eq('group_id', btn.dataset.group)
                        .eq('student_id', btn.dataset.removeMember);
                    if (error) { showStatus('تعذّر الإزالة: ' + error.message, false); return; }
                    renderGroupsList(instructor);
                });
            });
        }

                            <div><label class="block text-sm font-bold text-gray-600 mb-1">كلمة مرور مؤقتة</label><input type="text" id="createTempPasswordInput" required minlength="6" class="w-full border border-gray-200 rounded-lg px-3 py-2"></div>
                            <button type="submit" id="createSubmitBtn" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">إنشاء الحساب</button>
                        </form>
                    </div>
                `;
                document.getElementById('createStudentForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('createSubmitBtn');
                    const errEl = document.getElementById('createStudentError');
                    errEl.classList.add('hidden');
                    btn.disabled = true;
                    btn.textContent = 'جاري الإنشاء...';
                    try {
                        const { data, error } = await db.functions.invoke('admin-create-student', {
                            body: {
                                full_name: document.getElementById('createNameInput').value.trim(),
                                email: document.getElementById('createEmailInput').value.trim(),
                                temp_password: document.getElementById('createTempPasswordInput').value,
                            }
                        });
                        if (error) {
                            let detail = error.message;
                            try {
                                if (error.context && typeof error.context.json === 'function') {
                                    const body = await error.context.json();
                                    if (body && body.error) detail = body.error;
                                }
                            } catch (_e) {}
                            throw new Error(detail);
                        }
                        if (data && data.error) throw new Error(data.error);
                        showStatus('تم إنشاء حساب الطالب بنجاح.', true);
                        document.getElementById('createStudentForm').reset();
                    } catch (err) {
                        errEl.textContent = err.message;
                        errEl.classList.remove('hidden');
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'إنشاء الحساب';
                    }
                });
            }
        }

        async function updateAccountStatus(userId, status, sendEmail) {
            const { error } = await db.rpc('admin_update_account_status', { p_user_id: userId, p_new_status: status });
            if (error) { showStatus('تعذّر التحديث: ' + error.message, false); return; }
            if (status === 'active' && sendEmail) {
                db.functions.invoke('send-approval-email', { body: { user_id: userId } }).then(({ error: emailErr }) => {
                    if (emailErr) console.warn('تعذّر إرسال بريد الإشعار', emailErr);
                });
            }
            showStatus(status === 'active' ? 'تم قبول الطالب وتفعيل حسابه.' : status === 'suspended' ? 'تم تعليق الحساب.' : 'تم تحديث الحالة.', true);
            const activeTab = document.querySelector('.stab-btn.bg-blue-50');
            renderStudentsTab(activeTab ? activeTab.dataset.stab : 'requests');
        }

        function setDefaultDatesFor(fromId, toId) {
            const today = new Date();
            const monthAgo = new Date();
            monthAgo.setDate(today.getDate() - 30);

        // ---------------- شجرة الأقسام (لحساب اختبارات كل قسم تمامًا كما في المنصة) ----------------
        let nodesById = null;
        let rootNode = null;

        async function ensureNodeTreeLoaded() {
            if (nodesById) return;
            const { data, error } = await db.from('nodes').select('*').order('sort_order');
            if (error) throw error;
            nodesById = new Map();
            rootNode = { id: null, type: 'category', children: {} };
            nodesById.set(null, rootNode);
            data.forEach(row => {
                nodesById.set(row.id, { id: row.id, key: row.key, type: row.type, parentId: row.parent_id, children: {} });
            });
            data.forEach(row => {
                const parent = nodesById.get(row.parent_id);
                const self = nodesById.get(row.id);
                if (parent) parent.children[row.key] = self;
            });
        }
        function collectTestGroupIds(node, out) {
            if (node.type === 'testGroup') { out.push(node.id); return; }
            for (const key in node.children) collectTestGroupIds(node.children[key], out);
        }
        async function getSectionExamIds(sectionKey) {
            await ensureNodeTreeLoaded();
            const sectionNode = rootNode.children[sectionKey];
            if (!sectionNode) return [];
            const testGroupIds = [];
            collectTestGroupIds(sectionNode, testGroupIds);
            if (testGroupIds.length === 0) return [];
            const { data: exams } = await db.from('exams').select('id').in('node_id', testGroupIds);
            return (exams || []).map(e => e.id);
        }

        function renderStudentReportResult(container, { student, section, attempts, instructorNames, fromDate, toDate }) {

            let uniqueUnitsCount, totalQuestions, totalCorrect;

        let groupReportChartInstance = null;
        async function renderGroupReport(groupId, groupName, container) {
            container.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحليل بيانات المجموعة...</p>';

            if (mErr) { container.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(mErr.message)}</p>`; return; }
            const studentIds = (members || []).map(m => m.student_id);
            if (!studentIds.length) { container.innerHTML = '<p class="text-gray-400 text-center py-10 font-bold">لا يوجد طلاب في هذه المجموعة.</p>'; return; }

            const { data: attempts, error: aErr } = await db.from('exam_attempts').select('user_id, correct_count, total_count, time_spent_ms').in('user_id', studentIds);
            if (aErr) { container.innerHTML = `<p class="text-red-600 text-center py-8">${escapeHtml(aErr.message)}</p>`; return; }

            const perStudent = studentIds.map((sid) => {
                const info = members.find(m => m.student_id === sid)?.profiles;
                const own = (attempts || []).filter(a => a.user_id === sid);
                const q = own.reduce((s, a) => s + a.total_count, 0);
                const c = own.reduce((s, a) => s + a.correct_count, 0);
                const t = own.reduce((s, a) => s + (a.time_spent_ms || 0), 0);
                return {
                    name: info?.full_name || info?.email || 'طالب',
                    examsCount: own.length,
                    pct: q > 0 ? Math.round((c / q) * 100) : null,
                    timeMs: t,
                };
            }).sort((a, b) => (b.pct ?? -1) - (a.pct ?? -1));

            const scored = perStudent.filter(s => s.pct !== null);
            const highest = scored.length ? Math.max(...scored.map(s => s.pct)) : 0;
            const lowest = scored.length ? Math.min(...scored.map(s => s.pct)) : 0;
            const average = scored.length ? Math.round(scored.reduce((sum, s) => sum + s.pct, 0) / scored.length) : 0;
            const totalTime = perStudent.reduce((s, p) => s + p.timeMs, 0);

            container.innerHTML = `
                <div id="printableGroupReport" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-7">
                    <div class="flex items-center justify-between mb-1 flex-wrap gap-3">

                    </div>
                    <p class="text-xs text-gray-400 font-bold mb-6">${perStudent.length} طالب — ${scored.length} منهم له محاولات مُسجّلة</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                        <div class="bg-green-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-green-700">${highest}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أعلى درجة</div></div>
                        <div class="bg-red-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-red-700">${lowest}٪</div><div class="text-xs font-bold text-gray-500 mt-1">أقل درجة</div></div>
                        <div class="bg-blue-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-blue-900">${average}٪</div><div class="text-xs font-bold text-gray-500 mt-1">المتوسط العام</div></div>
                        <div class="bg-gray-50 rounded-xl p-4 text-center"><div class="text-2xl font-black text-gray-700">${formatDuration(totalTime)}</div><div class="text-xs font-bold text-gray-500 mt-1">إجمالي وقت التدريب</div></div>
                    </div>
                    <div class="mb-8" style="height:260px;"><canvas id="groupReportChart"></canvas></div>
                    <h4 class="font-bold text-gray-700 mb-3">ترتيب الطلاب حسب الأداء</h4>
                    <div class="space-y-2">
                        ${perStudent.map((s, i) => `
                            <div class="flex items-center justify-between text-sm border-b border-gray-50 pb-2">
                                <span class="font-bold text-gray-700">${i + 1}. ${escapeHtml(s.name)}</span>
                                <span class="text-gray-400 text-xs">${formatDuration(s.timeMs)} — ${s.examsCount} نموذج</span>
                                <span class="font-black ${s.pct === null ? 'text-gray-400' : s.pct >= 60 ? 'text-green-600' : 'text-amber-600'}">${s.pct === null ? 'لا محاولات' : s.pct + '٪'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('printGroupReportBtn').addEventListener('click', () => window.print());

            setTimeout(() => {
                if (!window.Chart) return;
                if (groupReportChartInstance) { groupReportChartInstance.destroy(); groupReportChartInstance = null; }
                const ctx = document.getElementById('groupReportChart');
                if (!ctx) return;
                groupReportChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: perStudent.map(s => s.name),
                        datasets: [{
                            label: 'الدقة %',
                            data: perStudent.map(s => s.pct ?? 0),
                            backgroundColor: perStudent.map(s => s.pct === null ? '#d1d5db' : s.pct >= average ? '#16a34a' : '#f59e0b'),
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } }
                });
            }, 0);
        }

        // توليد معرّف فريد (UUID v4) من الجهاز مباشرة - يعمل في كل البيئات
        // بما فيها فتح الملف مباشرة (file://)، بخلاف crypto.randomUUID التي تتطلب
        // سياقًا آمنًا وقد تفشل بصمت في بعض المتصفحات عند فتح الملف محليًا
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        async function getQuestionIdsForTestGroups(testGroupIds) {
            if (!testGroupIds.length) return [];
            const { data: exams } = await db.from('exams').select('id').in('node_id', testGroupIds);
            const examIds = (exams || []).map(e => e.id);
            if (!examIds.length) return [];
            const { data: questions } = await db.from('questions').select('id').in('exam_id', examIds);
            return (questions || []).map(q => q.id);
        }

        async function autoGenerateQuestions(sectionSelection, totalCount) {
            let branches = [];
            if (sectionSelection.includes('auto_qudurat')) {
                const namathijNode = rootNode.children['النماذج'];
                if (namathijNode) {
                    for (const key in namathijNode.children) {
                        const tgIds = [];
                        collectTestGroupIds(namathijNode.children[key], tgIds);
                        const qids = await getQuestionIdsForTestGroups(tgIds);
                        if (qids.length) branches.push(qids);
                    }
                }
            } else if (sectionSelection.includes('auto_comprehensive')) {
                const taasisNode = rootNode.children['التأسيس'];
                if (taasisNode) {
                    for (const key in taasisNode.children) {
                        const tgIds = [];
                        collectTestGroupIds(taasisNode.children[key], tgIds);
                        const qids = await getQuestionIdsForTestGroups(tgIds);
                        if (qids.length) branches.push(qids);
                    }
                }
            } else {
                for (const tgId of sectionSelection) {
                    const qids = await getQuestionIdsForTestGroups([tgId]);
                    if (qids.length) branches.push(qids);
                }
            }
            if (branches.length === 0) return [];
            const perBranch = Math.max(1, Math.ceil(totalCount / branches.length));
            let picked = [];
            branches.forEach((qids) => { picked.push(...shuffleArray(qids).slice(0, perBranch)); });
            return shuffleArray(picked).slice(0, totalCount);
        }
