<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحديد المستوى — النتائج وبنك التشخيص</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=El+Messiri:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>body{font-family:'Almarai',sans-serif;background:#f8fafc}h1,h2{font-family:'El Messiri',serif}</style>
</head>
<body class="text-gray-900 min-h-screen">

<div id="authScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 w-full max-w-sm">
    <h1 class="text-2xl font-black text-blue-900 text-center mb-1">تحديد المستوى</h1>
    <p class="text-sm text-gray-500 text-center mb-6">للمسؤولين فقط</p>
    <div id="authError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm font-bold p-3 rounded-lg"></div>
    <form id="authForm" class="space-y-3">
      <input type="email" id="emailInput" required placeholder="البريد الإلكتروني" class="w-full border border-gray-200 rounded-lg px-3 py-2">
      <input type="password" id="passwordInput" required placeholder="كلمة المرور" class="w-full border border-gray-200 rounded-lg px-3 py-2">
      <button type="submit" class="w-full bg-blue-800 text-white font-bold py-2.5 rounded-lg hover:bg-blue-900">دخول</button>
    </form>
  </div>
</div>

<div id="panel" class="hidden max-w-5xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h1 class="text-2xl font-black text-blue-900"><i class="fa-solid fa-gauge-high text-blue-600"></i> اختبار تحديد المستوى</h1>
    <button id="logoutBtn" class="text-gray-400 hover:text-gray-700 text-sm font-bold"><i class="fa-solid fa-arrow-right-from-bracket"></i> خروج</button>
  </div>
  <div id="notAdmin" class="hidden bg-red-50 border border-red-200 text-red-700 font-bold p-6 rounded-xl text-center">هذه الصفحة للمسؤولين فقط.</div>
  <div id="content" class="hidden">
    <div class="flex gap-2 mb-6">
      <button data-tab="leads" class="tab-btn px-4 py-2 rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-900 font-bold text-sm">النتائج والعملاء</button>
      <button data-tab="pool" class="tab-btn px-4 py-2 rounded-lg border-2 border-gray-200 font-bold text-sm">بنك التشخيص</button>
    </div>
    <div id="tabBody"></div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const SUPABASE_URL = 'https://islxgvjvrxebdtihrkbq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable__ogPxzJzKKighw363hqGqg_HOIQEn7A';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const arNum = (s) => String(s==null?'':s).replace(/[0-9]/g,(d)=>'٠١٢٣٤٥٦٧٨٩'[d]);
  const BRANCHES = ['كمي','لفظي','تحصيلي رياضيات','تحصيلي فيزياء','تحصيلي كيمياء','تحصيلي أحياء'];

  $('authForm').addEventListener('submit', async (e) => {
    e.preventDefault(); $('authError').classList.add('hidden');
    const { error } = await db.auth.signInWithPassword({ email: $('emailInput').value.trim(), password: $('passwordInput').value });
    if (error){ $('authError').textContent='بيانات الدخول غير صحيحة.'; $('authError').classList.remove('hidden'); }
  });
  $('logoutBtn').addEventListener('click', () => db.auth.signOut());
  let _uid;
  db.auth.onAuthStateChange((_e, s) => { const u = s?s.user.id:null; if (u===_uid) return; _uid=u; gate(s); });
  db.auth.getSession().then(({data}) => gate(data.session));

  async function gate(session){
    if (!session){ $('authScreen').classList.remove('hidden'); $('panel').classList.add('hidden'); return; }
    $('authScreen').classList.add('hidden'); $('panel').classList.remove('hidden');
    const { data: p } = await db.from('profiles').select('is_admin').eq('id', session.user.id).single();
    const isAdmin = p && p.is_admin;
    $('notAdmin').classList.toggle('hidden', !!isAdmin);
    $('content').classList.toggle('hidden', !isAdmin);
    if (isAdmin) renderLeads();
  }

  document.querySelectorAll('.tab-btn').forEach((b) => b.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach((x)=>{ const on=x===b; x.classList.toggle('border-blue-600',on); x.classList.toggle('bg-blue-50',on); x.classList.toggle('text-blue-900',on); x.classList.toggle('border-gray-200',!on); });
    if (b.dataset.tab==='leads') renderLeads(); else renderPool();
  }));

  // ============ تبويب النتائج والعملاء ============
  async function renderLeads(){
    const body = $('tabBody');
    body.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';
    const { data, error } = await db.from('placement_results')
      .select('token, student_name, student_phone, report, status, converted_user_id, created_at')
      .order('created_at', { ascending: false }).limit(500);
    if (error){ body.innerHTML = `<p class="text-red-600 text-center py-6">${esc(error.message)}</p>`; return; }
    const done = (data||[]).filter((r)=>r.status==='completed');
    const converted = done.filter((r)=>r.converted_user_id).length;
    const kpi = (l,v,c)=>`<div class="bg-white rounded-xl border border-gray-100 p-4 text-center"><div class="text-2xl font-black text-${c}-600">${arNum(v)}</div><div class="text-[11px] text-gray-500 font-bold mt-1">${l}</div></div>`;
    const rows = done.length ? done.map((r)=>{
      const pct = r.report && r.report.overall ? r.report.overall.pct : 0;
      const lvl = r.report && r.report.overall ? r.report.overall.level : '—';
      const branch = r.report && r.report.branch ? r.report.branch : '';
      const weak = r.report && r.report.recommendations ? r.report.recommendations.join('، ') : '';
      const col = pct>=75?'emerald':(pct>=50?'amber':'red');
      return `<div class="bg-white rounded-xl border border-gray-100 p-4 flex items-center justify-between flex-wrap gap-3">
        <div class="min-w-0">
          <p class="font-black text-blue-900">${esc(r.student_name)||'زائر بلا اسم'} ${branch?`<span class="text-[10px] bg-blue-50 text-blue-700 font-black px-2 py-0.5 rounded-full">${esc(branch)}</span>`:''} ${r.converted_user_id?'<span class="text-[10px] bg-emerald-50 text-emerald-700 font-black px-2 py-0.5 rounded-full">سجّل</span>':''}</p>
          <p class="text-xs text-gray-400 font-bold">${esc(r.student_phone)||'—'} · ${new Date(r.created_at).toLocaleDateString('ar-SA')}</p>
          ${weak?`<p class="text-[11px] text-amber-600 font-bold mt-1">يحتاج: ${esc(weak)}</p>`:''}
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <span class="text-xs font-black px-3 py-1 rounded-full bg-${col}-50 text-${col}-700">${esc(lvl)} · ${arNum(pct)}%</span>
          <a href="placement.html?r=${encodeURIComponent(r.token)}" target="_blank" class="text-blue-700 hover:text-blue-900" title="عرض التقرير"><i class="fa-solid fa-eye"></i></a>
        </div>
      </div>`;
    }).join('') : '<p class="text-gray-400 text-sm text-center py-8">لا نتائج مكتملة بعد.</p>';
    body.innerHTML = `
      <div class="grid grid-cols-3 gap-3 mb-5">
        ${kpi('اختبارات مكتملة', done.length, 'blue')}
        ${kpi('حوّلوا لحسابات', converted, 'emerald')}
        ${kpi('بيانات تواصل', done.filter((r)=>r.student_phone).length, 'amber')}
      </div>
      <div class="space-y-2">${rows}</div>`;
  }

  // ============ تبويب بنك التشخيص ============
  async function renderPool(){
    const body = $('tabBody');
    body.innerHTML = '<p class="text-center text-blue-800 font-bold py-8"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحميل...</p>';
    // ملخّص البنك الحالي حسب الفرع
    const { data: pool } = await db.from('questions').select('placement_branch').eq('is_placement', true).limit(5000);
    const counts = {}; (pool||[]).forEach((q)=>{ const b=q.placement_branch||'(بلا فرع)'; counts[b]=(counts[b]||0)+1; });
    const summary = Object.keys(counts).length ? Object.entries(counts).map(([b,n])=>`<span class="inline-block bg-blue-50 text-blue-800 text-xs font-black px-3 py-1 rounded-full">${esc(b)}: ${arNum(n)}</span>`).join(' ') : '<span class="text-gray-400 text-sm">لا أسئلة في بنك التشخيص بعد.</span>';
    // أقسام
    const { data: nodes } = await db.from('nodes').select('id, key, type, parent_id').order('sort_order');
    const byId = new Map((nodes||[]).map((n)=>[n.id,n]));
    const path = (n)=>{ const parts=[n.key]; let p=byId.get(n.parent_id); while(p){parts.unshift(p.key); p=byId.get(p.parent_id);} return parts.join(' ← '); };
    const groups = (nodes||[]).filter((n)=>n.type==='testGroup');
    body.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-100 p-4 mb-5">
        <p class="font-black text-gray-700 text-sm mb-2">بنك التشخيص الحالي</p>
        <div class="flex flex-wrap gap-2">${summary}</div>
        <p class="text-[11px] text-gray-400 font-bold mt-3"><i class="fa-solid fa-circle-info"></i> وسم الأسئلة أدناه لإضافتها للتشخيص. يُفضّل أن تغطّي كل الفروع بعدد كافٍ (٥ فأكثر لكل فرع). لإخفائها عن الطلاب أرشِفها من لوحة الإدخال — تبقى تعمل في التشخيص.</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
          <select id="poolNode" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">${groups.map((n)=>`<option value="${n.id}">${esc(path(n))}</option>`).join('')}</select>
          <select id="poolExam" class="border border-gray-200 rounded-lg px-3 py-2 text-sm"></select>
        </div>
        <div id="poolQuestions" class="space-y-2"></div>
      </div>`;
    async function loadExams(){
      const nid = $('poolNode').value;
      const { data: exams } = await db.from('exams').select('id, exam_number, title').eq('node_id', nid).order('exam_number');
      $('poolExam').innerHTML = (exams&&exams.length) ? exams.map((e)=>`<option value="${e.id}">${esc(e.title||('اختبار '+e.exam_number))}</option>`).join('') : '<option value="">لا اختبارات</option>';
      loadQs();
    }
    async function loadQs(){
      const eid = $('poolExam').value;
      const wrap = $('poolQuestions');
      if (!eid){ wrap.innerHTML='<p class="text-gray-400 text-sm text-center py-4">اختر اختبارًا.</p>'; return; }
      wrap.innerHTML = '<p class="text-blue-700 text-sm text-center py-3"><i class="fa-solid fa-circle-notch fa-spin"></i></p>';
      const { data: qs } = await db.from('questions').select('id, question_number, question_type, text_content, is_placement, difficulty, placement_branch').eq('exam_id', eid).order('question_number').limit(500);
      wrap.innerHTML = (qs&&qs.length) ? '' : '<p class="text-gray-400 text-sm text-center py-4">لا أسئلة.</p>';
      (qs||[]).forEach((q)=>{
        const row = document.createElement('div');
        row.className = 'border border-gray-100 rounded-lg p-3';
        row.innerHTML = `
          <div class="flex items-start justify-between gap-2 mb-2">
            <span class="text-sm font-bold text-gray-700 truncate"><span class="text-blue-800">${arNum(q.question_number)}.</span> ${q.question_type==='image'?'سؤال صورة':esc((q.text_content||'').slice(0,50))}</span>
            <label class="flex items-center gap-1 text-xs font-black shrink-0 cursor-pointer"><input type="checkbox" class="pq-on w-4 h-4" ${q.is_placement?'checked':''}> ضمن التشخيص</label>
          </div>
          <div class="grid grid-cols-2 gap-2 pq-cfg ${q.is_placement?'':'opacity-40'}">
            <select class="pq-branch border border-gray-200 rounded px-2 py-1 text-xs"><option value="">— الفرع —</option>${BRANCHES.map((b)=>`<option value="${b}" ${q.placement_branch===b?'selected':''}>${b}</option>`).join('')}</select>
            <select class="pq-diff border border-gray-200 rounded px-2 py-1 text-xs">${[1,2,3,4,5].map((d)=>`<option value="${d}" ${q.difficulty===d?'selected':''}>صعوبة ${arNum(d)}</option>`).join('')}</select>
          </div>
          <div class="text-left mt-2"><button class="pq-save bg-blue-800 text-white text-xs font-bold px-4 py-1.5 rounded-lg hover:bg-blue-900">حفظ</button> <span class="pq-status text-xs font-bold"></span></div>`;
        const cb = row.querySelector('.pq-on');
        const cfg = row.querySelector('.pq-cfg');
        cb.addEventListener('change', ()=> cfg.classList.toggle('opacity-40', !cb.checked));
        row.querySelector('.pq-save').addEventListener('click', async ()=>{
          const on = cb.checked;
          const branch = row.querySelector('.pq-branch').value || null;
          const diff = parseInt(row.querySelector('.pq-diff').value, 10) || null;
          const st = row.querySelector('.pq-status');
          if (on && !branch){ st.textContent='اختر الفرع'; st.className='pq-status text-xs font-bold text-red-600'; return; }
          const { error } = await db.from('questions').update({ is_placement: on, placement_branch: on?branch:null, difficulty: on?diff:null }).eq('id', q.id);
          if (error){ st.textContent='خطأ'; st.className='pq-status text-xs font-bold text-red-600'; }
          else { st.textContent='حُفظ ✓'; st.className='pq-status text-xs font-bold text-emerald-600'; }
        });
        wrap.appendChild(row);
      });
    }
    $('poolNode').addEventListener('change', loadExams);
    $('poolExam').addEventListener('change', loadQs);
    loadExams();
  }
})();
</script>
</body>
</html>
